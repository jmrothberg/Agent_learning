<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donkey Kong</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#000; color:#fff;
    font:16px/1.4 ui-monospace,Menlo,Consolas,monospace; overflow:hidden;
    user-select:none; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#000; max-width:96vw; max-height:94vh; touch-action:none;
    image-rendering:pixelated; image-rendering:crisp-edges; }
  #hud { position:fixed; top:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:24px; font-size:14px; letter-spacing:1px; pointer-events:none;
    text-shadow:0 0 6px #f0f; }
  #hud .lbl { color:#f6f; }
  #hud .val { color:#fff; }
  #help { position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
    opacity:.5; font-size:11px; letter-spacing:1px; pointer-events:none; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(4px); z-index:10; }
  #modal .card { background:linear-gradient(160deg,#1a0520,#0a0a2a);
    padding:30px 40px; border-radius:14px; text-align:center;
    box-shadow:0 20px 60px #000a, 0 0 40px #f0f5;
    border:1px solid #f0f7; min-width:260px; }
  #modal h2 { margin:0 0 8px; color:#ff6cf3; text-shadow:0 0 10px #f0f;
    letter-spacing:2px; font-size:24px; }
  #modal p { margin:8px 0 18px; color:#cfd; font-size:14px; }
  button { background:linear-gradient(180deg,#c030f0,#8020c0); color:#fff;
    border:0; padding:12px 22px; border-radius:8px; font-size:14px;
    cursor:pointer; letter-spacing:1px; font-family:inherit; }
  button:hover { filter:brightness(1.15); }
  #loading { position:fixed; inset:0; display:grid; place-items:center;
    background:#000; z-index:20; color:#f6f; letter-spacing:2px; font-size:14px; }
  #loading .bar { width:240px; height:6px; background:#f0f2; margin-top:14px;
    border-radius:3px; overflow:hidden; }
  #loading .bar > div { width:0; height:100%;
    background:linear-gradient(90deg,#f0f,#f6f); transition:width .2s; }
</style></head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud">
  <div><span class="lbl">SCORE </span><span class="val" id="score">0</span></div>
  <div><span class="lbl">LIVES </span><span class="val" id="lives">3</span></div>
  <div><span class="lbl">LEVEL </span><span class="val" id="level">1</span></div>
</div>
<div id="help">Arrows move/climb • Space jump • R restart</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">GAME OVER</h2>
  <p>Score: <span id="endScore">0</span></p>
  <button id="restart">PLAY AGAIN</button>
</div></div>
<div id="loading">LOADING…<div class="bar"><div id="lbar"></div></div></div>
<script>
(() => {
  "use strict";

  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const W = 448, H = 576;
  const GRID = 16;

  function fit() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + "px"; cvs.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);

  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const levelEl = document.getElementById("level");
  const modal = document.getElementById("modal");
  const endScoreEl = document.getElementById("endScore");
  const endTitle = document.getElementById("endTitle");

  const ASSET_DIR = "./donkey-kong-game-with-graphics_20260517_130742_assets/";
  const SOUND_DIR = "./donkey-kong-game-with-graphics_20260517_130742_sounds/";
  const ASSETS = {};
  const SOUNDS = {};

  const spriteNames = ["mario_stand","mario_climb","mario_jump","mario_run",
    "donkey_kong","donkey_kong_throw","pauline","barrel",
    "platform_tilt","platform_flat","ladder","fire","heart","help_sign"];

  async function loadAssets() {
    const bar = document.getElementById("lbar");
    let done = 0;
    for (const name of spriteNames) {
      try {
        const img = new Image();
        img.src = ASSET_DIR + name + ".png";
        await img.decode();
        ASSETS[name] = img;
      } catch (e) { console.warn("asset failed", name, e); }
      done++;
      bar.style.width = (done / spriteNames.length * 100) + "%";
    }
  }

  const soundNames = ["jump","barrel_roll","hit","win","climb"];
  function loadSounds() {
    for (const name of soundNames) {
      try {
        const a = new Audio(SOUND_DIR + name + ".ogg");
        a.loop = false; a.preload = "auto"; a.volume = 0.55;
        SOUNDS[name] = a;
      } catch (e) {}
    }
  }
  function play(name) {
    const base = SOUNDS[name]; if (!base) return;
    try { const inst = base.cloneNode(); inst.volume = base.volume; inst.play().catch(()=>{}); } catch(e) {}
  }
  let audioStarted = false;
  function startAudio() { if (audioStarted) return; audioStarted = true; }
  addEventListener("keydown", startAudio, { once: true });
  addEventListener("pointerdown", startAudio, { once: true });

  const keys = Object.create(null), pressed = Object.create(null);
  const KEYMAP = {
    ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
    KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
    Space:"jump", KeyR:"restart", KeyP:"pause"
  };
  addEventListener("keydown", e => {
    const k = KEYMAP[e.code]; if (!k) return;
    if (!keys[k]) pressed[k] = true;
    keys[k] = true;
    if (["up","down","left","right","jump"].includes(k)) e.preventDefault();
  }, { passive: false });
  addEventListener("keyup", e => { const k = KEYMAP[e.code]; if (k) keys[k] = false; });

  // Platform layout: 4 levels from bottom to top
  // Each platform: { x, y, w, tilt, type }  tilt: 0=flat, 1=right-down, -1=left-down
  function buildLevel() {
    const platforms = [];
    const ladders = [];

    // Level 8 (top): DK platform
    platforms.push({ x: 48, y: 48, w: 192, tilt: 0, type: "flat" });
    // Level 8b: Pauline platform (right side)
    platforms.push({ x: 304, y: 48, w: 112, tilt: 0, type: "flat" });
    // Level 7: Girder tilted right-down
    platforms.push({ x: 48, y: 144, w: 352, tilt: 1, type: "tilt" });
    // Level 6: Girder tilted left-down
    platforms.push({ x: 48, y: 240, w: 352, tilt: -1, type: "tilt" });
    // Level 5: Girder tilted right-down
    platforms.push({ x: 48, y: 336, w: 352, tilt: 1, type: "tilt" });
    // Level 4: Girder tilted left-down
    platforms.push({ x: 48, y: 432, w: 352, tilt: -1, type: "tilt" });
    // Level 3: Girder tilted right-down
    platforms.push({ x: 48, y: 528, w: 352, tilt: 1, type: "tilt" });
    // Level 0 (ground): Flat
    platforms.push({ x: 48, y: 568, w: 352, tilt: 0, type: "flat" });

    // Ladders connecting each level (96px gaps)
    // DK platform -> Girder 7
    ladders.push({ x: 352, y: 48, h: 96 });
    // Girder 7 -> Girder 6
    ladders.push({ x: 160, y: 144, h: 96 });
    ladders.push({ x: 352, y: 144, h: 96 });
    // Girder 6 -> Girder 5
    ladders.push({ x: 48, y: 240, h: 96 });
    ladders.push({ x: 352, y: 240, h: 96 });
    // Girder 5 -> Girder 4
    ladders.push({ x: 160, y: 336, h: 96 });
    ladders.push({ x: 352, y: 336, h: 96 });
    // Girder 4 -> Girder 3
    ladders.push({ x: 48, y: 432, h: 96 });
    ladders.push({ x: 352, y: 432, h: 96 });
    // Girder 3 -> Ground
    ladders.push({ x: 160, y: 528, h: 40 });
    ladders.push({ x: 352, y: 528, h: 40 });

    return { platforms, ladders };
  }

  const state = {
    W, H,
    score: 0, lives: 3, level: 1,
    paused: false, over: false, won: false, t: 0, frame: 0,
    player: { x: 48, y: 448, w: 24, h: 36, vx: 0, vy: 0,
      onGround: false, onLadder: false, climbing: false, facing: 1,
      animTimer: 0, state: "stand", invuln: 0 },
    platforms: [], ladders: [],
    barrels: [],
    dkTimer: 3.0,
    assetsReady: false,
  };
  window.state = state;
  window.sounds = SOUNDS;

  function reset() {
    const lvl = buildLevel();
    state.platforms = lvl.platforms;
    state.ladders = lvl.ladders;
    state.score = 0; state.lives = 3; state.level = 1;
    state.paused = false; state.over = false; state.won = false;
    state.t = 0; state.frame = 0;
    state.player.x = 48; state.player.y = 448;
    state.player.vx = 0; state.player.vy = 0;
    state.player.onGround = false; state.player.onLadder = false;
    state.player.climbing = false; state.player.facing = 1;
    state.player.animTimer = 0; state.player.state = "stand";
    state.player.invuln = 0;
    state.barrels.length = 0;
    state.dkTimer = 3.0;
    modal.style.display = "none";
  }
  document.getElementById("restart").onclick = () => { reset(); };

  function onLadder(px, py) {
    for (const l of state.ladders) {
      if (px + 8 > l.x && px + 16 < l.x + GRID && py + 36 > l.y && py < l.y + l.h) {
        return true;
      }
    }
    return false;
  }

    function onPlatform(px, py) {
    for (const p of state.platforms) {
      const halfTilt = p.tilt * 4;
      const pyAtX = p.y + halfTilt * ((px + 12) - p.x) / GRID;
      if (px + 4 > p.x && px + 20 < p.x + p.w && Math.abs(py + 36 - pyAtX) < 20) {
        return { y: pyAtX, tilt: p.tilt };
      }
    }
    return null;
  }

  function spawnBarrel() {
    const topPlat = state.platforms[0];
    state.barrels.push({
      x: 160, y: topPlat.y - 24,
      vx: 60, vy: 0, w: 24, h: 24,
      onGround: false, animTimer: 0, dead: false
    });
    play("barrel_roll");
  }

  function updatePlayer(dt) {
    const p = state.player;
    const speed = 120;
    const climbSpeed = 80;
    const jumpForce = -280;
    const gravity = 800;

    p.animTimer += dt;
    if (p.invuln > 0) p.invuln -= dt;

    const onLadderHere = onLadder(p.x, p.y);
    const onPlatHere = onPlatform(p.x, p.y);

    // Determine if on ladder
    if (onLadderHere) {
      p.onLadder = true;
    } else {
      p.onLadder = false;
    }

    // Ladder climbing — only lock climbing when actively pressing up/down
    if (p.onLadder) {
      if (keys.up) {
        p.vy = -climbSpeed;
        p.climbing = true;
        p.state = "climb";
        p.vx = 0;
      } else if (keys.down) {
        p.vy = climbSpeed;
        p.climbing = true;
        p.state = "climb";
        p.vx = 0;
      } else {
        p.vy = 0;
        p.climbing = false;
        p.state = "stand";
      }
    } else {
      p.climbing = false;
    }

    // Horizontal movement
    if (!p.climbing) {
      if (keys.left) { p.vx = -speed; p.facing = -1; }
      else if (keys.right) { p.vx = speed; p.facing = 1; }
      else { p.vx = 0; }
    }

    // Jumping
    if (keys.jump && !p.climbing) {
      if (p.onGround) {
        p.vy = jumpForce;
        p.onGround = false;
        p.state = "jump";
        play("jump");
      } else if (p.onLadder) {
        p.vy = jumpForce * 0.7;
        p.onLadder = false;
        p.climbing = false;
        p.state = "jump";
        play("jump");
      }
    }

    // Apply gravity if not climbing
    if (!p.climbing) {
      p.vy += gravity * dt;
    }

    // Move
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Platform collision - check both current and next position
    const platCheck = onPlatform(p.x, p.y);
    if (platCheck && p.vy >= 0) {
      const snapY = platCheck.y - 36;
      if (Math.abs(p.y - snapY) < 20) {
        p.y = snapY;
        p.vy = 0;
        p.onGround = true;
        if (!p.onLadder) {
          p.state = (Math.abs(p.vx) > 1) ? "run" : "stand";
        }
      }
    } else {
      p.onGround = false;
    }

    // If in air, set state
    if (!p.onGround && !p.onLadder && !p.climbing) {
      p.state = "jump";
    }

    // Screen bounds
    p.x = Math.max(4, Math.min(W - 28, p.x));
    if (p.y > H + 40) {
      loseLife();
    }
    if (p.y < -40) p.y = -40;

    // Win condition: reach Pauline at top right
    if (p.x > 300 && p.y < 100 && p.onGround) {
      winLevel();
    }
  }

  function barrelOnLadder(bx, by) {
    for (const l of state.ladders) {
      if (bx + 8 > l.x && bx + 16 < l.x + GRID && by + 24 > l.y && by < l.y + l.h) {
        return true;
      }
    }
    return false;
  }

  function updateBarrels(dt) {
    for (const b of state.barrels) {
      if (b.dead) continue;
      b.animTimer += dt;

      // Check if barrel is on a ladder
      const onLadderHere = barrelOnLadder(b.x, b.y);
      if (onLadderHere) {
        // Barrel descends the ladder
        b.vy = 60;
        b.vx = 0;
        b.x = Math.max(b.x, state.ladders.find(l => b.x + 8 > l.x && b.x + 16 < l.x + GRID && b.y + 24 > l.y && b.y < l.y + l.h)?.x || b.x);
      } else {
        // Apply gravity
        b.vy += 600 * dt;
      }

      // Move
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Platform collision for barrel
      const platCheck = onPlatform(b.x, b.y);
      if (platCheck && b.vy >= 0) {
        b.y = platCheck.y - 24;
        b.vy = 0;
        b.onGround = true;
        // Apply tilt direction
        if (platCheck.tilt > 0) b.vx = 60;
        else if (platCheck.tilt < 0) b.vx = -60;
        else b.vx = b.vx > 0 ? 60 : -60;
      } else {
        b.onGround = false;
      }

      // Remove if off screen
      if (b.y > H + 40 || b.x < -40 || b.x > W + 40) {
        b.dead = true;
        state.score += 30;
      }

      // Collision with player
      const p = state.player;
      if (p.invuln <= 0) {
        const dx = Math.abs(b.x + 12 - p.x - 12);
        const dy = Math.abs(b.y + 12 - p.y - 18);
        if (dx < 18 && dy < 24) {
          loseLife();
        }
      }
    }
    state.barrels = state.barrels.filter(b => !b.dead);
  }

  function loseLife() {
    const p = state.player;
    state.lives--;
    p.invuln = 2.0;
    play("hit");
    if (state.lives <= 0) {
      state.over = true;
      endTitle.textContent = "GAME OVER";
      endScoreEl.textContent = state.score;
      modal.style.display = "grid";
    } else {
      // Reset position
      p.x = 48; p.y = 448;
      p.vx = 0; p.vy = 0;
      p.onGround = false; p.onLadder = false; p.climbing = false;
    }
  }

  function winLevel() {
    state.won = true;
    state.score += 1000;
    play("win");
    endTitle.textContent = "YOU WIN!";
    endScoreEl.textContent = state.score;
    modal.style.display = "grid";
  }

  function update(dt) {
    if (pressed.pause) state.paused = !state.paused;
    if (pressed.restart && (state.over || state.won)) reset();
    if (state.paused) return;
    if (state.over || state.won) return;

    state.t += dt;
    state.frame++;

    updatePlayer(dt);
    updateBarrels(dt);

    // DK throws barrel periodically
    state.dkTimer -= dt;
    if (state.dkTimer <= 0) {
      spawnBarrel();
      state.dkTimer = 2.5 + Math.random() * 2.0;
    }
  }

  function drawSprite(name, x, y, w, h, flip) {
    const img = ASSETS[name];
    if (!img) {
      ctx.fillStyle = "#f6f";
      ctx.fillRect(x, y, w, h);
      return;
    }
    ctx.save();
    if (flip) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      ctx.drawImage(img, 0, 0, w, h);
    } else {
      ctx.drawImage(img, x, y, w, h);
    }
    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);

    // Draw platforms
    for (const p of state.platforms) {
      const halfTilt = p.tilt * 4;
      const spriteName = p.tilt !== 0 ? "platform_tilt" : "platform_flat";
      const img = ASSETS[spriteName];
      if (img) {
        for (let tx = 0; tx < p.w; tx += GRID) {
          const py = p.y + halfTilt * tx / GRID;
          ctx.drawImage(img, p.x + tx, py, GRID, GRID);
        }
      } else {
        ctx.fillStyle = "#f06";
        for (let tx = 0; tx < p.w; tx += GRID) {
          const py = p.y + halfTilt * tx / GRID;
          ctx.fillRect(p.x + tx, py, GRID, GRID);
        }
      }
    }

    // Draw ladders with rungs and rails
    for (const l of state.ladders) {
      const img = ASSETS.ladder;
      if (img) {
        for (let ly = 0; ly < l.h; ly += GRID) {
          ctx.drawImage(img, l.x, l.y + ly, GRID, GRID);
        }
      } else {
        // Draw ladder rails
        ctx.fillStyle = "#4af";
        ctx.fillRect(l.x, l.y, 3, l.h);
        ctx.fillRect(l.x + GRID - 3, l.y, 3, l.h);
        // Draw ladder rungs
        for (let ly = 4; ly < l.h; ly += 8) {
          ctx.fillRect(l.x + 3, l.y + ly, GRID - 6, 2);
        }
      }
    }

    // Draw Donkey Kong at top left
    const dkImg = Math.floor(state.t * 2) % 2 === 0 ? ASSETS.donkey_kong : ASSETS.donkey_kong_throw;
    if (dkImg) {
      ctx.drawImage(dkImg, 80, 16, 48, 48);
    } else {
      ctx.fillStyle = "#a64";
      ctx.fillRect(80, 16, 48, 48);
    }

    // Draw Pauline at top right
    const paulImg = ASSETS.pauline;
    if (paulImg) {
      ctx.drawImage(paulImg, 360, 28, 24, 36);
    } else {
      ctx.fillStyle = "#f6f";
      ctx.fillRect(360, 28, 24, 36);
    }

    // Draw HELP sign near Pauline
    const helpImg = ASSETS.help_sign;
    if (helpImg) {
      ctx.drawImage(helpImg, 340, 8, 48, 32);
    } else {
      ctx.fillStyle = "#44f";
      ctx.fillRect(340, 8, 48, 32);
      ctx.fillStyle = "#fff";
      ctx.font = "10px monospace";
      ctx.fillText("HELP", 348, 26);
    }

    // Draw barrels
    for (const b of state.barrels) {
      const barrelImg = ASSETS.barrel;
      if (barrelImg) {
        const rot = Math.floor(b.animTimer * 8) % 4;
        ctx.save();
        ctx.translate(b.x + 12, b.y + 12);
        ctx.rotate(rot * Math.PI / 2);
        ctx.drawImage(barrelImg, -12, -12, 24, 24);
        ctx.restore();
      } else {
        ctx.fillStyle = "#a64";
        ctx.beginPath();
        ctx.arc(b.x + 12, b.y + 12, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw player
    const p = state.player;
    const flicker = (p.invuln > 0) && (Math.floor(state.t * 10) % 2 === 0);
    if (!flicker) {
      let spriteName;
      switch (p.state) {
        case "climb": spriteName = "mario_climb"; break;
        case "jump": spriteName = "mario_jump"; break;
        case "run": spriteName = "mario_run"; break;
        default: spriteName = "mario_stand"; break;
      }
      const flip = p.facing < 0;
      drawSprite(spriteName, p.x, p.y, 24, 36, flip);
    }

    // Draw fire/hazard indicators on tilted platforms
    for (const plat of state.platforms) {
      if (plat.tilt !== 0) {
        const fireImg = ASSETS.fire;
        const edgeX = plat.tilt > 0 ? plat.x + plat.w - GRID : plat.x;
        const halfTilt = plat.tilt * 4;
        const edgeY = plat.y + halfTilt * (plat.tilt > 0 ? plat.w / GRID : 0) / GRID;
        if (fireImg) {
          const bob = Math.sin(state.t * 4) * 2;
          ctx.drawImage(fireImg, edgeX, edgeY - 16 + bob, 16, 16);
        }
      }
    }
  }

  function updateHUD() {
    scoreEl.textContent = state.score;
    livesEl.textContent = state.lives;
    levelEl.textContent = state.level;
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
      updateHUD();
    } catch (err) {
      console.error("game crashed:", err);
    }
    for (const k in pressed) pressed[k] = false;
    requestAnimationFrame(frame);
  }

  loadSounds();
  loadAssets().then(() => {
    state.assetsReady = true;
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  }).catch(err => {
    console.error("asset load failed:", err);
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  });
})();
</script>
</body></html>
