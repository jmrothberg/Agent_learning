<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Voidstrike</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#05060f; color:#e7ecff;
    font:16px/1.4 ui-monospace,Menlo,Consolas,monospace; overflow:hidden;
    user-select:none; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#05060f; border-radius:12px;
    box-shadow:0 0 40px #0ff4, 0 0 80px #f0f3, inset 0 0 0 2px #1a2350;
    image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:96vw; max-height:94vh; touch-action:none; }
  #hud { position:fixed; top:12px; left:12px; background:#000a;
    padding:10px 14px; border-radius:8px; pointer-events:none;
    border:1px solid #0ff5; box-shadow:0 0 12px #0ff3;
    letter-spacing:1px; font-size:14px; }
  #hud .lbl { color:#7fd9ff; }
  #hud .val { color:#fff; text-shadow:0 0 6px #0ff; }
  #help { position:fixed; bottom:12px; left:12px; opacity:.6; font-size:12px;
    letter-spacing:1px; }
  #wave { position:fixed; top:12px; right:12px; background:#000a;
    padding:10px 14px; border-radius:8px; pointer-events:none;
    border:1px solid #f0f5; box-shadow:0 0 12px #f0f3;
    color:#ffb6ff; font-size:14px; letter-spacing:1px; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(6px); z-index:10; }
  #modal .card { background:linear-gradient(160deg,#10133a,#1a0b30);
    padding:30px 40px; border-radius:14px; text-align:center;
    box-shadow:0 20px 60px #000a, 0 0 40px #f0f5;
    border:1px solid #f0f7; min-width:280px; }
  #modal h2 { margin:0 0 8px; color:#ff6cf3; text-shadow:0 0 10px #f0f;
    letter-spacing:2px; }
  #modal p { margin:8px 0 18px; color:#cfd; }
  button { background:linear-gradient(180deg,#3b62ff,#5c2af0); color:#fff;
    border:0; padding:12px 22px; border-radius:8px; font-size:14px;
    cursor:pointer; letter-spacing:1px; font-family:inherit;
    box-shadow:0 4px 16px #5c2af066; }
  button:hover { filter:brightness(1.15); }
  #loading { position:fixed; inset:0; display:grid; place-items:center;
    background:#05060f; z-index:20; color:#7fd9ff; letter-spacing:2px; }
  #loading .bar { width:240px; height:6px; background:#0ff2; margin-top:14px;
    border-radius:3px; overflow:hidden; }
  #loading .bar > div { width:0; height:100%;
    background:linear-gradient(90deg,#0ff,#f0f); transition:width .2s; }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="800" height="600"></canvas></div>
<div id="hud">
  <div><span class="lbl">SCORE </span><span class="val" id="score">0</span></div>
  <div><span class="lbl">LIVES </span><span class="val" id="lives">3</span></div>
  <div><span class="lbl">PWR&nbsp;&nbsp; </span><span class="val" id="pwr">1</span></div>
</div>
<div id="wave">WAVE <span id="waveN">1</span></div>
<div id="help">WASD / Arrows • SPACE fire • P pause • R restart</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">GAME OVER</h2>
  <p>Final score: <span id="endScore">0</span> &nbsp; Wave: <span id="endWave">1</span></p>
  <button id="restart">PLAY AGAIN</button>
</div></div>
<div id="loading">LOADING ASSETS…<div class="bar"><div id="lbar"></div></div></div>
<script>
(() => {
  "use strict";

  // ---------- Canvas / DPR ----------
  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const W = 800, H = 600;
  function fit() {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W+"px"; cvs.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);

  // ---------- HUD refs ----------
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const pwrEl   = document.getElementById("pwr");
  const waveEl  = document.getElementById("waveN");
  const modal   = document.getElementById("modal");
  const endScoreEl = document.getElementById("endScore");
  const endWaveEl  = document.getElementById("endWave");
  const endTitle   = document.getElementById("endTitle");

  // ---------- Assets ----------
  const ASSET_DIR = "./polished-pixel-art-arcade-shoo_20260517_100323_assets/";
  const SOUND_DIR = "./polished-pixel-art-arcade-shoo_20260517_100323_sounds/";
  const ASSETS = {};
  const EXPL_FRAMES = 8;
  const EXPL_FRAME_W = 64;
  const EXPL_FRAME_H = 64;

  async function loadAssets() {
    const list = [
      ["player",        ASSET_DIR + "player.png"],
      ["enemy_grunt",   ASSET_DIR + "enemy_grunt.png"],
      ["enemy_heavy",   ASSET_DIR + "enemy_heavy.png"],
      ["enemy_swift",   ASSET_DIR + "enemy_swift.png"],
      ["bullet_player", ASSET_DIR + "bullet_player.png"],
      ["bullet_enemy",  ASSET_DIR + "bullet_enemy.png"],
      ["powerup",       ASSET_DIR + "powerup.png"],
      ["explosion",     ASSET_DIR + "explosion.png"],
    ];
    const bar = document.getElementById("lbar");
    let done = 0;
    for (const [name, src] of list) {
      try {
        const img = new Image();
        img.src = src;
        await img.decode();
        ASSETS[name] = img;
      } catch (e) {
        console.warn("asset failed", name, e);
      }
      done++;
      bar.style.width = (done / list.length * 100) + "%";
    }
  }

  // ---------- Sounds ----------
  const SOUNDS = {};
  function loadSounds() {
    const list = [
      ["laser",     "laser.ogg",     false],
      ["explosion", "explosion.ogg", false],
      ["hit",       "hit.ogg",       false],
      ["powerup",   "powerup.ogg",   false],
      ["gameover",  "gameover.ogg",  false],
      ["music",     "music.ogg",     true ],
    ];
    for (const [name, file, loop] of list) {
      try {
        const a = new Audio(SOUND_DIR + file);
        a.loop = loop;
        a.preload = "auto";
        if (name === "music") a.volume = 0.45;
        else a.volume = 0.55;
        SOUNDS[name] = a;
      } catch (e) {}
    }
  }
  function play(name) {
    const base = SOUNDS[name];
    if (!base) return;
    try {
      if (base.loop) { base.play().catch(()=>{}); return; }
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(()=>{});
    } catch (e) {}
  }
  let audioStarted = false;
  function startAudio() {
    if (audioStarted) return; audioStarted = true;
    if (SOUNDS.music) SOUNDS.music.play().catch(()=>{});
  }
  addEventListener("keydown",     startAudio, { once:true });
  addEventListener("pointerdown", startAudio, { once:true });

  // ---------- Input ----------
  const keys = Object.create(null), pressed = Object.create(null);
  const KEYMAP = {
    ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
    KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
    Space:"fire", KeyP:"pause", KeyR:"restart"
  };
  addEventListener("keydown", e => {
    const k = KEYMAP[e.code]; if (!k) return;
    if (!keys[k]) pressed[k] = true;
    keys[k] = true;
    if (["up","down","left","right","fire"].includes(k)) e.preventDefault();
  }, { passive:false });
  addEventListener("keyup", e => { const k = KEYMAP[e.code]; if (k) keys[k] = false; });
  // pointer fires
  let pointerDown = false, pointerX = W/2, pointerY = H/2, pointerUsed = false;
  cvs.addEventListener("pointerdown", e => {
    pointerDown = true; pressed.fire = true; pointerUsed = true;
    const r = cvs.getBoundingClientRect();
    pointerX = (e.clientX - r.left) * (W / r.width);
    pointerY = (e.clientY - r.top)  * (H / r.height);
  });
  cvs.addEventListener("pointermove", e => {
    const r = cvs.getBoundingClientRect();
    pointerX = (e.clientX - r.left) * (W / r.width);
    pointerY = (e.clientY - r.top)  * (H / r.height);
  });
  addEventListener("pointerup", () => { pointerDown = false; });

  // ---------- Starfield ----------
  const stars = [];
  for (let i=0; i<140; i++) {
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      z: 0.3 + Math.random()*1.7,
    });
  }

  // ---------- State ----------
  const state = {
    W, H,
    score: 0, lives: 3, wave: 1, power: 1,
    paused: false, over: false, t: 0,
    player: { x: W/2, y: H - 90, w: 56, h: 56, cool: 0, invuln: 0 },
    bullets: [],
    ebullets: [],
    enemies: [],
    powerups: [],
    explosions: [],
    particles: [],
    spawnTimer: 1.0,
    waveTimer: 0,
    waveEnemiesLeft: 0,
    shake: 0,
    firedCount: 0,
    assetsReady: false,
  };
  window.state = state;
  window.sounds = SOUNDS;

  function reset() {
    state.score = 0; state.lives = 3; state.wave = 1; state.power = 1;
    state.paused = false; state.over = false; state.t = 0;
    state.player.x = W/2; state.player.y = H - 90;
    state.player.cool = 0; state.player.invuln = 1.0;
    state.bullets.length = 0;
    state.ebullets.length = 0;
    state.enemies.length = 0;
    state.powerups.length = 0;
    state.explosions.length = 0;
    state.particles.length = 0;
    state.spawnTimer = 1.0;
    state.waveTimer = 0;
    state.waveEnemiesLeft = 8;
    state.shake = 0;
    state.firedCount = 0;
    modal.style.display = "none";
    if (SOUNDS.music && audioStarted) { try { SOUNDS.music.currentTime = 0; SOUNDS.music.play().catch(()=>{}); } catch(e){} }
  }
  document.getElementById("restart").onclick = () => { reset(); };

  // ---------- Spawn ----------
  function spawnEnemy() {
    const r = Math.random();
    let type;
    if (state.wave >= 3 && r < 0.18) type = "heavy";
    else if (r < 0.35) type = "swift";
    else type = "grunt";

    const def = {
      grunt: { w:60, h:60, hp:2, speed:70,  fireRate:1.6, score:100, asset:"enemy_grunt" },
      heavy: { w:80, h:80, hp:6, speed:40,  fireRate:1.1, score:300, asset:"enemy_heavy" },
      swift: { w:54, h:54, hp:1, speed:140, fireRate:2.2, score:150, asset:"enemy_swift" },
    }[type];

    const x = 40 + Math.random() * (W - 80);
    state.enemies.push({
      type, x, y: -def.h, w:def.w, h:def.h,
      hp: def.hp + Math.floor(state.wave * 0.4),
      speed: def.speed + state.wave * 6,
      fireCool: 0.5 + Math.random() * def.fireRate,
      fireRate: def.fireRate,
      score: def.score,
      asset: def.asset,
      wobble: Math.random() * Math.PI * 2,
      wobbleAmp: type === "swift" ? 90 : 30,
    });
  }
  function spawnPowerup(x, y) {
    state.powerups.push({ x, y, w:36, h:36, vy:80, t:0 });
  }
  function explode(x, y, big) {
    state.explosions.push({ x, y, t:0, dur: big ? 0.6 : 0.45, scale: big ? 1.6 : 1.0 });
    const n = big ? 22 : 12;
    for (let i=0; i<n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 180;
      state.particles.push({
        x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        life: 0.4 + Math.random()*0.3, age:0,
        color: Math.random() < 0.5 ? "#ffb347" : "#ff5e3a",
        size: 2 + Math.random()*3,
      });
    }
    state.shake = Math.min(20, state.shake + (big ? 14 : 7));
    play("explosion");
  }

  // ---------- Update ----------
  function update(dt) {
    if (pressed.pause) state.paused = !state.paused;
    if (pressed.restart && state.over) reset();
    if (state.paused) return;
    if (state.over) return;

    state.t += dt;

    // starfield
    for (const s of stars) {
      s.y += (40 + s.z * 80) * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    }

    // player
    const p = state.player;
    const speed = 320;
    let vx = 0, vy = 0;
    if (keys.left)  vx -= 1;
    if (keys.right) vx += 1;
    if (keys.up)    vy -= 1;
    if (keys.down)  vy += 1;
    if (vx || vy) {
      const m = Math.hypot(vx, vy);
      p.x += (vx/m) * speed * dt;
      p.y += (vy/m) * speed * dt;
    }
    if (pointerDown && pointerUsed) {
      const dx = pointerX - p.x, dy = pointerY - p.y;
      const d = Math.hypot(dx, dy);
      if (d > 4) { p.x += (dx/d) * speed * dt; p.y += (dy/d) * speed * dt; }
    }
    const margin = 22;
    p.x = Math.max(margin, Math.min(W - margin, p.x));
    p.y = Math.max(margin, Math.min(H - margin, p.y));
    if (p.invuln > 0) p.invuln -= dt;

    // fire
    p.cool -= dt;
    if ((keys.fire || pointerDown) && p.cool <= 0) {
      const lvl = state.power;
      const baseSpeed = 620;
      const shots = lvl === 1 ? [[0, -baseSpeed]]
                  : lvl === 2 ? [[-90, -baseSpeed], [90, -baseSpeed]]
                              : [[-140, -baseSpeed*0.97], [0, -baseSpeed], [140, -baseSpeed*0.97]];
      for (const [vx2, vy2] of shots) {
        state.bullets.push({
          x: p.x + (vx2/Math.abs(baseSpeed||1)) * 6,
          y: p.y - 22, vx: vx2, vy: vy2,
          w: 16, h: 28, life: 1.6
        });
      }
      p.cool = lvl >= 3 ? 0.13 : (lvl === 2 ? 0.15 : 0.18);
      state.firedCount++;
      play("laser");
    }

    // bullets
    for (const b of state.bullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    }
    state.bullets = state.bullets.filter(b => b.life > 0 && b.y > -40 && b.x > -40 && b.x < W+40);

    // enemy bullets
    for (const b of state.ebullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    }
    state.ebullets = state.ebullets.filter(b => b.life > 0 && b.y < H+40 && b.x > -40 && b.x < W+40);

    // spawn / waves
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0 && state.waveEnemiesLeft > 0) {
      spawnEnemy();
      state.waveEnemiesLeft--;
      state.spawnTimer = Math.max(0.35, 1.1 - state.wave * 0.05) * (0.7 + Math.random()*0.6);
    }
    if (state.waveEnemiesLeft <= 0 && state.enemies.length === 0) {
      state.waveTimer += dt;
      if (state.waveTimer > 1.8) {
        state.wave++;
        state.waveEnemiesLeft = 6 + state.wave * 2;
        state.spawnTimer = 0.8;
        state.waveTimer = 0;
      }
    }

    // enemies
    for (const e of state.enemies) {
      e.wobble += dt * 2;
      e.y += e.speed * dt;
      e.x += Math.sin(e.wobble) * e.wobbleAmp * dt;
      e.x = Math.max(20, Math.min(W-20, e.x));
      e.fireCool -= dt;
      if (e.fireCool <= 0 && e.y > 0 && e.y < H - 100) {
        e.fireCool = 1.2 + Math.random() * e.fireRate;
        const dx = state.player.x - e.x, dy = state.player.y - e.y;
        const d = Math.hypot(dx, dy) || 1;
        const sp = 240;
        state.ebullets.push({
          x: e.x, y: e.y + e.h*0.3,
          vx: (dx/d) * sp, vy: (dy/d) * sp,
          w: 14, h: 14, life: 3.5
        });
      }
      if (e.y > H + 80) e.dead = true;
    }
    // collisions: player bullets vs enemies
    for (const b of state.bullets) {
      for (const e of state.enemies) {
        if (e.dead) continue;
        if (Math.abs(b.x - e.x) < (e.w*0.45) && Math.abs(b.y - e.y) < (e.h*0.45)) {
          e.hp -= 1;
          b.life = 0;
          // small spark
          state.particles.push({
            x: b.x, y: b.y, vx: (Math.random()-0.5)*100, vy: -80 + (Math.random()-0.5)*60,
            life:0.25, age:0, color:"#9ff", size:2
          });
          if (e.hp <= 0) {
            e.dead = true;
            state.score += e.score;
            explode(e.x, e.y, e.type === "heavy");
            if (Math.random() < (e.type === "heavy" ? 0.6 : 0.10)) spawnPowerup(e.x, e.y);
          } else {
            play("hit");
          }
          break;
        }
      }
    }
    state.enemies = state.enemies.filter(e => !e.dead);
    state.bullets = state.bullets.filter(b => b.life > 0);

    // enemy bullets vs player
    if (p.invuln <= 0) {
      for (const b of state.ebullets) {
        if (Math.abs(b.x - p.x) < 18 && Math.abs(b.y - p.y) < 18) {
          b.life = 0;
          hitPlayer();
          break;
        }
      }
    }
    // enemy body vs player
    if (p.invuln <= 0) {
      for (const e of state.enemies) {
        if (Math.abs(e.x - p.x) < (e.w*0.4 + 14) && Math.abs(e.y - p.y) < (e.h*0.4 + 14)) {
          e.dead = true;
          explode(e.x, e.y, true);
          state.score += Math.floor(e.score * 0.5);
          hitPlayer();
          break;
        }
      }
    }
    state.ebullets = state.ebullets.filter(b => b.life > 0);

    // powerups
    for (const u of state.powerups) {
      u.y += u.vy * dt; u.t += dt;
    }
    for (const u of state.powerups) {
      if (Math.abs(u.x - p.x) < 26 && Math.abs(u.y - p.y) < 26) {
        u.dead = true;
        state.power = Math.min(3, state.power + 1);
        state.score += 50;
        play("powerup");
      }
    }
    state.powerups = state.powerups.filter(u => !u.dead && u.y < H + 30);

    // explosions
    for (const x of state.explosions) x.t += dt;
    state.explosions = state.explosions.filter(x => x.t < x.dur);

    // particles
    for (const pt of state.particles) {
      pt.age += dt;
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vx *= 0.96; pt.vy *= 0.96;
    }
    state.particles = state.particles.filter(pt => pt.age < pt.life);

    // shake decay
    state.shake *= Math.max(0, 1 - dt * 5);
  }

  function hitPlayer() {
    state.lives--;
    state.power = Math.max(1, state.power - 1);
    state.player.invuln = 1.5;
    explode(state.player.x, state.player.y, true);
    if (state.lives <= 0) {
      state.over = true;
      endTitle.textContent = "GAME OVER";
      endScoreEl.textContent = state.score;
      endWaveEl.textContent = state.wave;
      modal.style.display = "grid";
      try { if (SOUNDS.music) SOUNDS.music.pause(); } catch(e){}
      play("gameover");
    }
  }

  // ---------- Drawing ----------
  function drawStars() {
    for (const s of stars) {
      const a = 0.3 + s.z * 0.4;
      ctx.fillStyle = `rgba(${160+s.z*40|0},${200+s.z*30|0},255,${a})`;
      const sz = s.z < 1 ? 1 : 2;
      ctx.fillRect(s.x|0, s.y|0, sz, sz);
    }
  }

  function drawSprite(img, x, y, w, h, rot) {
    if (!img) {
      ctx.fillStyle = "#5af";
      ctx.fillRect(x - w/2, y - h/2, w, h);
      return;
    }
    if (rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.drawImage(img, -w/2, -h/2, w, h);
      ctx.restore();
    } else {
      ctx.drawImage(img, x - w/2, y - h/2, w, h);
    }
  }

  function drawExplosion(e) {
    const img = ASSETS.explosion;
    const frame = Math.min(EXPL_FRAMES - 1, Math.floor((e.t / e.dur) * EXPL_FRAMES));
    const size = 96 * e.scale;
    if (img) {
      // sprite sheet is horizontal strip; native frame width = img.width / 8
      const fw = img.width / EXPL_FRAMES;
      const fh = img.height;
      ctx.drawImage(img, frame * fw, 0, fw, fh,
                    e.x - size/2, e.y - size/2, size, size);
    } else {
      const a = 1 - (e.t / e.dur);
      ctx.fillStyle = `rgba(255,${120 + frame*15},0,${a})`;
      ctx.beginPath(); ctx.arc(e.x, e.y, size/2 * (e.t/e.dur + 0.4), 0, Math.PI*2); ctx.fill();
    }
  }

  function draw() {
    // shake
    const sh = state.shake;
    const ox = (Math.random()-0.5) * sh;
    const oy = (Math.random()-0.5) * sh;
    ctx.save();
    ctx.translate(ox, oy);

    // bg
    ctx.fillStyle = "#05060f";
    ctx.fillRect(-20, -20, W+40, H+40);
    drawStars();

    // powerups
    for (const u of state.powerups) {
      const bob = Math.sin(u.t * 6) * 3;
      drawSprite(ASSETS.powerup, u.x, u.y + bob, 40, 40, 0);
    }

    // bullets (player)
    for (const b of state.bullets) {
      drawSprite(ASSETS.bullet_player, b.x, b.y, 22, 36, 0);
    }
    // enemy bullets
    for (const b of state.ebullets) {
      drawSprite(ASSETS.bullet_enemy, b.x, b.y, 22, 22, 0);
    }

    // enemies
    for (const e of state.enemies) {
      drawSprite(ASSETS[e.asset], e.x, e.y, e.w, e.h, 0);
    }

    // player
    const p = state.player;
    const flicker = (p.invuln > 0) && (Math.floor(state.t * 20) % 2 === 0);
    if (!flicker) {
      // engine glow
      ctx.fillStyle = "rgba(0,220,255,0.35)";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 28, 18, 26 + Math.sin(state.t*30)*4, 0, 0, Math.PI*2);
      ctx.fill();
      drawSprite(ASSETS.player, p.x, p.y, p.w, p.h, 0);
    }

    // particles
    for (const pt of state.particles) {
      const a = 1 - (pt.age / pt.life);
      ctx.fillStyle = pt.color.replace(")", `,${a.toFixed(2)})`).replace("rgb","rgba")
                    .replace("#","#"); // fallback
      // simpler: just set globalAlpha
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
      ctx.globalAlpha = 1;
    }

    // explosions on top
    for (const e of state.explosions) drawExplosion(e);

    ctx.restore();

    // pause overlay
    if (state.paused && !state.over) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#ff6cf3";
      ctx.font = "bold 48px ui-monospace,monospace";
      ctx.textAlign = "center";
      ctx.shadowColor = "#f0f"; ctx.shadowBlur = 16;
      ctx.fillText("PAUSED", W/2, H/2);
      ctx.shadowBlur = 0;
    }

    // intro hint
    if (state.t < 3 && !state.over) {
      ctx.fillStyle = "rgba(127,217,255,0.85)";
      ctx.font = "14px ui-monospace,monospace";
      ctx.textAlign = "center";
      ctx.fillText("PRESS SPACE TO FIRE", W/2, H - 30);
    }
  }

  // ---------- HUD ----------
  function updateHUD() {
    scoreEl.textContent = state.score;
    livesEl.textContent = state.lives;
    pwrEl.textContent   = state.power;
    waveEl.textContent  = state.wave;
  }

  // ---------- Loop ----------
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
      updateHUD();
    } catch (err) {
      console.error("game crashed:", err);
    }
    for (const k in pressed) pressed[k] = false;
    requestAnimationFrame(frame);
  }

  // ---------- Boot ----------
  loadSounds();
  loadAssets().then(() => {
    state.assetsReady = true;
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  }).catch(err => {
    console.error("asset load failed:", err);
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  });
})();
</script>
</body></html>
