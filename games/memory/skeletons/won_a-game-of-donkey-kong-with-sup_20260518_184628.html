<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DONKEY KONG</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#000; color:#fff;
    font:16px/1.4 "Courier New",monospace; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#000; border:4px solid #ff2266; border-radius:8px;
    box-shadow:0 0 60px #ff226688, inset 0 0 20px #000;
    max-width:96vw; max-height:94vh; touch-action:none;
    image-rendering: pixelated; image-rendering: crisp-edges; }
  #hud { position:fixed; top:12px; left:50%; transform:translateX(-50%);
    background:#000c; padding:8px 18px; border:2px solid #ff2266; border-radius:8px;
    pointer-events:none; font-size:18px; font-weight:bold; letter-spacing:2px;
    color:#ffe04a; text-shadow:0 0 8px #ff2266; display:flex; gap:24px; }
  #hud span.label { color:#ff2266; }
  #help { position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
    opacity:.85; font-size:13px; color:#7ad7ff; text-align:center;
    background:#000a; padding:6px 14px; border-radius:6px; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(4px); z-index:10; }
  #modal .card { background:#1a0322; padding:28px 36px; border-radius:14px;
    text-align:center; box-shadow:0 20px 60px #000a; border:3px solid #ff2266; }
  #modal h2 { color:#ffe04a; margin:0 0 10px; font-size:36px; letter-spacing:3px;
    text-shadow:0 0 12px #ff2266; }
  button { background:#ff2266; color:#fff; border:0; padding:12px 24px;
    border-radius:8px; font-size:16px; cursor:pointer; font-weight:bold;
    letter-spacing:2px; font-family:inherit; margin-top:8px; }
  button:hover { filter:brightness(1.2); }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="640" height="720"></canvas></div>
<div id="hud">
  <span><span class="label">SCORE</span> <span id="score">0</span></span>
  <span><span class="label">LIVES</span> <span id="lives">3</span></span>
  <span><span class="label">L</span> <span id="level">1</span></span>
</div>
<div id="help">◄ ► run · ▲ ▼ climb ladders · SPACE jump · R restart · P pause</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">GAME OVER</h2>
  <p id="endMsg" style="color:#7ad7ff">Final score: <span id="endScore">0</span></p>
  <button id="restart">PLAY AGAIN</button>
</div></div>
<script>
(() => {
  "use strict";
  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const W = 640, H = 720;
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const levelEl = document.getElementById("level");
  const modal = document.getElementById("modal");
  const endTitleEl = document.getElementById("endTitle");
  const endScoreEl = document.getElementById("endScore");

  function fit() {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W+"px"; cvs.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);

  // ---------- assets ----------
  const ASSET_DIR = "./a-game-of-donkey-kong-with-sup_20260518_184628_assets/";
  const ASSETS = {};
  async function loadAssets() {
    const entries = [
      ['jumpman', 'jumpman.png'],
      ['jumpman_jump', 'jumpman_jump.png'],
      ['jumpman_climb', 'jumpman_climb.png'],
      ['ape', 'ape.png'],
      ['barrel', 'barrel.png'],
      ['princess', 'princess.png'],
      ['girder', 'girder.png'],
      ['ladder', 'ladder.png'],
    ];
    await Promise.all(entries.map(async ([n, f]) => {
      try {
        const img = new Image();
        img.src = ASSET_DIR + f;
        await img.decode();
        ASSETS[n] = img;
      } catch (e) {
        console.warn("missing asset", n, e);
        ASSETS[n] = null;
      }
    }));
  }

  // ---------- sounds ----------
  const SOUND_DIR = "./a-game-of-donkey-kong-with-sup_20260518_184628_sounds/";
  const SOUNDS = {};
  function loadSounds() {
    const entries = [
      ['jump','jump.ogg',false],
      ['hit','hit.ogg',false],
      ['roll','roll.ogg',false],
      ['win','win.ogg',false],
      ['music','music.ogg',true],
    ];
    for (const [n,f,loop] of entries) {
      try {
        const a = new Audio(SOUND_DIR + f);
        a.loop = loop;
        if (loop) a.volume = 0.4; else a.volume = 0.6;
        SOUNDS[n] = a;
      } catch(e) {}
    }
  }
  function play(name) {
    const base = SOUNDS[name]; if (!base) return;
    if (base.loop) { base.play().catch(()=>{}); return; }
    try {
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(()=>{});
    } catch(e) {}
  }
  let _audioStarted = false;
  function startAudio() {
    if (_audioStarted) return; _audioStarted = true;
    if (SOUNDS.music) SOUNDS.music.play().catch(()=>{});
  }
  addEventListener("keydown", startAudio, {once:true});
  addEventListener("pointerdown", startAudio, {once:true});
  loadSounds();

  // ---------- input ----------
  const keys = Object.create(null), pressed = Object.create(null);
  const KEYMAP = { ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
    KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
    Space:"jump", KeyP:"pause", KeyR:"restart" };
  addEventListener("keydown", e => {
    const k = KEYMAP[e.code]; if (!k) return;
    if (!keys[k]) pressed[k] = true;
    keys[k] = true;
    if (["up","down","left","right","jump"].includes(k)) e.preventDefault();
  }, { passive:false });
  addEventListener("keyup", e => { const k = KEYMAP[e.code]; if (k) keys[k] = false; });

  // ---------- level geometry ----------
  // Ramps: array of girders, each with x1,y1 (left) -> x2,y2 (right).
  // Alternating slope creates the classic DK zig-zag.
  // Ladders connect two ramps vertically.
  // Coordinate system: y grows down, but ramp slope goes UP toward one side.

  const RAMPS = [
    // bottom (Jumpman starts here): slopes UP to the right slightly... classic DK has bottom level + slanted upper levels
    // We'll do: bottom is slightly sloped left-low, all others alternate
    {x1: 40, y1: 660, x2: 600, y2: 640},   // 0 bottom
    {x1: 40, y1: 540, x2: 600, y2: 560},   // 1
    {x1: 40, y1: 460, x2: 600, y2: 440},   // 2
    {x1: 40, y1: 340, x2: 600, y2: 360},   // 3
    {x1: 40, y1: 260, x2: 600, y2: 240},   // 4
    {x1: 40, y1: 160, x2: 600, y2: 160},   // 5 top (flat - ape platform)
  ];

  // Ladders connect ramp index i to ramp index i+1. x is at the lower ramp's x.
  const LADDERS = [
    {rampLow:0, x:160}, {rampLow:0, x:480},
    {rampLow:1, x:120}, {rampLow:1, x:420},
    {rampLow:2, x:200}, {rampLow:2, x:520},
    {rampLow:3, x:140}, {rampLow:3, x:460},
    {rampLow:4, x:240}, {rampLow:4, x:540},
  ];

  // For each ladder pre-compute top/bottom y on the two ramps.
  function rampY(ramp, x) {
    const t = (x - ramp.x1) / (ramp.x2 - ramp.x1);
    return ramp.y1 + (ramp.y2 - ramp.y1) * Math.max(0, Math.min(1, t));
  }
  function rampSlope(ramp) {
    return (ramp.y2 - ramp.y1) / (ramp.x2 - ramp.x1);
  }
  function precomputeLadders() {
    for (const L of LADDERS) {
      const lower = RAMPS[L.rampLow];
      const upper = RAMPS[L.rampLow+1];
      L.yBottom = rampY(lower, L.x);
      L.yTop = rampY(upper, L.x);
    }
  }
  precomputeLadders();

  function ladderAtX(rampIdx, x, tol=14) {
    // ladder leaving this ramp downward? no — we use ladders WHERE this ramp is the LOWER one (climb up)
    // OR where rampIdx-1 has a ladder ending here (climb down)
    const up = LADDERS.find(L => L.rampLow === rampIdx && Math.abs(L.x - x) <= tol);
    const down = LADDERS.find(L => L.rampLow === rampIdx-1 && Math.abs(L.x - x) <= tol);
    return { up, down };
  }

  // ---------- state ----------
  const state = {
    score: 0, lives: 3, level: 1,
    paused: false, over: false, won: false,
    t: 0, frameCount: 0,
    player: {
      x: 80, y: 0, vx: 0, vy: 0,
      onRamp: 0, climbing: false, jumping: false,
      facing: 1, animTime: 0, animFrame: 0,
      jumpTimer: 0,
      dead: false, deadTimer: 0,
    },
    barrels: [],
    ape: { x: 110, y: 95, animTime: 0, throwTimer: 0, throwing: 0, throwPhase: 0, armAngle: 0, beatingChest: 0 },
    princess: { x: 300, y: 95 },
    spawnTimer: 1.2,
    barrels_spawned: 0,
  };
  window.state = state;

  function placePlayerOnRamp(idx, x) {
    state.player.onRamp = idx;
    state.player.x = x;
    state.player.y = rampY(RAMPS[idx], x) - 4;
    state.player.vx = 0; state.player.vy = 0;
    state.player.climbing = false; state.player.jumping = false;
    state.player.dead = false; state.player.deadTimer = 0;
  }

  function reset() {
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.over = false; state.won = false; state.paused = false;
    state.t = 0;
    state.barrels.length = 0;
    state.spawnTimer = 1.0;
    state.barrels_spawned = 0;
    state.ape.throwTimer = 1.5;
    state.ape.throwing = 0;
    state.ape.throwPhase = 0;
    state.ape.armAngle = 0;
    state.ape.beatingChest = 0;
    placePlayerOnRamp(0, 100);
    modal.style.display = "none";
  }
  document.getElementById("restart").onclick = reset;
  reset();

  function loseLife() {
    if (state.player.dead) return;
    state.player.dead = true;
    state.player.deadTimer = 1.4;
    state.lives--;
    play('hit');
    if (state.lives <= 0) {
      state.over = true;
      setTimeout(() => {
        endTitleEl.textContent = "GAME OVER";
        endScoreEl.textContent = state.score;
        modal.style.display = "grid";
      }, 1400);
    }
  }
  function win() {
    if (state.won || state.over) return;
    state.won = true;
    state.score += 1000;
    play('win');
    setTimeout(() => {
      endTitleEl.textContent = "★ YOU SAVED HER! ★";
      endScoreEl.textContent = state.score;
      modal.style.display = "grid";
    }, 800);
  }

  // ---------- barrel spawning & physics ----------
  // For each ramp index, find the ladder reaching DOWN from it (rampLow === idx-1).
  // Pick the one farthest from the spawn-side to force a full ramp traversal.
  function pickExitLadder(rampIdx, dir) {
    if (rampIdx <= 0) return null;
    const lads = LADDERS.filter(L => L.rampLow === rampIdx - 1);
    if (!lads.length) return null;
    // dir = +1 means rolling right → exit ladder should be the RIGHTMOST one
    // dir = -1 means rolling left  → exit ladder should be the LEFTMOST one
    return dir > 0
      ? lads.reduce((a,b) => b.x > a.x ? b : a)
      : lads.reduce((a,b) => b.x < a.x ? b : a);
  }

  function spawnBarrel() {
    // Ape at top platform throws a barrel onto ramp 4 (the one below top)
    const ramp = RAMPS[4];
    // Start at the LEFT edge so it rolls all the way right (or right edge for opposite slope)
    const slope = rampSlope(ramp);
    const dir = slope >= 0 ? 1 : -1;
    const x = dir > 0 ? ramp.x1 + 30 : ramp.x2 - 30;
    const y = rampY(ramp, x) - 10;
    const exitLad = pickExitLadder(4, dir);
    state.barrels.push({
      x, y, vx: 0, vy: 0,
      onRamp: 4,
      falling: false,
      onLadder: false,
      ladderRef: null,
      exitLadder: exitLad,
      rotation: 0,
      dir,
      age: 0,
    });
    state.barrels_spawned++;
    play('roll');
  }

  function updateBarrels(dt) {
    for (let i = state.barrels.length-1; i >= 0; i--) {
      const b = state.barrels[i];
      b.age += dt;

      if (b.onLadder) {
        // sliding down a ladder
        b.vy += 380 * dt;
        b.y += b.vy * dt;
        b.rotation += dt * 8;
        if (b.y >= b.ladderRef.yBottom - 6) {
          // landed on lower ramp — now reverse direction (zig-zag) and pick next exit ladder
          const newRamp = b.ladderRef.rampLow;
          b.y = rampY(RAMPS[newRamp], b.x) - 10;
          b.onRamp = newRamp;
          b.onLadder = false;
          b.ladderRef = null;
          b.vy = 0;
          // ZIG-ZAG: reverse direction each level (classic DK behaviour).
          // Determine direction from which side of the ramp we landed on:
          // if we landed near the LEFT end, roll right; near the RIGHT end, roll left.
          const r = RAMPS[newRamp];
          const mid = (r.x1 + r.x2) / 2;
          b.dir = b.x < mid ? 1 : -1;
          b.exitLadder = pickExitLadder(newRamp, b.dir);
          play('roll');
        }
      } else if (b.falling) {
        // free-falling off a ramp's edge
        b.vy += 700 * dt;
        b.y += b.vy * dt;
        b.x += b.vx * dt;
        b.rotation += dt * 6;
        // land on next lower ramp if any
        for (let k = b.onRamp - 1; k >= 0; k--) {
          const r = RAMPS[k];
          if (b.x < r.x1 - 10 || b.x > r.x2 + 10) continue;
          const ry = rampY(r, b.x);
          if (b.y >= ry - 10 && b.y - b.vy*dt < ry - 10 + 5) {
            b.y = ry - 10;
            b.onRamp = k;
            b.falling = false;
            b.vy = 0; b.vx = 0;
            b.dir = rampSlope(r) >= 0 ? 1 : -1;
            play('roll');
            break;
          }
        }
        if (b.y > H + 40) { state.barrels.splice(i,1); continue; }
      } else {
        // rolling along ramp
        const ramp = RAMPS[b.onRamp];
        const speed = 110 + state.level * 10;
        const prevX = b.x;
        b.x += b.dir * speed * dt;
        b.y = rampY(ramp, b.x) - 10;
        b.rotation += b.dir * dt * 8;

        // Did we ROLL OVER our assigned exit ladder this frame? Take it.
        if (b.exitLadder && b.onRamp > 0) {
          const lx = b.exitLadder.x;
          const crossed = (prevX - lx) * (b.x - lx) <= 0; // sign change
          if (crossed || Math.abs(b.x - lx) < 6) {
            b.onLadder = true;
            b.ladderRef = b.exitLadder;
            b.exitLadder = null;
            b.vy = 100;
            b.x = lx;
            continue;
          }
        }

        // Reached the END of the ramp without (or after) the ladder?
        if (b.x > ramp.x2 - 14 || b.x < ramp.x1 + 14) {
          if (b.onRamp === 0) {
            // off bottom — remove
            state.barrels.splice(i,1);
            state.score += 50;
            continue;
          }
          // Fallback: if for some reason we missed the ladder, drop off edge
          b.falling = true;
          b.vx = b.dir * 30;
          b.vy = 50;
          continue;
        }
      }
    }
  }

  // ---------- player update ----------
  function updatePlayer(dt) {
    const p = state.player;
    if (p.dead) {
      p.deadTimer -= dt;
      p.animTime += dt;
      if (p.deadTimer <= 0 && !state.over) {
        placePlayerOnRamp(0, 100);
      }
      return;
    }

    p.animTime += dt;

    if (p.climbing) {
      // up/down on a ladder
      const ladder = p.ladderRef;
      let vy = 0;
      if (keys.up) vy = -90;
      else if (keys.down) vy = 90;
      p.y += vy * dt;
      p.vy = vy;

      if (vy !== 0) p.animFrame = Math.floor(p.animTime * 6) % 2;

      // Reached top of ladder?
      if (p.y <= ladder.yTop) {
        p.y = ladder.yTop - 4;
        p.onRamp = ladder.rampLow + 1;
        p.climbing = false; p.ladderRef = null;
        p.x = ladder.x;
      }
      // Reached bottom?
      else if (p.y >= ladder.yBottom - 4) {
        p.y = ladder.yBottom - 4;
        p.onRamp = ladder.rampLow;
        p.climbing = false; p.ladderRef = null;
        p.x = ladder.x;
      }

      // Allow stepping off mid-ladder onto a ramp if close
      if (keys.left || keys.right) {
        const lowerY = ladder.yBottom;
        const upperY = ladder.yTop;
        if (Math.abs(p.y - lowerY) < 10) {
          p.climbing = false; p.ladderRef = null;
          p.onRamp = ladder.rampLow;
          p.y = lowerY - 4;
        } else if (Math.abs(p.y - upperY) < 10) {
          p.climbing = false; p.ladderRef = null;
          p.onRamp = ladder.rampLow + 1;
          p.y = upperY - 4;
        }
      }
      return;
    }

    if (p.jumping) {
      p.vy += 1100 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.jumpTimer += dt;
      // Land back on current ramp?
      const ramp = RAMPS[p.onRamp];
      if (p.x < ramp.x1 + 8) p.x = ramp.x1 + 8;
      if (p.x > ramp.x2 - 8) p.x = ramp.x2 - 8;
      const targetY = rampY(ramp, p.x) - 4;
      if (p.vy > 0 && p.y >= targetY) {
        p.y = targetY;
        p.vy = 0; p.vx = 0;
        p.jumping = false;
      }
      return;
    }

    // Walking on a ramp
    const speed = 150;
    let vx = 0;
    if (keys.left) { vx = -speed; p.facing = -1; }
    else if (keys.right) { vx = speed; p.facing = 1; }
    p.vx = vx;
    p.x += vx * dt;

    const ramp = RAMPS[p.onRamp];
    if (p.x < ramp.x1 + 10) p.x = ramp.x1 + 10;
    if (p.x > ramp.x2 - 10) p.x = ramp.x2 - 10;
    p.y = rampY(ramp, p.x) - 4;

    if (vx !== 0) p.animFrame = Math.floor(p.animTime * 8) % 4;
    else p.animFrame = 0;

    // Try ladder
    const { up, down } = ladderAtX(p.onRamp, p.x);
    if (keys.up && up) {
      p.climbing = true;
      p.ladderRef = up;
      p.x = up.x;
      // stand on the ladder near bottom (which is at this ramp)
      p.y = up.yBottom - 6;
      return;
    }
    if (keys.down && down) {
      p.climbing = true;
      p.ladderRef = down;
      p.x = down.x;
      p.y = down.yTop + 4;
      return;
    }

    // Jump
    if (pressed.jump) {
      p.jumping = true;
      p.vy = -420;
      p.vx = vx * 0.9;
      p.jumpTimer = 0;
      play('jump');
    }

    // Reached top — check win
    if (p.onRamp === RAMPS.length - 1 && Math.abs(p.x - state.princess.x) < 40) {
      win();
    }
  }

  // ---------- collisions ----------
  function checkBarrelHits() {
    if (state.player.dead) return;
    const p = state.player;
    for (const b of state.barrels) {
      const dx = b.x - p.x;
      const dy = b.y - (p.y - 22);
      if (Math.abs(dx) < 22 && Math.abs(dy) < 26) {
        // Did the player jump over it?
        if (p.jumping && p.y < b.y - 10 && p.vy < 0) {
          if (!b.jumpedOver) {
            b.jumpedOver = true;
            state.score += 100;
          }
          continue;
        }
        loseLife();
        return;
      }
    }
  }

  // ---------- update ----------
  function update(dt) {
    if (pressed.restart) reset();
    if (pressed.pause) state.paused = !state.paused;
    if (state.paused || state.over || state.won) return;

    state.t += dt;
    state.frameCount++;
    state.ape.animTime += dt;
    state.ape.throwTimer -= dt;

    if (state.ape.throwing > 0) {
      state.ape.throwing -= dt;
      // Phases: 0.9-0.6 windup (lift barrel high), 0.6-0.2 hold, 0.2-0 release/follow-through
      const t = state.ape.throwing;
      if (t > 0.6) state.ape.throwPhase = 1;        // windup
      else if (t > 0.2) state.ape.throwPhase = 2;   // hold high
      else state.ape.throwPhase = 3;                 // release/follow-through
      state.ape.armAngle = state.ape.throwPhase === 3 ? -1.2 : (state.ape.throwPhase === 2 ? -1.8 : -0.9);
    } else {
      state.ape.throwPhase = 0;
      state.ape.beatingChest = Math.max(0, state.ape.beatingChest - dt);
    }

    if (state.ape.throwTimer <= 0) {
      state.ape.throwing = 0.9;            // total windup→throw duration
      state.ape.throwPhase = 1;
      state.ape.beatingChest = 0.6;        // chest-beat between throws
      // Spawn the barrel slightly delayed (at release) — schedule via throwing timer
      setTimeout(() => { if (!state.over && !state.won) spawnBarrel(); }, 700);
      state.ape.throwTimer = 2.6 + Math.random() * 1.8 - Math.min(1.0, state.level * 0.1);
    }

    updatePlayer(dt);
    updateBarrels(dt);
    checkBarrelHits();
  }

  // ---------- drawing ----------
  function drawBackground() {
    // black sky with stars
    ctx.fillStyle = "#0a0a18";
    ctx.fillRect(0,0,W,H);
    // subtle scanlines
    ctx.fillStyle = "rgba(255,255,255,0.02)";
    for (let y = 0; y < H; y += 4) ctx.fillRect(0,y,W,1);
    // title strip
    ctx.fillStyle = "#ff2266";
    ctx.fillRect(0, 0, W, 4);
    ctx.fillRect(0, H-4, W, 4);
  }

  function drawRamp(ramp) {
    // pink steel girder drawn as tiled segments along the slope
    const dx = ramp.x2 - ramp.x1;
    const dy = ramp.y2 - ramp.y1;
    const len = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    const segH = 20;
    ctx.save();
    ctx.translate(ramp.x1, ramp.y1);
    ctx.rotate(ang);
    if (ASSETS.girder) {
      const tileW = 64;
      for (let x = 0; x < len; x += tileW) {
        const w = Math.min(tileW, len - x);
        ctx.drawImage(ASSETS.girder, 0, 0, ASSETS.girder.width, ASSETS.girder.height,
                      x, 0, w, segH);
      }
    } else {
      ctx.fillStyle = "#ff2266";
      ctx.fillRect(0, 0, len, segH);
      ctx.fillStyle = "#aa0044";
      for (let x = 0; x < len; x += 16) ctx.fillRect(x, segH-4, 8, 4);
    }
    ctx.restore();
  }

  function drawLadder(L) {
    const x = L.x;
    const y1 = L.yTop;
    const y2 = L.yBottom;
    const w = 28;
    if (ASSETS.ladder) {
      const tileH = 32;
      for (let yy = y1; yy < y2; yy += tileH) {
        const h = Math.min(tileH, y2 - yy);
        ctx.drawImage(ASSETS.ladder, 0, 0, ASSETS.ladder.width, ASSETS.ladder.height,
                      x - w/2, yy, w, h);
      }
    } else {
      ctx.strokeStyle = "#22ddff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x-w/2, y1); ctx.lineTo(x-w/2, y2);
      ctx.moveTo(x+w/2, y1); ctx.lineTo(x+w/2, y2);
      ctx.stroke();
      ctx.lineWidth = 2;
      for (let yy = y1; yy < y2; yy += 12) {
        ctx.beginPath();
        ctx.moveTo(x-w/2, yy); ctx.lineTo(x+w/2, yy);
        ctx.stroke();
      }
    }
  }

  function drawApe() {
    const a = state.ape;
    const sway = Math.sin(a.animTime * 3) * 3;
    const size = 170;

    // chest-beat squash/stretch
    let scaleX = 1, scaleY = 1, lift = 0, tilt = 0;
    if (a.beatingChest > 0) {
      const t = a.beatingChest;
      scaleX = 1 + Math.sin(t * 30) * 0.06;
      scaleY = 1 - Math.sin(t * 30) * 0.06;
    }
    if (a.throwing > 0) {
      if (a.throwPhase === 1) { lift = -6; tilt = -0.08; }     // windup: lean back
      else if (a.throwPhase === 2) { lift = -14; tilt = -0.04; } // hold high
      else if (a.throwPhase === 3) { lift = 4; tilt = 0.18; }    // throw forward
    }

    ctx.save();
    ctx.translate(a.x + sway, a.y + lift);
    ctx.rotate(tilt);
    ctx.scale(scaleX, scaleY);
    if (ASSETS.ape) {
      ctx.drawImage(ASSETS.ape, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = "#5a3a1a";
      ctx.fillRect(-40, -50, 80, 90);
    }
    ctx.restore();

    // Animated arm + barrel during throw (drawn ON TOP of the ape sprite)
    if (a.throwing > 0 || a.beatingChest > 0) {
      const armPivotX = a.x + 8;
      const armPivotY = a.y - 10;
      // chest-beat: two fists pounding chest
      if (a.beatingChest > 0 && a.throwing <= 0) {
        const beat = Math.sin(a.beatingChest * 30) * 8;
        ctx.fillStyle = "#3a2410";
        ctx.beginPath(); ctx.arc(a.x - 22, a.y + 8 + beat, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(a.x + 22, a.y + 8 - beat, 12, 0, Math.PI*2); ctx.fill();
      }
      // throwing arm + held barrel
      if (a.throwing > 0) {
        const ang = a.armAngle;
        const armLen = 50;
        const hx = armPivotX + Math.cos(ang) * armLen;
        const hy = armPivotY + Math.sin(ang) * armLen;
        // arm
        ctx.strokeStyle = "#3a2410";
        ctx.lineCap = "round";
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.moveTo(armPivotX, armPivotY);
        ctx.lineTo(hx, hy);
        ctx.stroke();
        // fist
        ctx.fillStyle = "#4a2e14";
        ctx.beginPath(); ctx.arc(hx, hy, 10, 0, Math.PI*2); ctx.fill();
        // held barrel above (only during windup/hold)
        if (a.throwPhase === 1 || a.throwPhase === 2) {
          const bx = hx, by = hy - 6;
          ctx.save();
          ctx.translate(bx, by);
          ctx.rotate(a.animTime * 4);
          if (ASSETS.barrel) ctx.drawImage(ASSETS.barrel, -22, -22, 44, 44);
          else { ctx.fillStyle = "#b87333"; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill(); }
          ctx.restore();
        }
      }
    }

    // "!" exclamation puff right before throw release
    if (a.throwing > 0 && a.throwPhase === 1) {
      ctx.fillStyle = "#ffe04a";
      ctx.font = "bold 22px monospace";
      ctx.textAlign = "center";
      const wobble = Math.sin(a.animTime * 30) * 2;
      ctx.fillText("!", a.x + 40, a.y - 70 + wobble);
    }
  }

  function drawPrincess() {
    const pr = state.princess;
    const bob = Math.sin(state.t * 2) * 2;
    if (ASSETS.princess) {
      ctx.drawImage(ASSETS.princess, pr.x - 32, pr.y - 72 + bob, 64, 84);
    } else {
      ctx.fillStyle = "#ffaadd";
      ctx.fillRect(pr.x-12, pr.y-40+bob, 24, 40);
    }
    // HELP! text bubble
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "center";
    const ttxt = Math.floor(state.t * 2) % 2 === 0 ? "HELP!" : "★HELP★";
    ctx.fillText(ttxt, pr.x, pr.y - 60 + bob);
  }

  function drawJumpman() {
    const p = state.player;
    const w = 64, h = 68;
    let img = ASSETS.jumpman;
    let bobY = 0;
    if (p.dead) {
      // spin death anim
      ctx.save();
      ctx.translate(p.x, p.y - h/2);
      ctx.rotate(p.animTime * 14);
      ctx.fillStyle = "#ffe04a";
      if (img) ctx.drawImage(img, -w/2, -h/2, w, h);
      else { ctx.fillStyle = "#ff2266"; ctx.fillRect(-w/2,-h/2,w,h); }
      ctx.restore();
      // X eyes
      ctx.fillStyle = "#fff";
      ctx.font = "bold 16px monospace";
      ctx.textAlign = "center";
      ctx.fillText("✖", p.x, p.y - h - 4);
      return;
    }
    let extraRot = 0;
    let squash = 1, stretch = 1;
    if (p.climbing) {
      img = ASSETS.jumpman_climb || img;
      bobY = Math.sin(p.animTime * 10) * 1.5;
      // alternating side-to-side on the ladder
      extraRot = Math.sin(p.animTime * 8) * 0.08;
    } else if (p.jumping) {
      img = ASSETS.jumpman_jump || img;
      // stretch up on ascend, squash on descend
      if (p.vy < 0) { stretch = 1.12; squash = 0.92; extraRot = -0.1 * p.facing; }
      else { stretch = 0.92; squash = 1.08; extraRot = 0.12 * p.facing; }
    } else {
      // running bob — 4-frame cycle
      if (Math.abs(p.vx) > 1) {
        const f = p.animFrame % 4;
        bobY = (f === 1 || f === 3) ? -3 : 0;
        extraRot = Math.sin(p.animTime * 18) * 0.08;
      }
    }

    ctx.save();
    ctx.translate(p.x, p.y - h/2 + bobY);
    // Tilt with ramp when walking
    if (!p.climbing && !p.jumping) {
      const slope = rampSlope(RAMPS[p.onRamp]);
      ctx.rotate(Math.atan(slope));
    }
    ctx.rotate(extraRot);
    if (p.facing === -1 && !p.climbing) ctx.scale(-1, 1);
    ctx.scale(stretch, squash);
    if (img) {
      ctx.drawImage(img, -w/2, -h/2, w, h);
    } else {
      ctx.fillStyle = "#ff2266";
      ctx.fillRect(-w/2, -h/2, w, h);
    }
    ctx.restore();

    // little dust puffs while running
    if (!p.climbing && !p.jumping && Math.abs(p.vx) > 1 && (state.frameCount % 6 === 0)) {
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      const dx = p.x - p.facing * 18;
      ctx.beginPath(); ctx.arc(dx, p.y - 2, 3 + Math.random()*2, 0, Math.PI*2); ctx.fill();
    }
    // jump streak
    if (p.jumping && p.vy < 0) {
      ctx.fillStyle = "rgba(255,224,74,0.4)";
      ctx.beginPath(); ctx.arc(p.x, p.y + 6, 4, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawBarrel(b) {
    const size = 44;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rotation);
    if (ASSETS.barrel) {
      ctx.drawImage(ASSETS.barrel, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = "#b87333";
      ctx.beginPath();
      ctx.ellipse(0, 0, size/2, size/2 - 4, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#222";
      ctx.fillRect(-size/2, -3, size, 2);
    }
    ctx.restore();
  }

  function drawHUD() {
    if (state.paused) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = "#ffe04a";
      ctx.font = "bold 48px monospace";
      ctx.textAlign = "center";
      ctx.fillText("PAUSED", W/2, H/2);
    }
    if (state.won && !modal.style.display.includes("grid")) {
      ctx.fillStyle = "#ffe04a";
      ctx.font = "bold 36px monospace";
      ctx.textAlign = "center";
      ctx.fillText("★ RESCUED ! ★", W/2, H/2);
    }
  }

  function draw() {
    drawBackground();
    // ramps
    for (const r of RAMPS) drawRamp(r);
    // ladders
    for (const L of LADDERS) drawLadder(L);
    // princess on top
    drawPrincess();
    // ape
    drawApe();
    // barrels
    for (const b of state.barrels) drawBarrel(b);
    // player
    drawJumpman();
    drawHUD();
  }

  // ---------- main loop ----------
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
      scoreEl.textContent = state.score;
      livesEl.textContent = state.lives;
      levelEl.textContent = state.level;
    } catch (err) {
      console.error("game crashed:", err);
    }
    for (const k in pressed) pressed[k] = false;
    requestAnimationFrame(frame);
  }

  loadAssets().then(() => {
    last = performance.now();
    requestAnimationFrame(frame);
  });
})();
</script>
</body></html>
