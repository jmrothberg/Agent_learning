<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>2D Fighting Game</title>
<style>
   :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0b1020; color:#e7ecff;
    font:16px/1.4 system-ui,sans-serif; overflow:hidden; }
   #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#10162e; border-radius:12px; box-shadow:0 10px 40px #0008;
    max-width:96vw; max-height:90vh; touch-action:none; }
   #hud { position:fixed; top:12px; left:12px; right:12px; display:flex; justify-content:space-between; align-items:center; pointer-events:none; }
   .health-container { width:40%; display:flex; flex-direction:column; gap:4px; }
   .health-container.right { align-items:flex-end; }
   .health-label { font-size:14px; font-weight:bold; }
   .health-bar-bg { width:100%; height:24px; background:#333; border-radius:4px; overflow:hidden; border:2px solid #555; }
   .health-bar-fill { height:100%; transition: width 0.15s; }
   #p1-health-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); width:100%; }
   #cpu-health-fill { background: linear-gradient(90deg, #f87171, #ef4444); width:100%; }
   #help { position:fixed; bottom:12px; left:12px; opacity:.75; font-size:13px; pointer-events:none; }
   #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000a; backdrop-filter:blur(4px); }
   #modal .card { background:#1a2348; padding:24px 28px; border-radius:14px;
    text-align:center; box-shadow:0 20px 60px #000a; }
  button { background:#3b62ff; color:#fff; border:0; padding:10px 18px;
    border-radius:8px; font-size:15px; cursor:pointer; }
  button:hover { filter:brightness(1.1); }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="800" height="600"></canvas></div>
<div id="hud">
   <div class="health-container">
     <span class="health-label" style="color:#60a5fa;">PLAYER</span>
     <div id="p1-health" class="health-bar-bg"><div id="p1-health-fill" class="health-bar-fill"></div></div>
   </div>
   <div style="font-size:20px;font-weight:bold;">VS</div>
   <div class="health-container right">
     <span class="health-label" style="color:#f87171;">CPU</span>
     <div id="cpu-health" class="health-bar-bg"><div id="cpu-health-fill" class="health-bar-fill"></div></div>
   </div>
</div>
<div id="help">← → Move | ↑ Jump | J Punch | K Kick | L Block | Enter Restart</div>
<div id="modal"><div class="card">
   <h2 id="endTitle">Game Over</h2>
   <p id="endMsg"></p>
   <button id="restart">Play again</button>
</div></div>
<script>
(() => {
"use strict";

const cvs = document.getElementById("c");
const ctx = cvs.getContext("2d");
const modal = document.getElementById("modal");
const endTitleEl = document.getElementById("endTitle");
const endMsgEl = document.getElementById("endMsg");
const p1HealthFill = document.getElementById("p1-health-fill");
const cpuHealthFill = document.getElementById("cpu-health-fill");

function fit() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const w = 800, h = 600;
  cvs.width = w*dpr; cvs.height = h*dpr;
  cvs.style.width = w+"px"; cvs.style.height = h+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
fit(); addEventListener("resize", fit);

// --- ASSET LOADING ---
const ASSETS = {};
const SPRITE_W = 64, SPRITE_H = 64;

async function loadAssets() {
  const entries = [
    ['player_idle', './build-a-full-working-2d-fighti_20260518_112154_assets/player_idle.png'],
    ['player_punch', './build-a-full-working-2d-fighti_20260518_112154_assets/player_punch.png'],
    ['player_kick', './build-a-full-working-2d-fighti_20260518_112154_assets/player_kick.png'],
    ['cpu_idle', './build-a-full-working-2d-fighti_20260518_112154_assets/cpu_idle.png'],
    ['cpu_punch', './build-a-full-working-2d-fighti_20260518_112154_assets/cpu_punch.png'],
    ['cpu_kick', './build-a-full-working-2d-fighti_20260518_112154_assets/cpu_kick.png'],
    ['ground_tile', './build-a-full-working-2d-fighti_20260518_112154_assets/ground_tile.png'],
  ];
  for (const [name, src] of entries) {
    const img = new Image();
    img.src = src;
    try { await img.decode(); } catch(e) { /* fallback to procedural */ }
    ASSETS[name] = img;
  }
}

// --- SOUND LOADING ---
const SOUNDS = {};
let _audioStarted = false;

function loadSounds() {
  const entries = [
    ['punch_hit', './build-a-full-working-2d-fighti_20260518_112154_sounds/punch_hit.ogg', false],
    ['kick_hit', './build-a-full-working-2d-fighti_20260518_112154_sounds/kick_hit.ogg', false],
    ['block', './build-a-full-working-2d-fighti_20260518_112154_sounds/block.ogg', false],
    ['ko', './build-a-full-working-2d-fighti_20260518_112154_sounds/ko.ogg', false],
    ['round_start', './build-a-full-working-2d-fighti_20260518_112154_sounds/round_start.ogg', false],
  ];
  for (const [name, src, loop] of entries) {
    const a = new Audio(src);
    a.loop = loop;
    SOUNDS[name] = a;
  }
}

function playSound(name) {
  const base = SOUNDS[name]; if (!base) return;
  const inst = base.cloneNode();
  inst.volume = 0.6;
  inst.play().catch(()=>{});
}

function _startAudio() {
  if (_audioStarted) return;
  _audioStarted = true;
}
window.addEventListener('keydown', _startAudio, {once:true});
window.addEventListener('pointerdown', _startAudio, {once:true});

// --- INPUT ---
const keys = Object.create(null);
const pressed = Object.create(null);

addEventListener("keydown", e => {
  const code = e.code;
  if (!keys[code]) pressed[code] = true;
  keys[code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(code)) e.preventDefault();
  if (['KeyJ','KeyK','KeyL'].includes(code)) e.preventDefault();
}, { passive:false });
addEventListener("keyup", e => { keys[e.code] = false; });

// --- FIGHTER CLASS ---
const GROUND_Y = 480;
const GRAVITY = 1200;
const MOVE_SPEED = 260;
const JUMP_VEL = -520;
const MAX_HP = 100;

function createFighter(x, facing, colors) {
  return {
    x: x,
    y: GROUND_Y,
    vx: 0,
    vy: 0,
    facing: facing, // 1 = right, -1 = left
    hp: MAX_HP,
    state: 'idle', // idle, walk, jump, punch, kick, block, hitstun, ko
    stateTimer: 0,
    colors: colors,
    width: SPRITE_W,
    height: SPRITE_H,
    hitCooldown: 0,
    animFrame: 0,
    grounded: true,
    hurtFlash: 0,
  };
}

// --- GAME STATE ---
const state = {
  player: null,
  cpu: null,
  frame: 0,
  paused: false,
  over: false,
  t: 0,
  winner: null,
  roundStartTimer: 2,
  cpuTimer: 0,
  cpuDecision: 'idle',
  cpuActionTimer: 0,
  hitsLanded: 0,
  restartCount: 0,
  loaded: false,
};

// Expose state for probes
window.state = state;

function reset() {
  state.player = createFighter(200, 1, { body: '#3b82f6', outline: '#1e40af' });
  state.cpu = createFighter(600, -1, { body: '#ef4444', outline: '#991b1b' });
  state.paused = false;
  state.over = false;
  state.t = 0;
  state.frame = 0;
  state.winner = null;
  state.roundStartTimer = 2;
  state.cpuTimer = 0;
  state.cpuDecision = 'idle';
  state.cpuActionTimer = 0;
  state.hitsLanded = 0;
  state.restartCount++;
  modal.style.display = "none";
  updateHealthBars();
  playSound('round_start');
}

function updateHealthBars() {
  if (state.player) {
    const pct = Math.max(0, state.player.hp / MAX_HP * 100);
    p1HealthFill.style.width = pct + '%';
  }
  if (state.cpu) {
    const pct = Math.max(0, state.cpu.hp / MAX_HP * 100);
    cpuHealthFill.style.width = pct + '%';
  }
}

// --- UPDATE FIGHTER ---
function updateFighter(f, dt, input) {
  // Update facing to face opponent
  const opponent = (f === state.player) ? state.cpu : state.player;
  if (opponent) {
    f.facing = (f.x < opponent.x) ? 1 : -1;
  }

  // Hurt flash decay
  if (f.hurtFlash > 0) f.hurtFlash -= dt * 5;
  if (f.hitCooldown > 0) f.hitCooldown -= dt;

  // State machine
  switch (f.state) {
    case 'idle':
      if (input.left) {
        f.vx = -MOVE_SPEED;
        f.state = 'walk';
      } else if (input.right) {
        f.vx = MOVE_SPEED;
        f.state = 'walk';
      } else {
        f.vx = 0;
      }
      if (input.jump && f.grounded) {
        f.vy = JUMP_VEL;
        f.grounded = false;
        f.state = 'jump';
      }
      if (input.punch) {
        f.state = 'punch';
        f.stateTimer = 0.3;
        f.vx = 0;
      }
      if (input.kick) {
        f.state = 'kick';
        f.stateTimer = 0.4;
        f.vx = 0;
      }
      if (input.block) {
        f.state = 'block';
        f.vx = 0;
      }
      break;

    case 'walk':
      f.vx = input.left ? -MOVE_SPEED : (input.right ? MOVE_SPEED : 0);
      if (!input.left && !input.right) f.state = 'idle';
      if (input.jump && f.grounded) {
        f.vy = JUMP_VEL;
        f.grounded = false;
        f.state = 'jump';
      }
      if (input.punch) { f.state = 'punch'; f.stateTimer = 0.3; f.vx = 0; }
      if (input.kick) { f.state = 'kick'; f.stateTimer = 0.4; f.vx = 0; }
      if (input.block) { f.state = 'block'; f.vx = 0; }
      break;

    case 'jump':
      if (input.left) f.vx = -MOVE_SPEED * 0.6;
      else if (input.right) f.vx = MOVE_SPEED * 0.6;
      else f.vx *= 0.95;
      if (input.punch) { f.state = 'punch'; f.stateTimer = 0.3; }
      if (input.kick) { f.state = 'kick'; f.stateTimer = 0.4; }
      break;

    case 'punch':
      f.stateTimer -= dt;
      f.vx *= 0.8;
      if (f.stateTimer <= 0) f.state = 'idle';
      break;

    case 'kick':
      f.stateTimer -= dt;
      f.vx *= 0.8;
      if (f.stateTimer <= 0) f.state = 'idle';
      break;

    case 'block':
      f.vx = 0;
      if (!input.block) f.state = 'idle';
      break;

    case 'hitstun':
      f.stateTimer -= dt;
      f.vx *= 0.9;
      if (f.stateTimer <= 0) f.state = 'idle';
      break;

    case 'ko':
      f.vx *= 0.95;
      break;
  }

  // Physics
  if (!f.grounded) {
    f.vy += GRAVITY * dt;
  }
  f.x += f.vx * dt;
  f.y += f.vy * dt;

  // Ground collision
  if (f.y >= GROUND_Y) {
    f.y = GROUND_Y;
    f.vy = 0;
    if (!f.grounded) {
      f.grounded = true;
      if (f.state === 'jump') f.state = 'idle';
    }
  }

  // Screen bounds
  f.x = Math.max(SPRITE_W/2, Math.min(800 - SPRITE_W/2, f.x));
}

// --- HIT DETECTION ---
function checkHit(attacker, defender) {
  if (attacker.hitCooldown > 0) return false;
  if (defender.state === 'ko') return false;

  const attackRange = (attacker.state === 'kick') ? 75 : 65;
  const dx = defender.x - attacker.x;
  const dist = Math.abs(dx);

  // Check if attacker is facing defender and in range
  const facingCorrect = (attacker.facing === 1 && dx > 0) || (attacker.facing === -1 && dx < 0);

  if (facingCorrect && dist < attackRange && Math.abs(attacker.y - defender.y) < 60) {
    // Check if in active frames (middle 50% of attack duration)
    const totalDuration = (attacker.state === 'kick') ? 0.4 : 0.3;
    const elapsed = totalDuration - attacker.stateTimer;
    if (elapsed > totalDuration * 0.2 && elapsed < totalDuration * 0.8) {
      let damage = (attacker.state === 'kick') ? 15 : 10;

      if (defender.state === 'block') {
        damage = Math.floor(damage * 0.2);
        playSound('block');
      } else {
        if (attacker.state === 'kick') playSound('kick_hit');
        else playSound('punch_hit');
        defender.state = 'hitstun';
        defender.stateTimer = 0.3;
        defender.vx = (attacker.facing * 150);
        defender.hurtFlash = 1;
      }

      defender.hp = Math.max(0, defender.hp - damage);
      attacker.hitCooldown = 0.25;
      state.hitsLanded++;
      updateHealthBars();

      if (defender.hp <= 0) {
        defender.state = 'ko';
        defender.vx = attacker.facing * 200;
        defender.vy = -200;
        defender.grounded = false;
      }
      return true;
    }
  }
  return false;
}

// --- CPU AI ---
function updateCPU(dt) {
  const cpu = state.cpu;
  const player = state.player;
  if (!cpu || !player || cpu.state === 'ko') return;

  state.cpuTimer -= dt;
  state.cpuActionTimer -= dt;

  if (state.cpuTimer <= 0) {
    const dist = Math.abs(cpu.x - player.x);
    const r = Math.random();

    if (dist > 120) {
      // Too far - approach
      state.cpuDecision = 'approach';
      state.cpuTimer = 0.5 + Math.random() * 0.5;
    } else if (dist < 60) {
      // Close range
      if (player.state === 'punch' || player.state === 'kick') {
        if (r < 0.5) {
          state.cpuDecision = 'block';
          state.cpuTimer = 0.3 + Math.random() * 0.3;
        } else {
          state.cpuDecision = 'counter';
          state.cpuTimer = 0.15 + Math.random() * 0.15;
        }
      } else {
        if (r < 0.4) {
          state.cpuDecision = 'punch';
          state.cpuTimer = 0.3;
        } else if (r < 0.7) {
          state.cpuDecision = 'kick';
          state.cpuTimer = 0.4;
        } else if (r < 0.85) {
          state.cpuDecision = 'approach';
          state.cpuTimer = 0.4;
        } else {
          state.cpuDecision = 'block';
          state.cpuTimer = 0.5;
        }
      }
    } else {
      // Mid range
      if (r < 0.35) {
        state.cpuDecision = 'approach';
        state.cpuTimer = 0.4;
      } else if (r < 0.6) {
        state.cpuDecision = 'kick';
        state.cpuTimer = 0.4;
      } else if (r < 0.8) {
        state.cpuDecision = 'punch';
        state.cpuTimer = 0.3;
      } else {
        state.cpuDecision = 'retreat';
        state.cpuTimer = 0.5;
      }
    }
  }

  // Execute decision
  const cpuInput = { left: false, right: false, jump: false, punch: false, kick: false, block: false };

  switch (state.cpuDecision) {
    case 'approach':
      if (cpu.x > player.x) cpuInput.left = true;
      else cpuInput.right = true;
      // Random jump occasionally
      if (Math.random() < 0.02 && cpu.grounded) cpuInput.jump = true;
      break;
    case 'retreat':
      if (cpu.x > player.x) cpuInput.right = true;
      else cpuInput.left = true;
      break;
    case 'punch':
      if (state.cpuActionTimer <= 0) {
        cpuInput.punch = true;
        state.cpuActionTimer = 0.5 + Math.random() * 0.5;
      }
      break;
    case 'kick':
      if (state.cpuActionTimer <= 0) {
        cpuInput.kick = true;
        state.cpuActionTimer = 0.6 + Math.random() * 0.5;
      }
      break;
    case 'block':
      cpuInput.block = true;
      break;
    case 'counter':
      if (state.cpuActionTimer <= 0) {
        cpuInput.punch = true;
        state.cpuActionTimer = 0.4 + Math.random() * 0.4;
      }
      break;
  }

  updateFighter(cpu, dt, cpuInput);
}

// --- DRAWING ---
function drawFighter(f) {
  const cx = f.x;
  const cy = f.y;
  const flip = f.facing === -1;

  ctx.save();

  // Hurt flash
  if (f.hurtFlash > 0.5) {
    ctx.globalAlpha = 0.5 + Math.sin(state.t * 30) * 0.5;
  }

  // Determine sprite to use
  let spriteKey = '';
  const isPlayer = (f === state.player);

  if (f.state === 'ko') {
    spriteKey = isPlayer ? 'player_idle' : 'cpu_idle';
  } else if (f.state === 'punch') {
    spriteKey = isPlayer ? 'player_punch' : 'cpu_punch';
  } else if (f.state === 'kick') {
    spriteKey = isPlayer ? 'player_kick' : 'cpu_kick';
  } else {
    spriteKey = isPlayer ? 'player_idle' : 'cpu_idle';
  }

  const sprite = ASSETS[spriteKey];

  if (sprite && sprite.complete && sprite.naturalWidth > 0) {
    // Draw sprite with flip
    ctx.translate(cx, cy - SPRITE_H/2);
    if (flip) {
      ctx.scale(-1, 1);
    }
    ctx.drawImage(sprite, -SPRITE_W/2, -SPRITE_H/2, SPRITE_W, SPRITE_H);
  } else {
    // Procedural fallback
    const w = SPRITE_W;
    const h = SPRITE_H;
    const bx = cx - w/2;
    const by = cy - h;

    // Body
    ctx.fillStyle = f.hurtFlash > 0.5 ? '#fff' : f.colors.body;
    ctx.fillRect(bx + 10, by + 10, w - 20, h - 20);

    // Head
    ctx.fillStyle = f.hurtFlash > 0.5 ? '#fff' : f.colors.outline;
    ctx.fillRect(bx + 14, by, w - 28, 14);

    // Attack visual
    if (f.state === 'punch') {
      const extX = f.facing * 40;
      ctx.fillStyle = f.colors.body;
      ctx.fillRect(bx + w/2 + extX - 8, by + 18, 16, 10);
    }
    if (f.state === 'kick') {
      const extX = f.facing * 45;
      ctx.fillStyle = f.colors.body;
      ctx.fillRect(bx + w/2 + extX - 10, by + 40, 20, 12);
    }
    if (f.state === 'block') {
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(bx + 4, by + 8, 8, h - 16);
      ctx.fillRect(bx + w - 12, by + 8, 8, h - 16);
    }
  }

  ctx.restore();
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#2a2a5e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, GROUND_Y);

  // Stars
  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137 + 50) % 800;
    const sy = (i * 89 + 20) % (GROUND_Y - 50);
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Ground
  if (ASSETS.ground_tile && ASSETS.ground_tile.complete && ASSETS.ground_tile.naturalWidth > 0) {
    const gt = ASSETS.ground_tile;
    for (let gx = 0; gx < 800; gx += 64) {
      ctx.drawImage(gt, gx, GROUND_Y, 64, 600 - GROUND_Y);
    }
  } else {
    ctx.fillStyle = '#3a3a5e';
    ctx.fillRect(0, GROUND_Y, 800, 600 - GROUND_Y);
    // Ground line
    ctx.fillStyle = '#5a5a8e';
    ctx.fillRect(0, GROUND_Y, 800, 3);
    // Ground pattern
    ctx.fillStyle = '#2a2a4e';
    for (let gx = 0; gx < 800; gx += 40) {
      ctx.fillRect(gx, GROUND_Y + 10, 20, 2);
    }
  }
}

function drawRoundStart() {
  if (state.roundStartTimer > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px system-ui';
    ctx.textAlign = 'center';
    const text = Math.ceil(state.roundStartTimer) > 0 ? Math.ceil(state.roundStartTimer).toString() : 'FIGHT!';
    ctx.fillText(text, 400, 280);
    ctx.font = '20px system-ui';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Get Ready', 400, 320);
  }
}

function drawGameOver() {
  if (state.over) {
    ctx.fillStyle = '#0008';
    ctx.fillRect(0, 0, 800, 600);

    ctx.font = 'bold 56px system-ui';
    ctx.textAlign = 'center';
    if (state.winner === 'player') {
      ctx.fillStyle = '#60a5fa';
      ctx.fillText('YOU WIN!', 400, 250);
    } else {
      ctx.fillStyle = '#f87171';
      ctx.fillText('YOU LOSE!', 400, 250);
    }

    ctx.font = '22px system-ui';
    ctx.fillStyle = '#ccc';
    ctx.fillText('Press Enter to restart', 400, 320);
  }
}

function draw() {
  ctx.clearRect(0, 0, 800, 600);
  drawBackground();

  if (state.player && state.cpu) {
    drawFighter(state.player);
    drawFighter(state.cpu);
  }

  drawRoundStart();
  drawGameOver();

  // Debug state display
  ctx.fillStyle = '#ffffff44';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`P1: ${state.player ? state.player.state : '?'} | CPU: ${state.cpu ? state.cpu.state : '?'}`, 10, 590);
}

// --- MAIN LOOP ---
let lastTime = performance.now();

function update(dt) {
  if (state.over || state.paused) return;
  state.t += dt;
  state.frame++;

  // Round start countdown
  if (state.roundStartTimer > 0) {
    state.roundStartTimer -= dt;
    return;
  }

  // Player input
  const pInput = {
    left: keys['ArrowLeft'] || keys['KeyA'],
    right: keys['ArrowRight'] || keys['KeyD'],
    jump: keys['ArrowUp'] || keys['KeyW'],
    punch: pressed['KeyJ'],
    kick: pressed['KeyK'],
    block: keys['KeyL'],
  };

  updateFighter(state.player, dt, pInput);

  // CPU AI
  updateCPU(dt);

  // Hit detection - player attacks CPU
  checkHit(state.player, state.cpu);
  // Hit detection - CPU attacks player
  checkHit(state.cpu, state.player);

  // Check for KO
  if (state.player.hp <= 0 && state.player.state === 'ko') {
    state.over = true;
    state.winner = 'cpu';
    endTitleEl.textContent = 'YOU LOSE!';
    endMsgEl.textContent = `The CPU defeated you. Hits landed: ${state.hitsLanded}`;
    modal.style.display = 'grid';
    playSound('ko');
  }
  if (state.cpu.hp <= 0 && state.cpu.state === 'ko') {
    state.over = true;
    state.winner = 'player';
    endTitleEl.textContent = 'YOU WIN!';
    endMsgEl.textContent = `You defeated the CPU! Hits landed: ${state.hitsLanded}`;
    modal.style.display = 'grid';
    playSound('ko');
  }

  // Restart on Enter
  if (pressed['Enter'] && state.over) {
    reset();
  }
}

function frame(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  try {
    update(dt);
    draw();
    updateHealthBars();
  } catch (err) {
    console.error("game crashed:", err);
  }
  for (const k in pressed) pressed[k] = false;
  requestAnimationFrame(frame);
}

// --- INIT ---
async function init() {
  await loadAssets();
  loadSounds();
  reset();
  requestAnimationFrame(frame);
}

init();

document.getElementById("restart").onclick = () => {
  reset();
};

})();
</script>
