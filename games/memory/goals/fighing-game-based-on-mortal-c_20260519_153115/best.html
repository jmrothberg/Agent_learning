<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mortal Combat - Fighting Game</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0b1020; color:#e7ecff;
    font:16px/1.4 system-ui,sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#10162e; border-radius:12px; box-shadow:0 10px 40px #0008;
    max-width:96vw; max-height:90vh; touch-action:none; }
  #hud { position:fixed; top:12px; left:50%; transform:translateX(-50%);
    display:flex; gap:20px; align-items:center; pointer-events:none; }
  .health-bar { width:300px; height:28px; background:#333; border-radius:6px;
    border:2px solid #555; overflow:hidden; position:relative; }
  .health-fill { height:100%; transition:width 0.2s; border-radius:4px; }
  .health-p1 { background:linear-gradient(90deg,#2266ff,#44aaff); }
  .health-p2 { background:linear-gradient(90deg,#ff4422,#ff8844); }
  .health-label { position:absolute; top:2px; left:8px; font-size:13px;
    font-weight:700; color:#fff; text-shadow:1px 1px 2px #000; }
  #timer { font-size:32px; font-weight:900; color:#ffcc00;
    text-shadow:0 0 10px #ff8800; min-width:60px; text-align:center; }
  #help { position:fixed; bottom:12px; left:12px; opacity:.75; font-size:12px;
    background:#000a; padding:8px 12px; border-radius:8px; pointer-events:none; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000a; backdrop-filter:blur(4px); z-index:100; }
  #modal .card { background:#1a2348; padding:24px 28px; border-radius:14px;
    text-align:center; box-shadow:0 20px 60px #000a; }
  #modal h2 { font-size:36px; margin:0 0 12px; }
  #modal p { font-size:18px; margin:0 0 20px; }
  button { background:#3b62ff; color:#fff; border:0; padding:10px 18px;
    border-radius:8px; font-size:15px; cursor:pointer; }
  button:hover { filter:brightness(1.1); }
  #combo { position:fixed; top:50%; right:20px; transform:translateY(-50%);
    font-size:24px; font-weight:900; color:#ffcc00; pointer-events:none;
    text-shadow:0 0 10px #ff8800; opacity:0; transition:opacity 0.3s; }
</style></head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud">
  <div class="health-bar"><div class="health-fill health-p1" id="hp1" style="width:100%"></div>
    <span class="health-label">P1</span></div>
  <div id="timer">99</div>
  <div class="health-bar"><div class="health-fill health-p2" id="hp2" style="width:100%"></div>
    <span class="health-label">CPU</span></div>
</div>
<div id="help">←→/AD: Move | ↑/W: Jump | ↓/S: Duck | J/Space: Punch | K: Kick | L: Fireball | I/Shift: Block</div>
<div id="combo"></div>
<div id="modal"><div class="card">
  <h2 id="endTitle">K.O.!</h2>
  <p id="endMsg"></p>
  <button id="restart">FIGHT AGAIN</button>
</div></div>
<script>
(() => {
"use strict";

const ASSET_DIR = './fighing-game-based-on-mortal-c_20260519_153115_assets/';
const SOUND_DIR = './fighing-game-based-on-mortal-c_20260519_153115_sounds/';

const cvs = document.getElementById("c");
const ctx = cvs.getContext("2d");
const hp1El = document.getElementById("hp1");
const hp2El = document.getElementById("hp2");
const timerEl = document.getElementById("timer");
const modal = document.getElementById("modal");
const endTitle = document.getElementById("endTitle");
const endMsg = document.getElementById("endMsg");
const comboEl = document.getElementById("combo");

const W = 1280, H = 720;
const GROUND = H - 120;
const FIGHTER_W = 128, FIGHTER_H = 128;
const DISPLAY_W = FIGHTER_W * 2, DISPLAY_H = FIGHTER_H * 2;

const ASSETS = {};
const SOUNDS = {};
let audioStarted = false;

const SPRITE_NAMES = [
  'fighter1_idle','fighter1_punch','fighter1_kick','fighter1_hit','fighter1_ko',
  'fighter1_fireball','fighter1_jump','fighter1_duck','fighter1_block',
  'fighter2_idle','fighter2_punch','fighter2_kick','fighter2_hit','fighter2_ko',
  'fighter2_fireball','fighter2_jump','fighter2_duck','fighter2_block',
  'fireball','hit_spark','arena_bg'
];

const SOUND_NAMES = ['punch','kick','fireball_throw','fireball_hit','block','jump','ko','music'];

async function loadAssets() {
  const entries = SPRITE_NAMES.map(n => [n, ASSET_DIR + n + '.png']);
  for (const [name, src] of entries) {
    const img = new Image();
    img.src = src;
    try { await img.decode(); } catch(e) { console.warn('Asset load warning:', name); }
    ASSETS[name] = img;
  }
}

function loadSounds() {
  for (const name of SOUND_NAMES) {
    const a = new Audio(SOUND_DIR + name + '.ogg');
    a.loop = (name === 'music');
    SOUNDS[name] = a;
  }
}

function playSound(name) {
  const base = SOUNDS[name];
  if (!base) return;
  if (name === 'music') { base.play().catch(()=>{}); return; }
  const inst = base.cloneNode();
  inst.volume = 0.7;
  inst.play().catch(()=>{});
}

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  if (SOUNDS.music) SOUNDS.music.play().catch(()=>{});
}

addEventListener('keydown', () => startAudio(), { once: false });
addEventListener('pointerdown', () => startAudio(), { once: false });

function fit() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + "px"; cvs.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
fit();
addEventListener("resize", fit);

const keys = Object.create(null);
const pressed = Object.create(null);

addEventListener("keydown", e => {
  if (!keys[e.code]) pressed[e.code] = true;
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ShiftLeft'].includes(e.code)) e.preventDefault();
}, { passive: false });
addEventListener("keyup", e => { if (keys[e.code] !== undefined) keys[e.code] = false; });

const STATE = {
  p1: null, p2: null,
  fireballs: [], particles: [],
  timer: 99, timerAcc: 0,
  gameOver: false, paused: false,
  round: 1, p1Wins: 0, p2Wins: 0,
  hitFlash: 0, shakeX: 0, shakeY: 0
};

function createFighter(id, x, color) {
  return {
    id, x, y: GROUND, vx: 0, vy: 0,
    health: 100, maxHealth: 100,
    state: 'idle', stateTimer: 0,
    facing: id === 1 ? 1 : -1,
    color, grounded: true,
    hitStun: 0, blockStun: 0,
    combo: 0, comboTimer: 0,
    lastFireTime: 0,
    animFrame: 0,
    width: DISPLAY_W, height: DISPLAY_H,
    attackHit: false
  };
}

function reset() {
  STATE.p1 = createFighter(1, W * 0.3, '#2266ff');
  STATE.p2 = createFighter(2, W * 0.7, '#ff4422');
  STATE.player = STATE.p1;
  STATE.cpu = STATE.p2;
  STATE.fireballs = [];
  STATE.particles = [];
  STATE.timer = 99;
  STATE.timerAcc = 0;
  STATE.gameOver = false;
  STATE.paused = false;
  STATE.hitFlash = 0;
  STATE.shakeX = 0;
  STATE.shakeY = 0;
  modal.style.display = "none";
  updateHealthBars();
}

function updateHealthBars() {
  hp1El.style.width = Math.max(0, STATE.p1.health) + '%';
  hp2El.style.width = Math.max(0, STATE.p2.health) + '%';
}

function getSpriteName(fighter, state) {
  const prefix = fighter.id === 1 ? 'fighter1' : 'fighter2';
  return prefix + '_' + state;
}

function drawFighter(f) {
  const spriteName = getSpriteName(f, f.state);
  const img = ASSETS[spriteName];
  if (!img) {
    ctx.fillStyle = f.color;
    ctx.fillRect(f.x - f.width/2, f.y - f.height, f.width, f.height);
    return;
  }

  ctx.save();
  const cx = f.x;
  const cy = f.y - f.height / 2;
  const nativeFacing = f.id === 1 ? 1 : -1;
  const needsFlip = f.facing !== nativeFacing;

  if (needsFlip) {
    ctx.translate(cx + f.width/2, cy);
    ctx.scale(-1, 1);
    ctx.drawImage(img, -f.width, -f.height/2, f.width, f.height);
  } else {
    ctx.drawImage(img, cx - f.width/2, cy - f.height/2, f.width, f.height);
  }
  ctx.restore();
}

function drawBackground() {
  const bg = ASSETS['arena_bg'];
  if (bg) {
    ctx.drawImage(bg, 0, 0, W, H);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.6, '#1a1a3e');
    grad.addColorStop(1, '#2a2a4e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, GROUND, W, H - GROUND);

  ctx.strokeStyle = '#333366';
  ctx.lineWidth = 2;
  for (let i = 0; i < W; i += 80) {
    ctx.beginPath();
    ctx.moveTo(i, GROUND);
    ctx.lineTo(i, H);
    ctx.stroke();
  }
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    STATE.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 300,
      vy: (Math.random() - 0.5) * 300 - 100,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      color,
      size: 3 + Math.random() * 6
    });
  }
}

function addHitSpark(x, y) {
  const img = ASSETS['hit_spark'];
  if (img) {
    STATE.particles.push({
      x, y, vx: 0, vy: -50,
      life: 0.3, maxLife: 0.3,
      color: null, size: 60,
      isSpark: true, img
    });
  }
}

function addFireball(fighter) {
  const dir = fighter.facing;
  STATE.fireballs.push({
    x: fighter.x + dir * 60,
    y: fighter.y - 110,
    vx: dir * 900,
    vy: 0,
    owner: fighter.id,
    life: 8,
    size: 40
  });
  playSound('fireball_throw');
}

function checkHit(attacker, defender, damage, hitType) {
  if (defender.state === 'ko') return false;
  const dist = Math.abs(attacker.x - defender.x);
  const hitRange = hitType === 'punch' ? 120 : hitType === 'kick' ? 140 : hitType === 'fireball' ? 50 : 100;

  if (dist > hitRange) return false;

  if (defender.state === 'block') {
    const reduced = damage * 0.2;
    defender.health = Math.max(0, defender.health - reduced);
    defender.blockStun = 0.3;
    addParticles(defender.x, defender.y - 60, '#ffffff', 5);
    playSound('block');
    STATE.hitFlash = 0.1;
    return true;
  }

  if (defender.hitStun > 0) return false;

  defender.health = Math.max(0, defender.health - damage);
  defender.state = 'hit';
  defender.stateTimer = 0;
  defender.hitStun = hitType === 'fireball' ? 0.6 : hitType === 'kick' ? 0.4 : 0.3;
  defender.vx = attacker.facing * (hitType === 'kick' ? 200 : hitType === 'fireball' ? 300 : 100);

  addHitSpark(defender.x, defender.y - 60);
  addParticles(defender.x, defender.y - 60, hitType === 'fireball' ? '#ff6600' : '#ffffff', hitType === 'fireball' ? 20 : 10);

  STATE.hitFlash = hitType === 'fireball' ? 0.2 : 0.1;
  STATE.shakeX = hitType === 'fireball' ? 10 : hitType === 'kick' ? 6 : 3;
  STATE.shakeY = hitType === 'fireball' ? 8 : hitType === 'kick' ? 4 : 2;

  if (hitType === 'fireball') playSound('fireball_hit');
  else if (hitType === 'kick') playSound('kick');
  else playSound('punch');

  attacker.combo++;
  attacker.comboTimer = 2;

  if (attacker.combo >= 3) {
    comboEl.textContent = attacker.combo + ' HIT COMBO!';
    comboEl.style.opacity = 1;
    setTimeout(() => { comboEl.style.opacity = 0; }, 1000);
  }

  updateHealthBars();
  return true;
}

function updateFighter(f, opponent, dt) {
  if (f.state === 'ko') {
    f.x += f.vx * dt;
    f.vx *= 0.95;
    return;
  }

  f.stateTimer += dt;
  f.comboTimer -= dt;
  if (f.comboTimer <= 0) f.combo = 0;

  if (f.hitStun > 0) {
    f.hitStun -= dt;
    f.x += f.vx * dt;
    f.vx *= 0.9;
    if (f.hitStun <= 0 && f.health > 0) {
      f.state = 'idle';
      f.stateTimer = 0;
    }
    return;
  }

  if (f.blockStun > 0) {
    f.blockStun -= dt;
    if (f.blockStun <= 0) {
      f.state = 'idle';
      f.stateTimer = 0;
    }
    return;
  }

  const moveSpeed = 250;
  const jumpForce = -550;
  const gravity = 1200;

  switch (f.state) {
    case 'idle':
      f.vx *= 0.8;
      break;
    case 'punch':
      if (f.stateTimer < 0.12) {
        if (!f.attackHit) {
          if (checkHit(f, opponent, 8, 'punch')) {
            f.attackHit = true;
          }
        }
      }
      if (f.stateTimer >= 0.35) {
        f.state = 'idle'; f.stateTimer = 0; f.attackHit = false;
      }
      break;
    case 'kick':
      if (f.stateTimer < 0.15) {
        if (!f.attackHit) {
          if (checkHit(f, opponent, 12, 'kick')) {
            f.attackHit = true;
          }
        }
      }
      if (f.stateTimer >= 0.45) {
        f.state = 'idle'; f.stateTimer = 0; f.attackHit = false;
      }
      break;
    case 'fireball':
      if (f.stateTimer < 0.2 && !f.attackHit) {
        addFireball(f);
        f.attackHit = true;
      }
      if (f.stateTimer >= 0.5) {
        f.state = 'idle'; f.stateTimer = 0; f.attackHit = false;
      }
      break;
    case 'jump':
      if (!f.grounded) {
        f.vy += gravity * dt;
        f.y += f.vy * dt;
        if (f.y >= GROUND) {
          f.y = GROUND;
          f.grounded = true;
          f.vy = 0;
          f.state = 'idle';
          f.stateTimer = 0;
        }
      }
      break;
    case 'duck':
      f.vx *= 0.8;
      break;
    case 'block':
      f.vx *= 0.8;
      break;
    case 'hit':
      f.x += f.vx * dt;
      f.vx *= 0.92;
      if (f.stateTimer >= 0.4) {
        if (f.health > 0) {
          f.state = 'idle';
          f.stateTimer = 0;
        }
      }
      break;
  }

  if (f.state !== 'hit' && f.state !== 'ko') {
    f.x += f.vx * dt;
  }

  f.x = Math.max(60, Math.min(W - 60, f.x));

  if (f.grounded && f.state !== 'jump') {
    f.y = GROUND;
  }

  f.facing = opponent.x > f.x ? 1 : -1;
}

function updatePlayer(dt) {
  const f = STATE.p1;
  if (f.state === 'ko' || f.hitStun > 0 || f.blockStun > 0) return;

  const canAct = ['idle','duck','block','jump'].includes(f.state);

  if (canAct) {
    if (keys['ArrowLeft'] || keys['KeyA']) {
      f.x -= 250 * dt;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      f.x += 250 * dt;
    }
    if ((pressed['ArrowUp'] || pressed['KeyW']) && f.grounded && f.state !== 'jump') {
      f.state = 'jump';
      f.stateTimer = 0;
      f.vy = -550;
      f.grounded = false;
      playSound('jump');
    }
    if ((pressed['ArrowDown'] || pressed['KeyS']) && f.grounded) {
      f.state = 'duck';
      f.stateTimer = 0;
    }
    if ((pressed['KeyI'] || pressed['ShiftLeft']) && f.grounded) {
      f.state = 'block';
      f.stateTimer = 0;
    }
    if ((pressed['KeyJ'] || pressed['Space']) && f.grounded) {
      f.state = 'punch';
      f.stateTimer = 0;
      f.attackHit = false;
    }
    if (pressed['KeyK'] && f.grounded) {
      f.state = 'kick';
      f.stateTimer = 0;
      f.attackHit = false;
    }
    if (pressed['KeyL']) {
      f.state = 'fireball';
      f.stateTimer = 0;
      f.attackHit = false;
    }
  }

  if (f.state === 'duck' && !keys['ArrowDown'] && !keys['KeyS']) {
    f.state = 'idle';
    f.stateTimer = 0;
  }
  if (f.state === 'block' && !keys['KeyI'] && !keys['ShiftLeft']) {
    f.state = 'idle';
    f.stateTimer = 0;
  }
}

let aiTimer = 0;
let aiDecision = 'idle';
let aiDecisionTimer = 0;

function updateAI(dt) {
  const f = STATE.p2;
  const p = STATE.p1;
  if (f.state === 'ko' || f.hitStun > 0 || f.blockStun > 0) return;

  aiTimer += dt;
  aiDecisionTimer -= dt;

  const dist = Math.abs(f.x - p.x);
  const hasFireball = STATE.fireballs.some(fb => fb.owner === 1);

  if (aiDecisionTimer <= 0 || aiTimer > 1.5) {
    aiTimer = 0;
    const r = Math.random();

    if (hasFireball && dist < 300) {
      aiDecision = Math.random() < 0.6 ? 'block' : 'jump';
    } else if (dist < 130) {
      if (r < 0.35) aiDecision = 'punch';
      else if (r < 0.6) aiDecision = 'kick';
      else if (r < 0.8) aiDecision = 'block';
      else aiDecision = 'retreat';
    } else if (dist < 350) {
      if (r < 0.3) aiDecision = 'approach';
      else if (r < 0.5) aiDecision = 'fireball';
      else if (r < 0.7) aiDecision = 'approach';
      else aiDecision = 'idle';
    } else {
      if (r < 0.6) aiDecision = 'approach';
      else if (r < 0.8) aiDecision = 'fireball';
      else aiDecision = 'idle';
    }
    aiDecisionTimer = 0.3 + Math.random() * 0.8;
  }

  const canAct = ['idle','duck','block','jump'].includes(f.state);

  // Ensure AI always faces the player before acting
  f.facing = p.x > f.x ? 1 : -1;

  if (canAct) {
    switch (aiDecision) {
      case 'approach':
        f.x += (p.x > f.x ? 1 : -1) * 200 * dt;
        break;
      case 'retreat':
        f.x += (p.x > f.x ? -1 : 1) * 220 * dt;
        break;
      case 'punch':
        if (dist < 130) {
          f.state = 'punch';
          f.stateTimer = 0;
          f.attackHit = false;
          aiDecision = 'idle';
        } else {
          f.x += (p.x > f.x ? 1 : -1) * 220 * dt;
        }
        break;
      case 'kick':
        if (dist < 150) {
          f.state = 'kick';
          f.stateTimer = 0;
          f.attackHit = false;
          aiDecision = 'idle';
        } else {
          f.x += (p.x > f.x ? 1 : -1) * 220 * dt;
        }
        break;
      case 'fireball':
        f.state = 'fireball';
        f.stateTimer = 0;
        f.attackHit = false;
        aiDecision = 'idle';
        break;
      case 'block':
        f.state = 'block';
        f.stateTimer = 0;
        setTimeout(() => { if (f.state === 'block') { f.state = 'idle'; f.stateTimer = 0; } }, 800);
        break;
      case 'jump':
        if (f.grounded) {
          f.state = 'jump';
          f.stateTimer = 0;
          f.vy = -550;
          f.grounded = false;
          playSound('jump');
          aiDecision = 'idle';
        }
        break;
    }
  }
}

function updateFireballs(dt) {
  for (let i = STATE.fireballs.length - 1; i >= 0; i--) {
    const fb = STATE.fireballs[i];
    fb.x += fb.vx * dt;
    fb.life -= dt;

    if (fb.x < -50 || fb.x > W + 50 || fb.life <= 0) {
      STATE.fireballs.splice(i, 1);
      continue;
    }

    const target = fb.owner === 1 ? STATE.p2 : STATE.p1;
    const owner = fb.owner === 1 ? STATE.p1 : STATE.p2;
    const dist = Math.abs(fb.x - target.x);
    const dy = Math.abs((fb.y) - (target.y - 60));

    if (dist < 50 && dy < 80 && target.state !== 'ko') {
      checkHit(owner, target, 15, 'fireball');
      addParticles(fb.x, fb.y, '#ff6600', 15);
      STATE.fireballs.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = STATE.particles.length - 1; i >= 0; i--) {
    const p = STATE.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) STATE.particles.splice(i, 1);
  }
}

function drawFireballs() {
  const img = ASSETS['fireball'];
  for (const fb of STATE.fireballs) {
    if (img) {
      ctx.save();
      ctx.globalAlpha = 0.8 + Math.sin(fb.x * 0.1) * 0.2;
      ctx.drawImage(img, fb.x - fb.size/2, fb.y - fb.size/2, fb.size, fb.size);
      ctx.restore();
    } else {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(fb.x, fb.y, fb.size/2, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawParticles() {
  for (const p of STATE.particles) {
    const alpha = p.life / p.maxLife;
    if (p.isSpark && p.img) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(p.img, p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.restore();
    } else {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color || '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawHitFlash() {
  if (STATE.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = STATE.hitFlash * 2;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function drawTimer() {
  timerEl.textContent = Math.ceil(STATE.timer);
}

function checkGameOver() {
  if (STATE.gameOver) return;

  if (STATE.p1.health <= 0) {
    STATE.p1.state = 'ko';
    STATE.p1.vx = -100;
    STATE.p2Wins++;
    STATE.gameOver = true;
    playSound('ko');
    setTimeout(() => {
      endTitle.textContent = 'K.O.!';
      endTitle.style.color = '#ff4422';
      endMsg.textContent = 'CPU WINS!';
      modal.style.display = 'grid';
    }, 1500);
  } else if (STATE.p2.health <= 0) {
    STATE.p2.state = 'ko';
    STATE.p2.vx = 100;
    STATE.p1Wins++;
    STATE.gameOver = true;
    playSound('ko');
    setTimeout(() => {
      endTitle.textContent = 'K.O.!';
      endTitle.style.color = '#2266ff';
      endMsg.textContent = 'YOU WIN!';
      modal.style.display = 'grid';
    }, 1500);
  } else if (STATE.timer <= 0) {
    STATE.gameOver = true;
    playSound('ko');
    setTimeout(() => {
      if (STATE.p1.health > STATE.p2.health) {
        endTitle.textContent = 'TIME!';
        endTitle.style.color = '#2266ff';
        endMsg.textContent = 'YOU WIN!';
      } else if (STATE.p2.health > STATE.p1.health) {
        endTitle.textContent = 'TIME!';
        endTitle.style.color = '#ff4422';
        endMsg.textContent = 'CPU WINS!';
      } else {
        endTitle.textContent = 'TIME!';
        endTitle.style.color = '#ffcc00';
        endMsg.textContent = 'DRAW!';
      }
      modal.style.display = 'grid';
    }, 1000);
  }
}

function update(dt) {
  if (STATE.gameOver || STATE.paused) return;

  STATE.timerAcc += dt;
  if (STATE.timerAcc >= 1) {
    STATE.timer--;
    STATE.timerAcc -= 1;
  }

  updatePlayer(dt);
  updateAI(dt);

  updateFighter(STATE.p1, STATE.p2, dt);
  updateFighter(STATE.p2, STATE.p1, dt);

  updateFireballs(dt);
  updateParticles(dt);

  STATE.hitFlash = Math.max(0, STATE.hitFlash - dt * 3);
  STATE.shakeX *= 0.85;
  STATE.shakeY *= 0.85;

  checkGameOver();
}

function draw() {
  ctx.save();
  ctx.translate(STATE.shakeX * (Math.random() - 0.5), STATE.shakeY * (Math.random() - 0.5));

  drawBackground();

  drawFireballs();

  drawFighter(STATE.p1);
  drawFighter(STATE.p2);

  drawParticles();
  drawHitFlash();

  if (STATE.paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
  }

  ctx.restore();
}

document.getElementById("restart").onclick = () => {
  reset();
};

addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && STATE.gameOver) {
    reset();
    e.preventDefault();
  }
  if (e.code === 'KeyP') {
    STATE.paused = !STATE.paused;
  }
});

window.state = STATE;
window.reset = reset;

let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  try {
    update(dt);
    draw();
    drawTimer();
    updateHealthBars();
  } catch (err) {
    console.error("game crashed:", err);
  }
  for (const k in pressed) pressed[k] = false;
  requestAnimationFrame(frame);
}

loadAssets().then(() => {
  loadSounds();
  reset();
  requestAnimationFrame(frame);
});

})();
</script>
</body></html>
