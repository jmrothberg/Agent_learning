<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mortal Kombat</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0a0a12; color:#e7ecff;
    font:16px/1.4 ui-monospace,monospace; overflow:hidden; user-select:none; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#0a0a12; border-radius:4px;
    box-shadow:0 0 40px #f004, 0 0 80px #f803, inset 0 0 0 2px #333;
    image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:96vw; max-height:94vh; touch-action:none; }
  #hud { position:fixed; top:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:20px; align-items:flex-start; pointer-events:none; z-index:5; }
  .hp-panel { display:flex; flex-direction:column; align-items:center; }
  .hp-panel .name { font-size:13px; font-weight:bold; letter-spacing:2px;
    text-transform:uppercase; margin-bottom:4px; }
  .hp-panel.p1 .name { color:#ff4444; }
  .hp-panel.p2 .name { color:#4488ff; }
  .health-bar-outer { width:280px; height:22px; background:#222;
    border:2px solid #555; border-radius:3px; overflow:hidden; position:relative; }
  .health-bar-outer.p2-bar { direction:rtl; }
  .health-bar { height:100%; transition:width 0.15s ease-out; position:absolute; top:0; }
  .health-bar.p1-hp { left:0; background:linear-gradient(180deg,#ff5555,#cc2222);
    box-shadow:inset 0 -3px 6px rgba(0,0,0,0.3); }
  .health-bar.p2-hp { right:0; background:linear-gradient(180deg,#5588ff,#2255cc);
    box-shadow:inset 0 -3px 6px rgba(0,0,0,0.3); }
  .hp-text { position:absolute; right:6px; top:50%; transform:translateY(-50%);
    font-size:11px; color:#fff; text-shadow:0 0 4px #000; z-index:2;
    font-weight:bold; }
  .hp-text.p2-txt { right:auto; left:6px; }
  #timer-panel { position:fixed; top:8px; left:50%; transform:translateX(-50%);
    background:#1a0a0a; border:2px solid #884400; border-radius:4px;
    padding:2px 14px; z-index:6; pointer-events:none; }
  #timer-panel .time { font-size:28px; color:#ffcc00; font-weight:bold;
    text-shadow:0 0 8px #ff8800; line-height:22px; }
  #round-panel { position:fixed; top:42px; left:50%; transform:translateX(-50%);
    font-size:12px; color:#ff8800; letter-spacing:2px; z-index:5;
    pointer-events:none; text-transform:uppercase; }
  #help { position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
    opacity:.55; font-size:10px; letter-spacing:1px; text-align:center;
    white-space:nowrap; z-index:5; pointer-events:none; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(6px); z-index:10; }
  #modal .card { background:linear-gradient(160deg,#1a0a0a,#2a0a0a);
    padding:30px 50px; border-radius:14px; text-align:center;
    box-shadow:0 20px 60px #000a, 0 0 40px #f005;
    border:2px solid #ff4400; min-width:320px; }
  #modal h2 { margin:0 0 8px; color:#ff4400;
    text-shadow:0 0 10px #ff2200, 0 0 20px #ff0000;
    letter-spacing:4px; font-size:36px; }
  #modal p { margin:8px 0 18px; color:#fcc; font-size:16px; }
  button { background:linear-gradient(180deg,#cc3300,#882200); color:#fff;
    border:2px solid #ff6600; padding:12px 28px; border-radius:8px;
    font-size:15px; cursor:pointer; letter-spacing:2px; font-family:inherit;
    box-shadow:0 4px 16px #ff440066; text-transform:uppercase; }
  button:hover { filter:brightness(1.2); }
  #loading { position:fixed; inset:0; display:grid; place-items:center;
    background:#0a0a12; z-index:20; color:#ff8844; letter-spacing:2px;
    font-size:18px; }
  #loading .bar { width:280px; height:8px; background:#222; margin-top:18px;
    border-radius:4px; overflow:hidden; border:1px solid #442200; }
  #loading .bar > div { width:0; height:100%;
    background:linear-gradient(90deg,#ff4400,#ff8800); transition:width .2s; }
  #announce { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:64px; color:#ff2200; font-weight:bold;
    text-shadow:0 0 20px #ff0000, 0 0 40px #ff4400, 0 0 60px #ff0000;
    letter-spacing:8px; z-index:8; pointer-events:none;
    opacity:0; transition:opacity 0.3s; }
  #announce.show { opacity:1; }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="800" height="500"></canvas></div>
<div id="hud">
  <div class="hp-panel p1">
    <div class="name">P1 - SCORPION</div>
    <div class="health-bar-outer">
      <div class="health-bar p1-hp" id="hp1" style="width:100%"></div>
      <div class="hp-text" id="hp1txt">100</div>
    </div>
  </div>
  <div class="hp-panel p2">
    <div class="name">P2 - SUB-ZERO</div>
    <div class="health-bar-outer p2-bar">
      <div class="health-bar p2-hp" id="hp2" style="width:100%"></div>
      <div class="hp-text p2-txt" id="hp2txt">100</div>
    </div>
  </div>
</div>
<div id="timer-panel"><div class="time" id="timer">99</div></div>
<div id="round-panel">ROUND <span id="roundN">1</span></div>
<div id="help">
  P1: A/D move | W jump | S duck | F punch | G kick | H fireball | J block
  &nbsp;&nbsp;|&nbsp;&nbsp;
  P2: ←/→ move | ↑ jump | ↓ duck | L punch | K kick | U fireball | I block
  | Enter restart
</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">K.O.</h2>
  <p id="endMsg">SCORPION WINS!</p>
  <button id="restart">FIGHT AGAIN</button>
</div></div>
<div id="loading">LOADING ASSETS…<div class="bar"><div id="lbar"></div></div></div>
<div id="announce"></div>
<script>
(() => {
  "use strict";
  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const W = 800, H = 500, GROUND = 380;
  function fit() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + "px"; cvs.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);
  const ASSET_DIR = "./game-of-mortal-kombat-with-sup_20260518_161149_assets/";
  const SOUND_DIR = "./game-of-mortal-kombat-with-sup_20260518_161149_sounds/";
  const ASSETS = {};
  const SOUNDS = {};
  const assetNames = ["p1_idle","p1_punch","p1_kick","p1_jump","p1_duck","p1_block","p1_fireball","p1_hit",
    "p2_idle","p2_punch","p2_kick","p2_jump","p2_duck","p2_block","p2_fireball","p2_hit",
    "fireball","background"];
  async function loadAssets() {
    const bar = document.getElementById("lbar");
    let done = 0;
    for (const n of assetNames) {
      try {
        const img = new Image();
        img.src = ASSET_DIR + n + ".png";
        await img.decode();
        ASSETS[n] = img;
      } catch (e) { console.warn("asset failed", n, e); }
      done++;
      bar.style.width = (done / assetNames.length * 100) + "%";
    }
  }
  function loadSounds() {
    const sfx = ["punch","kick","fireball","hit","ko"];
    for (const n of sfx) {
      try {
        const a = new Audio(SOUND_DIR + n + ".ogg");
        a.volume = 0.55;
        SOUNDS[n] = a;
      } catch (e) {}
    }
    try {
      const m = new Audio(SOUND_DIR + "music.ogg");
      m.loop = true; m.volume = 0.4;
      SOUNDS.music = m;
    } catch (e) {}
  }
  function play(name) {
    const base = SOUNDS[name];
    if (!base) return;
    try {
      if (base.loop) { base.play().catch(() => {}); return; }
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(() => {});
    } catch (e) {}
  }
  let audioStarted = false;
  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    if (SOUNDS.music) SOUNDS.music.play().catch(() => {});
  }
  addEventListener("keydown", startAudio, { once: true });
  addEventListener("pointerdown", startAudio, { once: true });
  const keys = {};
  const P1_KEYS = {
    left: "KeyA", right: "KeyD", jump: "KeyW", duck: "KeyS",
    punch: "KeyF", kick: "KeyG", fireball: "KeyH", block: "KeyJ"
  };
  const P2_KEYS = {
    left: "ArrowLeft", right: "ArrowRight", jump: "ArrowUp", duck: "ArrowDown",
    punch: "KeyL", kick: "KeyK", fireball: "KeyU", block: "KeyI"
  };
  function p1(key) { return keys[P1_KEYS[key]] || false; }
  function p2(key) { return keys[P2_KEYS[key]] || false; }
  addEventListener("keydown", e => {
    keys[e.code] = true;
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code))
      e.preventDefault();
    if (e.code === "Enter" && state.over) resetGame();
  }, { passive: false });
  addEventListener("keyup", e => { keys[e.code] = false; });
  const state = {
    p1: null, p2: null, projectiles: [],
    particles: [],
    timer: 99, timerAcc: 0,
    round: 1,
    paused: false,
    over: false,
    announce: "",
    announceTimer: 0,
    frameCount: 0,
    bgOffset: 0,
    p1Wins: 0,
    p2Wins: 0,
  };
  window.state = state;
  function makeFighter(id, x, facing) {
    return {
      id, x, y: GROUND,
      vx: 0, vy: 0,
      w: 64, h: 96,
      hp: 100, maxHp: 100,
      facing,
      state: "idle",
      stateTimer: 0,
      animFrame: 0,
      animTimer: 0,
      invuln: 0,
      fireCooldown: 0,
      hitStun: 0,
      comboCount: 0,
      comboTimer: 0,
      knockbackX: 0,
      ducking: false,
      jumping: false,
      blocking: false,
      punchActive: false,
      kickActive: false,
      punchHit: false,
      kickHit: false,
      lastX: x,
      idleBob: 0,
    };
  }
  function resetFighters() {
    state.p1 = makeFighter("p1", 200, 1);
    state.p2 = makeFighter("p2", 600, -1);
    state.projectiles = [];
    state.particles = [];
    state.timer = 99;
    state.timerAcc = 0;
    state.paused = false;
    state.over = false;
    state.announce = "";
    state.announceTimer = 0;
    state.frameCount = 0;
  }
  function resetGame() {
    resetFighters();
    state.p1Wins = 0;
    state.p2Wins = 0;
    state.round = 1;
    document.getElementById("modal").style.display = "none";
    showAnnounce("ROUND 1", 2);
    try { if (SOUNDS.music) { SOUNDS.music.currentTime = 0; SOUNDS.music.play().catch(() => {}); } } catch (e) {}
  }
  window.resetGame = resetGame;
  function showAnnounce(text, dur) {
    state.announce = text;
    state.announceTimer = dur || 2;
    const el = document.getElementById("announce");
    el.textContent = text;
    el.classList.add("show");
  }
  function updateFighter(f, other, dt, pIn) {
    if (state.over || state.paused) return;
    f.animTimer += dt;
    f.animFrame = Math.floor(f.animTimer * 8) % 4;
    if (f.state === "idle") {
      f.idleBob = Math.sin(state.frameCount * 0.08) * 3;
    }
    if (f.invuln > 0) f.invuln -= dt;
    if (f.fireCooldown > 0) f.fireCooldown -= dt;
    if (f.hitStun > 0) {
      f.hitStun -= dt;
      f.x += f.knockbackX * dt;
      f.knockbackX *= 0.92;
      f.state = "hit";
      return;
    }
    if (f.comboTimer > 0) {
      f.comboTimer -= dt;
      if (f.comboTimer <= 0) f.comboCount = 0;
    }
    const speed = 220;
    const halfW = f.w / 2;
    f.blocking = pIn("block");
    f.punchActive = false;
    f.kickActive = false;
    f.punchHit = false;
    f.kickHit = false;
    if (f.state === "punch") {
      f.stateTimer -= dt;
      if (f.stateTimer <= 0) { f.state = "idle"; }
      f.punchActive = true;
      return;
    }
    if (f.state === "kick") {
      f.stateTimer -= dt;
      if (f.stateTimer <= 0) { f.state = "idle"; }
      f.kickActive = true;
      return;
    }
    if (f.state === "fireball") {
      f.stateTimer -= dt;
      if (f.stateTimer <= 0) { f.state = "idle"; }
      return;
    }
    if (pIn("duck")) {
      f.state = "duck";
      f.ducking = true;
      f.x += pIn("left") ? -speed * 0.5 * dt : pIn("right") ? speed * 0.5 * dt : 0;
      return;
    }
    if (pIn("punch")) {
      f.state = "punch";
      f.stateTimer = 0.35;
      play("punch");
      return;
    }
    if (pIn("kick")) {
      f.state = "kick";
      f.stateTimer = 0.45;
      play("kick");
      return;
    }
    if (pIn("fireball") && f.fireCooldown <= 0) {
      f.state = "fireball";
      f.stateTimer = 0.5;
      f.fireCooldown = 1.5;
      const pDir = f.facing;
      state.projectiles.push({
        x: f.x + pDir * 30,
        y: f.y - 50,
        vx: pDir * 350,
        vy: 0,
        owner: f.id,
        w: 32, h: 32,
        life: 3,
      });
      play("fireball");
      return;
    }
    if (pIn("jump") && !f.jumping && f.y >= GROUND - 2) {
      f.vy = -520;
      f.jumping = true;
      f.state = "jump";
      return;
    }
    if (f.jumping || f.y < GROUND - 2) {
      f.vy += 1200 * dt;
      f.y += f.vy * dt;
      if (f.y >= GROUND) {
        f.y = GROUND;
        f.vy = 0;
        f.jumping = false;
        f.state = "idle";
      }
      if (pIn("left")) f.x -= speed * 0.6 * dt;
      if (pIn("right")) f.x += speed * 0.6 * dt;
      return;
    }
    f.y = GROUND;
    if (pIn("left")) f.x -= speed * dt;
    if (pIn("right")) f.x += speed * dt;
    if (!pIn("left") && !pIn("right")) f.state = "idle";
    f.x = Math.max(halfW, Math.min(W - halfW, f.x));
    if (f.x < other.x) f.facing = 1;
    else f.facing = -1;
  }
  function checkMelee(attacker, defender, dt) {
    if (state.over || state.paused || defender.hitStun > 0 || attacker.hitStun > 0) return;
    const atkX = attacker.x + attacker.facing * 35;
    const atkY = attacker.y - 50;
    const defX = defender.x;
    const defY = defender.y - 50;
    const rangeX = 55, rangeY = 50;
    if (Math.abs(atkX - defX) < rangeX && Math.abs(atkY - defY) < rangeY) {
      if (attacker.punchActive && !attacker.punchHit) {
        let dmg = 8;
        if (defender.blocking) {
          dmg = 2;
          spawnParticles(defX, defY, "#88aaff", 5);
        } else {
          spawnParticles(defX, defY, "#ff4444", 8);
          play("hit");
        }
        defender.hp = Math.max(0, defender.hp - dmg);
        defender.hitStun = 0.25;
        defender.knockbackX = -attacker.facing * 150;
        attacker.punchHit = true;
        attacker.comboCount++;
        attacker.comboTimer = 1.5;
      }
      if (attacker.kickActive && !attacker.kickHit) {
        let dmg = 12;
        if (defender.blocking) {
          dmg = 3;
          spawnParticles(defX, defY, "#88aaff", 5);
        } else {
          spawnParticles(defX, defY, "#ff8800", 10);
          play("hit");
        }
        defender.hp = Math.max(0, defender.hp - dmg);
        defender.hitStun = 0.35;
        defender.knockbackX = -attacker.facing * 250;
        attacker.kickHit = true;
        attacker.comboCount++;
        attacker.comboTimer = 1.5;
      }
    }
  }
  function checkProjectiles(dt) {
    for (const p of state.projectiles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0 || p.x < -50 || p.x > W + 50) {
        p.dead = true;
        continue;
      }
      const target = p.owner === "p1" ? state.p2 : state.p1;
      if (!target || target.hitStun > 0) continue;
      const tX = target.x, tY = target.y - 50;
      if (Math.abs(p.x - tX) < 35 && Math.abs(p.y - tY) < 45) {
        p.dead = true;
        let dmg = 15;
        if (target.blocking) {
          dmg = 4;
          spawnParticles(tX, tY, "#88aaff", 6);
        } else {
          spawnParticles(tX, tY, "#ff4400", 12);
          play("hit");
        }
        target.hp = Math.max(0, target.hp - dmg);
        target.hitStun = 0.4;
        target.knockbackX = p.vx > 0 ? 200 : -200;
      }
    }
    state.projectiles = state.projectiles.filter(p => !p.dead);
  }
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      state.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200,
        life: 0.3 + Math.random() * 0.4,
        age: 0,
        color,
        size: 2 + Math.random() * 4,
      });
    }
  }
  function updateParticles(dt) {
    for (const p of state.particles) {
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.vx *= 0.97;
    }
    state.particles = state.particles.filter(p => p.age < p.life);
  }
  function checkKO() {
    if (state.p1.hp <= 0 || state.p2.hp <= 0 || state.timer <= 0) {
      state.over = true;
      let winner, loser;
      if (state.p1.hp <= 0) { winner = state.p2; loser = state.p1; }
      else if (state.p2.hp <= 0) { winner = state.p1; loser = state.p2; }
      else {
        winner = state.p1.hp >= state.p2.hp ? state.p1 : state.p2;
        loser = winner === state.p1 ? state.p2 : state.p1;
      }
      if (winner.id === "p1") state.p1Wins++;
      else state.p2Wins++;
      play("ko");
      showAnnounce("K.O.", 3);
      const pName = winner.id === "p1" ? "SCORPION" : "SUB-ZERO";
      document.getElementById("endTitle").textContent = "K.O.";
      document.getElementById("endMsg").textContent = pName + " WINS!";
      setTimeout(() => {
        document.getElementById("modal").style.display = "grid";
      }, 2000);
      try { if (SOUNDS.music) SOUNDS.music.pause(); } catch (e) {}
    }
  }
  function drawBackground() {
    if (ASSETS.background) {
      ctx.drawImage(ASSETS.background, 0, 0, W, H);
      for (let i = 0; i < 4; i++) {
        const tx = 80 + i * 220;
        const flicker = Math.sin(state.frameCount * 0.15 + i * 2) * 0.15 + 0.25;
        ctx.globalAlpha = flicker;
        const tGrd = ctx.createRadialGradient(tx, 140, 5, tx, 140, 80);
        tGrd.addColorStop(0, "#ff8800");
        tGrd.addColorStop(0.5, "#ff440044");
        tGrd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = tGrd;
        ctx.beginPath();
        ctx.arc(tx, 140, 80, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      return;
    }
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, "#0a0520");
    grd.addColorStop(0.3, "#1a0a30");
    grd.addColorStop(0.7, "#2a1535");
    grd.addColorStop(1, "#0a0a1a");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 50; i++) {
      const sx = (i * 137 + state.frameCount * 0.02) % W;
      const sy = (i * 97) % (GROUND - 50);
      const b = 0.3 + Math.sin(state.frameCount * 0.05 + i) * 0.2;
      ctx.fillStyle = "rgba(255,255,255," + b + ")";
      ctx.fillRect(sx | 0, sy | 0, 2, 2);
    }
    ctx.fillStyle = "#dde8ff";
    ctx.beginPath();
    ctx.arc(650, 60, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#0a0520";
    ctx.beginPath();
    ctx.arc(662, 52, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.15;
    const moonGrd = ctx.createRadialGradient(650, 60, 20, 650, 60, 100);
    moonGrd.addColorStop(0, "#dde8ff");
    moonGrd.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = moonGrd;
    ctx.beginPath();
    ctx.arc(650, 60, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    for (let i = 0; i < 5; i++) {
      const px = 60 + i * 185;
      ctx.fillStyle = "#2a2a3a";
      ctx.fillRect(px, 60, 35, GROUND - 20);
      ctx.fillStyle = "#353545";
      ctx.fillRect(px + 5, 60, 25, GROUND - 20);
      ctx.fillStyle = "#3a3a4a";
      ctx.fillRect(px - 8, 55, 51, 18);
      ctx.fillRect(px - 8, GROUND - 5, 51, 18);
      ctx.fillStyle = "#4a4a5a";
      for (let j = 0; j < 4; j++) {
        ctx.fillRect(px + 8, 80 + j * 70, 19, 3);
      }
    }
    ctx.fillStyle = "#2a2a3a";
    ctx.fillRect(0, 50, W, 25);
    ctx.fillRect(0, 50, 25, 120);
    ctx.fillRect(W - 25, 50, 25, 120);
    ctx.fillStyle = "#3a3a4a";
    ctx.fillRect(0, 55, W, 5);
    for (let i = 0; i < 4; i++) {
      const tx = 120 + i * 200;
      ctx.fillStyle = "#555";
      ctx.fillRect(tx - 3, 130, 6, 25);
      const flicker = Math.sin(state.frameCount * 0.2 + i * 3) * 4;
      ctx.fillStyle = "#ff6600";
      ctx.beginPath();
      ctx.ellipse(tx, 125 + flicker, 8, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffaa00";
      ctx.beginPath();
      ctx.ellipse(tx, 128 + flicker, 4, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.2 + Math.sin(state.frameCount * 0.15 + i * 2) * 0.08;
      const tGrd = ctx.createRadialGradient(tx, 130, 5, tx, 130, 70);
      tGrd.addColorStop(0, "#ff8800");
      tGrd.addColorStop(0.5, "#ff440033");
      tGrd.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = tGrd;
      ctx.beginPath();
      ctx.arc(tx, 130, 70, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = "#3a3a4a";
    ctx.fillRect(0, GROUND + 48, W, H - GROUND);
    ctx.fillStyle = "#4a4a5a";
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, GROUND + 48, 38, 2);
      ctx.fillRect(x, GROUND + 58, 38, 2);
      ctx.fillRect(x, GROUND + 68, 38, 2);
    }
    for (let x = 0; x < W; x += 40) {
      ctx.fillStyle = "#454555";
      ctx.fillRect(x, GROUND + 48, 2, H - GROUND);
    }
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 8; i++) {
      const fx = (state.frameCount * 0.5 + i * 120) % (W + 200) - 100;
      const fy = GROUND + 20 + Math.sin(i * 1.5) * 30;
      const fGrd = ctx.createRadialGradient(fx, fy, 5, fx, fy, 60);
      fGrd.addColorStop(0, "#8888aa");
      fGrd.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = fGrd;
      ctx.beginPath();
      ctx.arc(fx, fy, 60, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  function drawFighter(f) {
    const spriteKey = f.id + "_" + f.state;
    const img = ASSETS[spriteKey];
    const x = f.x, y = f.y;
    const flip = f.facing < 0;
    const scale = 2.5;
    const drawW = f.w * scale, drawH = f.h * scale;
    ctx.save();
    if (flip) {
      ctx.translate(x + drawW / 2, 0);
      ctx.scale(-1, 1);
      ctx.translate(-(x + drawW / 2), 0);
    }
    if (f.invuln > 0 && Math.floor(state.frameCount * 0.5) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    if (img) {
      ctx.drawImage(img, x - drawW / 2, y - drawH, drawW, drawH);
    } else {
      const colors = f.id === "p1"
        ? { body: "#cc2222", skin: "#ffcc88", pants: "#222", hair: "#222", accent: "#ff8800", glow: "#ff4400" }
        : { body: "#2255cc", skin: "#ffcc88", pants: "#222", hair: "#fff", accent: "#44aaff", glow: "#4488ff" };
      const bx = x - drawW / 2, by = y - drawH;
      const s = scale;
      const bob = f.idleBob || 0;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath();
      const shadowScale = 1 + (GROUND - f.y) * 0.002;
      ctx.ellipse(x, y + 4, 30 * s * shadowScale, 8 * s * shadowScale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = colors.hair;
      ctx.fillRect(bx + 18 * s, by + bob, 28 * s, 14 * s);
      ctx.fillStyle = colors.skin;
      ctx.fillRect(bx + 20 * s, by + 12 * s + bob, 24 * s, 22 * s);
      ctx.fillStyle = "#000";
      ctx.fillRect(bx + 30 * s, by + 18 * s + bob, 4 * s, 3 * s);
      ctx.fillRect(bx + 38 * s, by + 18 * s + bob, 4 * s, 3 * s);
      ctx.fillStyle = colors.body;
      ctx.fillRect(bx + 12 * s, by + 32 * s + bob, 40 * s, 30 * s);
      ctx.fillStyle = colors.accent;
      ctx.fillRect(bx + 12 * s, by + 55 * s + bob, 40 * s, 5 * s);
      ctx.fillStyle = colors.pants;
      ctx.fillRect(bx + 16 * s, by + 62 * s, 14 * s, 28 * s);
      ctx.fillRect(bx + 34 * s, by + 62 * s, 14 * s, 28 * s);
      ctx.fillStyle = "#111";
      ctx.fillRect(bx + 14 * s, by + 86 * s, 18 * s, 8 * s);
      ctx.fillRect(bx + 32 * s, by + 86 * s, 18 * s, 8 * s);
      if (f.state === "punch") {
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 50 * s, by + 34 * s + bob, 25 * s, 8 * s);
        ctx.fillStyle = colors.skin;
        ctx.fillRect(bx + 72 * s, by + 32 * s + bob, 12 * s, 12 * s);
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 4 * s, by + 36 * s + bob, 10 * s, 20 * s);
      }
      if (f.state === "kick") {
        ctx.fillStyle = colors.pants;
        ctx.fillRect(bx + 50 * s, by + 50 * s, 30 * s, 12 * s);
        ctx.fillStyle = "#111";
        ctx.fillRect(bx + 76 * s, by + 48 * s, 14 * s, 16 * s);
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 2 * s, by + 34 * s + bob, 10 * s, 22 * s);
        ctx.fillRect(bx + 52 * s, by + 34 * s + bob, 10 * s, 22 * s);
      }
      if (f.state === "block") {
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 8 * s, by + 28 * s + bob, 14 * s, 28 * s);
        ctx.fillRect(bx + 42 * s, by + 28 * s + bob, 14 * s, 28 * s);
        ctx.fillStyle = colors.skin;
        ctx.fillRect(bx + 20 * s, by + 26 * s + bob, 24 * s, 10 * s);
      }
      if (f.state === "duck") {
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 8 * s, by + 50 * s, 48 * s, 25 * s);
        ctx.fillStyle = colors.skin;
        ctx.fillRect(bx + 22 * s, by + 38 * s, 22 * s, 18 * s);
        ctx.fillStyle = colors.pants;
        ctx.fillRect(bx + 10 * s, by + 72 * s, 20 * s, 20 * s);
        ctx.fillRect(bx + 34 * s, by + 72 * s, 20 * s, 20 * s);
      }
      if (f.state === "jump") {
        ctx.fillStyle = colors.pants;
        ctx.fillRect(bx + 12 * s, by + 58 * s, 16 * s, 20 * s);
        ctx.fillRect(bx + 36 * s, by + 58 * s, 16 * s, 20 * s);
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 2 * s, by + 20 * s + bob, 10 * s, 25 * s);
        ctx.fillRect(bx + 52 * s, by + 20 * s + bob, 10 * s, 25 * s);
      }
      if (f.state === "fireball") {
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 50 * s, by + 32 * s + bob, 28 * s, 8 * s);
        ctx.fillStyle = colors.glow;
        ctx.beginPath();
        ctx.arc(bx + 82 * s, by + 36 * s + bob, 10 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 4 * s, by + 36 * s + bob, 10 * s, 20 * s);
      }
      if (f.state === "idle") {
        const sway = Math.sin(state.frameCount * 0.08) * 3 * s;
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 4 * s, by + 34 * s + bob + sway, 10 * s, 22 * s);
        ctx.fillRect(bx + 50 * s, by + 34 * s + bob - sway, 10 * s, 22 * s);
        ctx.fillStyle = colors.skin;
        ctx.fillRect(bx + 4 * s, by + 54 * s + bob + sway, 10 * s, 6 * s);
        ctx.fillRect(bx + 50 * s, by + 54 * s + bob - sway, 10 * s, 6 * s);
      }
      if (f.state === "hit") {
        ctx.fillStyle = colors.body;
        ctx.fillRect(bx + 8 * s, by + 30 * s + bob, 48 * s, 35 * s);
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    if (f.comboCount > 1 && f.comboTimer > 0) {
      ctx.fillStyle = "#ffcc00";
      ctx.font = "bold 14px ui-monospace,monospace";
      ctx.textAlign = "center";
      ctx.fillText(f.comboCount + " HIT!", x, y - f.h * scale - 15);
    }
  }
  function drawProjectiles() {
    for (const p of state.projectiles) {
      const pScale = 2.5;
      const pSize = p.w * pScale;
      const img = ASSETS.fireball;
      if (img) {
        ctx.drawImage(img, p.x - pSize / 2, p.y - pSize / 2, pSize, pSize);
      } else {
        const grd = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, pSize / 2);
        grd.addColorStop(0, "#fff");
        grd.addColorStop(0.2, p.owner === "p1" ? "#ffcc00" : "#88ccff");
        grd.addColorStop(0.5, p.owner === "p1" ? "#ff8800" : "#4488ff");
        grd.addColorStop(0.8, p.owner === "p1" ? "#ff4400" : "#2244cc");
        grd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, p.y, pSize / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      for (let i = 0; i < 5; i++) {
        const t = i * 0.04;
        const tx = p.x - p.vx * t + (Math.random() - 0.5) * 8;
        const ty = p.y + (Math.random() - 0.5) * 10;
        const sz = pSize * (0.15 + Math.random() * 0.2);
        const alpha = 0.4 + Math.random() * 0.4;
        ctx.fillStyle = p.owner === "p1"
          ? "rgba(255," + (80 + Math.random() * 120 | 0) + ",0," + alpha + ")"
          : "rgba(" + (40 + Math.random() * 80 | 0) + ",120,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(tx, ty, sz, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 0.25;
      const glowGrd = ctx.createRadialGradient(p.x, p.y, pSize * 0.2, p.x, p.y, pSize);
      glowGrd.addColorStop(0, p.owner === "p1" ? "#ff8800" : "#4488ff");
      glowGrd.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glowGrd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, pSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  function drawParticles() {
    for (const p of state.particles) {
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
  function updateHUD() {
    const p1hp = Math.max(0, state.p1.hp);
    const p2hp = Math.max(0, state.p2.hp);
    document.getElementById("hp1").style.width = p1hp + "%";
    document.getElementById("hp2").style.width = p2hp + "%";
    document.getElementById("hp1txt").textContent = p1hp;
    document.getElementById("hp2txt").textContent = p2hp;
    document.getElementById("timer").textContent = Math.ceil(state.timer);
    document.getElementById("roundN").textContent = state.round;
  }
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      state.frameCount++;
      if (!state.paused && !state.over) {
        updateFighter(state.p1, state.p2, dt, p1);
        updateFighter(state.p2, state.p1, dt, p2);
        checkMelee(state.p1, state.p2, dt);
        checkMelee(state.p2, state.p1, dt);
        checkProjectiles(dt);
        updateParticles(dt);
        state.timerAcc += dt;
        if (state.timerAcc >= 1) {
          state.timerAcc -= 1;
          state.timer = Math.max(0, state.timer - 1);
        }
        checkKO();
      }
      if (state.announceTimer > 0) {
        state.announceTimer -= dt;
        if (state.announceTimer <= 0) {
          document.getElementById("announce").classList.remove("show");
        }
      }
      drawBackground();
      drawProjectiles();
      drawFighter(state.p1);
      drawFighter(state.p2);
      drawParticles();
      updateHUD();
    } catch (err) {
      console.error("game crashed:", err);
    }
    requestAnimationFrame(frame);
  }
  loadSounds();
  loadAssets().then(() => {
    document.getElementById("loading").style.display = "none";
    resetGame();
    requestAnimationFrame(frame);
  }).catch(err => {
    console.error("asset load failed:", err);
    document.getElementById("loading").style.display = "none";
    resetGame();
    requestAnimationFrame(frame);
  });
})();
</script>
