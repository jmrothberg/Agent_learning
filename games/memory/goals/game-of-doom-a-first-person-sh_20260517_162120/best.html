<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DOOM - First Person Shooter</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin:0; height:100%; background:#000; overflow:hidden; user-select:none; }
  #game-container { position:fixed; inset:0; }
  #game-container canvas { display:block; width:100%; height:100%; }
  
  #hud {
    position:fixed; bottom:0; left:0; right:0; height:80px;
    background: linear-gradient(0deg, rgba(30,0,0,0.95), rgba(30,0,0,0.7));
    border-top: 3px solid #8b0000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; z-index: 10; pointer-events: none;
    font-family: 'Courier New', monospace; color: #ff4444;
    text-shadow: 0 0 8px #ff0000;
  }
  #hud .stat { text-align: center; }
  #hud .stat .label { font-size: 11px; color: #aa6666; letter-spacing: 2px; }
  #hud .stat .value { font-size: 28px; font-weight: bold; color: #ff3333; }
  #hud .stat .value.health { color: #33ff33; text-shadow: 0 0 8px #00ff00; }
  #hud .stat .value.ammo { color: #ffaa33; text-shadow: 0 0 8px #ff8800; }
  
  #minimap-container {
    position: fixed; top: 10px; right: 10px; z-index: 10;
    border: 2px solid #8b0000; border-radius: 4px;
    background: rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(139,0,0,0.5);
  }
  #minimap { display: block; }
  
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 10; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,50,50,0.8);
  }
  #crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
  #crosshair::after { width: 2px; height: 20px; left: -1px; top: -10px; }
  
  #overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  #overlay h1 { color: #cc0000; font-family: 'Courier New', monospace; font-size: 48px;
    text-shadow: 0 0 20px #ff0000; margin-bottom: 10px; letter-spacing: 4px; }
  #overlay p { color: #aa8888; font-family: 'Courier New', monospace; font-size: 16px; margin: 4px 0; }
  #overlay .btn {
    margin-top: 20px; padding: 14px 40px; font-size: 20px; font-family: 'Courier New', monospace;
    background: #8b0000; color: #fff; border: 2px solid #cc0000; cursor: pointer;
    letter-spacing: 2px; text-transform: uppercase;
  }
  #overlay .btn:hover { background: #aa0000; }
  
  #damage-flash {
    position: fixed; inset: 0; z-index: 9; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,0.4));
    opacity: 0; transition: opacity 0.1s;
  }
  #damage-flash.active { opacity: 1; }
  
  #loading {
    position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #000; color: #8b0000;
    font-family: 'Courier New', monospace;
  }
  #loading.hidden { display: none; }
  #loading h2 { font-size: 32px; letter-spacing: 3px; }
  #load-bar { width: 300px; height: 8px; background: #333; margin-top: 20px; border-radius: 4px; overflow: hidden; }
  #load-fill { height: 100%; width: 0; background: linear-gradient(90deg, #8b0000, #ff3333); transition: width 0.3s; }
</style>
</head>
<body>

<div id="loading">
  <h2>DOOM</h2>
  <p>LOADING...</p>
  <div id="load-bar"><div id="load-fill"></div></div>
</div>

<div id="game-container"></div>

<div id="crosshair"></div>
<div id="damage-flash"></div>

<div id="hud">
  <div class="stat">
    <div class="label">HEALTH</div>
    <div class="value health" id="hud-health">100</div>
  </div>
  <div class="stat">
    <div class="label">ARMOR</div>
    <div class="value" id="hud-armor">0</div>
  </div>
  <div class="stat">
    <div class="label">AMMO</div>
    <div class="value ammo" id="hud-ammo">50</div>
  </div>
  <div class="stat">
    <div class="label">KILLS</div>
    <div class="value" id="hud-kills">0</div>
  </div>
  <div class="stat">
    <div class="label">SCORE</div>
    <div class="value" id="hud-score">0</div>
  </div>
</div>

<div id="minimap-container">
  <canvas id="minimap" width="180" height="180"></canvas>
</div>

<div id="overlay">
  <h1>DOOM</h1>
  <p>WASD to move • Mouse to look • Click to shoot</p>
  <p>Collect powerups • Kill all monsters to win</p>
  <button class="btn" id="btn-start">START GAME</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  const MAZE_W = 20;
  const MAZE_H = 20;
  const TILE = 4; // world units per tile
  const WALL_H = 5;
  const PLAYER_R = 0.6;
  const MONSTER_TYPES = ['imp', 'demon', 'cyberdemon'];
  const MONSTER_HP = { imp: 3, demon: 5, cyberdemon: 8 };
  const MONSTER_SPEED = { imp: 3.5, demon: 2.5, cyberdemon: 1.8 };
  const MONSTER_DMG = { imp: 8, demon: 15, cyberdemon: 25 };
  const MONSTER_SIZE = { imp: 3.5, demon: 4.5, cyberdemon: 5.5 };
  const MONSTER_SCORE = { imp: 100, demon: 200, cyberdemon: 350 };
  const NUM_MONSTERS = 8;
  const NUM_POWERUPS = 6;
  const ASSET_DIR = './game-of-doom-a-first-person-sh_20260517_162120_assets/';
  const SOUND_DIR = './game-of-doom-a-first-person-sh_20260517_162120_sounds/';

  // ===== STATE =====
  const state = {
    health: 100, armor: 0, ammo: 50, kills: 0, score: 0,
    maze: [],
    player: {
      pos: new THREE.Vector3(),
      rot: new THREE.Euler(0, 0, 0, 'YXZ'),
      health: 100,
      speed: 8,
    },
    monsters: [], powerups: [], bullets: [], particles: [],
    running: false, gameOver: false, won: false, frame: 0,
    lastFire: 0, lastDamage: 0, weaponBob: 0, weaponRecoil: 0,
    keys: {}, mouse: { x: 0, y: 0, dx: 0, dy: 0, down: false }
  };
  window.state = state;

  // ===== THREE.JS SETUP =====
  const container = document.getElementById('game-container');
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = false;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0505);
  scene.fog = new THREE.Fog(0x0a0505, 8, 35);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2.5, 0);

  // ===== ASSET LOADING =====
  const ASSETS = {};
  const SOUNDS = {};
  let loadProgress = 0;
  const loadFill = document.getElementById('load-fill');
  const loadingEl = document.getElementById('loading');

  const assetList = [
    ['imp', ASSET_DIR + 'imp.png'],
    ['demon', ASSET_DIR + 'demon.png'],
    ['cyberdemon', ASSET_DIR + 'cyberdemon.png'],
    ['shotgun', ASSET_DIR + 'shotgun.png'],
    ['health_pickup', ASSET_DIR + 'health_pickup.png'],
    ['ammo_pickup', ASSET_DIR + 'ammo_pickup.png'],
    ['rockets_pickup', ASSET_DIR + 'rockets_pickup.png'],
    ['wall_stone', ASSET_DIR + 'wall_stone.png'],
    ['floor_stone', ASSET_DIR + 'floor_stone.png'],
    ['ceiling_stone', ASSET_DIR + 'ceiling_stone.png'],
    ['muzzle_flash', ASSET_DIR + 'muzzle_flash.png'],
    ['blood_splat', ASSET_DIR + 'blood_splat.png'],
    ['wall_texture', ASSET_DIR + 'wall_texture.png'],
    ['floor_texture', ASSET_DIR + 'floor_texture.png'],
    ['ceiling_texture', ASSET_DIR + 'ceiling_texture.png'],
    ['health_pack', ASSET_DIR + 'health_pack.png'],
    ['ammo_box', ASSET_DIR + 'ammo_box.png'],
    ['shield', ASSET_DIR + 'shield.png'],
  ];

  const soundList = [
    ['shotgun', SOUND_DIR + 'shotgun.ogg', false],
    ['pistol', SOUND_DIR + 'pistol.ogg', false],
    ['monster_hit', SOUND_DIR + 'monster_hit.ogg', false],
    ['monster_death', SOUND_DIR + 'monster_death.ogg', false],
    ['pickup', SOUND_DIR + 'pickup.ogg', false],
    ['player_hurt', SOUND_DIR + 'player_hurt.ogg', false],
    ['player_death', SOUND_DIR + 'player_death.ogg', false],
    ['monster_roar', SOUND_DIR + 'monster_roar.ogg', false],
    ['shotgun_fire', SOUND_DIR + 'shotgun_fire.ogg', false],
    ['monster_hurt', SOUND_DIR + 'monster_hurt.ogg', false],
    ['pickup_health', SOUND_DIR + 'pickup_health.ogg', false],
    ['pickup_ammo', SOUND_DIR + 'pickup_ammo.ogg', false],
    ['victory', SOUND_DIR + 'victory.ogg', false],
  ];

  function updateLoadBar() {
    loadProgress++;
    loadFill.style.width = (loadProgress / (assetList.length + soundList.length) * 100) + '%';
  }

  async function loadAllAssets() {
    for (const [name, src] of assetList) {
      try {
        const img = new Image();
        img.src = src;
        await img.decode();
        ASSETS[name] = img;
      } catch(e) { console.warn('Asset failed:', name); }
      updateLoadBar();
    }
    for (const [name, src, loop] of soundList) {
      try {
        const a = new Audio(src);
        a.loop = loop;
        a.preload = 'auto';
        SOUNDS[name] = a;
      } catch(e) {}
      updateLoadBar();
    }
    loadingEl.classList.add('hidden');
    initGame();
  }

  function playSound(name) {
    const base = SOUNDS[name];
    if (!base) return;
    try {
      if (base.loop) { base.play().catch(()=>{}); return; }
      const inst = base.cloneNode();
      inst.volume = 0.6;
      inst.play().catch(()=>{});
    } catch(e) {}
  }

  // ===== MAZE GENERATION =====
  function generateMaze(w, h) {
    // Initialize all walls
    const grid = [];
    for (let y = 0; y < h; y++) {
      grid[y] = [];
      for (let x = 0; x < w; x++) {
        grid[y][x] = 1; // 1 = wall, 0 = floor
      }
    }

    // Recursive backtracker
    function carve(x, y) {
      grid[y][x] = 0;
      const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
      for (const [dx, dy] of dirs) {
        const nx = x + dx, ny = y + dy;
        if (nx > 0 && nx < w-1 && ny > 0 && ny < h-1 && grid[ny][nx] === 1) {
          grid[y + dy/2][x + dx/2] = 0;
          carve(nx, ny);
        }
      }
    }
    carve(1, 1);

    // Carve extra passages for gameplay (remove ~15% of remaining walls)
    const walls = [];
    for (let y = 1; y < h-1; y++) {
      for (let x = 1; x < w-1; x++) {
        if (grid[y][x] === 1) walls.push([x, y]);
      }
    }
    const removeCount = Math.floor(walls.length * 0.18);
    for (let i = 0; i < removeCount; i++) {
      const idx = Math.floor(Math.random() * walls.length);
      const [x, y] = walls[idx];
      grid[y][x] = 0;
      walls.splice(idx, 1);
    }

    return grid;
  }

  // ===== BUILD 3D LEVEL =====
  let wallMeshes = [];
  let floorMesh, ceilingMesh;

  function buildLevel() {
    // Clear old
    wallMeshes.forEach(m => scene.remove(m));
    wallMeshes = [];
    if (floorMesh) scene.remove(floorMesh);
    if (ceilingMesh) scene.remove(ceilingMesh);

    state.maze = generateMaze(MAZE_W, MAZE_H);

    // Textures
    const wallTex = ASSETS.wall_stone || ASSETS.wall_texture;
    const floorTex = ASSETS.floor_stone || ASSETS.floor_texture;
    const ceilTex = ASSETS.ceiling_stone || ASSETS.ceiling_texture;

    const wallMat = new THREE.MeshLambertMaterial({ color: 0x553333 });
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const ceilMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

    if (wallTex) {
      const t = new THREE.CanvasTexture(wallTex);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(MAZE_W, MAZE_H);
      wallMat.map = t;
    }
    if (floorTex) {
      const t = new THREE.CanvasTexture(floorTex);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(MAZE_W, MAZE_H);
      floorMat.map = t;
    }
    if (ceilTex) {
      const t = new THREE.CanvasTexture(ceilTex);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(MAZE_W, MAZE_H);
      ceilMat.map = t;
    }

    // Floor
    const floorGeo = new THREE.PlaneGeometry(MAZE_W * TILE, MAZE_H * TILE);
    floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.rotation.x = -Math.PI / 2;
    floorMesh.position.set(MAZE_W * TILE / 2, 0, MAZE_H * TILE / 2);
    scene.add(floorMesh);

    // Ceiling
    const ceilGeo = new THREE.PlaneGeometry(MAZE_W * TILE, MAZE_H * TILE);
    ceilingMesh = new THREE.Mesh(ceilGeo, ceilMat);
    ceilingMesh.rotation.x = Math.PI / 2;
    ceilingMesh.position.set(MAZE_W * TILE / 2, WALL_H, MAZE_H * TILE / 2);
    scene.add(ceilingMesh);

    // Walls using instanced mesh for performance
    const wallGeo = new THREE.BoxGeometry(TILE, WALL_H, TILE);
    const wallPositions = [];
    for (let y = 0; y < MAZE_H; y++) {
      for (let x = 0; x < MAZE_W; x++) {
        if (state.maze[y][x] === 1) {
          wallPositions.push(x * TILE + TILE/2, WALL_H/2, y * TILE + TILE/2);
        }
      }
    }

    const wallInstanced = new THREE.InstancedMesh(wallGeo, wallMat, wallPositions.length / 3);
    const dummy = new THREE.Object3D();
    for (let i = 0; i < wallPositions.length; i += 3) {
      dummy.position.set(wallPositions[i], wallPositions[i+1], wallPositions[i+2]);
      dummy.updateMatrix();
      wallInstanced.setMatrixAt(i/3, dummy.matrix);
    }
    wallInstanced.instanceMatrix.needsUpdate = true;
    scene.add(wallInstanced);
    wallMeshes.push(wallInstanced);

    // Lighting
    const ambient = new THREE.AmbientLight(0x331111, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 0.4);
    dirLight.position.set(10, 15, 10);
    scene.add(dirLight);

    // Player light (torch)
    const playerLight = new THREE.PointLight(0xff8844, 1.5, 18);
    playerLight.name = 'playerLight';
    scene.add(playerLight);

    // Place player at first open tile
    for (let y = 1; y < MAZE_H; y++) {
      for (let x = 1; x < MAZE_W; x++) {
        if (state.maze[y][x] === 0) {
          state.player.pos.set(x * TILE + TILE/2, 2.5, y * TILE + TILE/2);
          camera.position.copy(state.player.pos);
          return;
        }
      }
    }
  }

  // ===== MONSTERS =====
  function spawnMonsters() {
    state.monsters = [];
    const openTiles = [];
    for (let y = 1; y < MAZE_H; y++) {
      for (let x = 1; x < MAZE_W; x++) {
        if (state.maze[y][x] === 0) {
          const px = x * TILE + TILE/2, pz = y * TILE + TILE/2;
          const dist = Math.hypot(px - state.player.pos.x, pz - state.player.pos.z);
          if (dist > 10) openTiles.push({x: px, z: pz});
        }
      }
    }

    // Shuffle
    for (let i = openTiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [openTiles[i], openTiles[j]] = [openTiles[j], openTiles[i]];
    }

    for (let i = 0; i < NUM_MONSTERS && i < openTiles.length; i++) {
      const type = MONSTER_TYPES[i % MONSTER_TYPES.length];
      const tile = openTiles[i];
      const size = MONSTER_SIZE[type];
      const hp = MONSTER_HP[type];

      // Create sprite
      const tex = new THREE.CanvasTexture(ASSETS[type]);
      tex.minFilter = THREE.NearestFilter;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(size, size, 1);
      sprite.position.set(tile.x, size * 0.4, tile.z);
      scene.add(sprite);

      state.monsters.push({
        type, sprite, hp, maxHp: hp,
        speed: MONSTER_SPEED[type],
        damage: MONSTER_DMG[type],
        size,
        score: MONSTER_SCORE[type],
        pos: new THREE.Vector3(tile.x, size * 0.4, tile.z),
        lastAttack: 0,
        alive: true,
        hurtTimer: 0,
        deathTimer: 0,
        pathTimer: 0,
        targetX: tile.x,
        targetZ: tile.z,
      });
    }
  }

  // ===== POWERUPS =====
  function spawnPowerups() {
    state.powerups = [];
    const openTiles = [];
    for (let y = 1; y < MAZE_H; y++) {
      for (let x = 1; x < MAZE_W; x++) {
        if (state.maze[y][x] === 0) {
          const px = x * TILE + TILE/2, pz = y * TILE + TILE/2;
          const dist = Math.hypot(px - state.player.pos.x, pz - state.player.pos.z);
          if (dist > 6) openTiles.push({x: px, z: pz});
        }
      }
    }
    for (let i = openTiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [openTiles[i], openTiles[j]] = [openTiles[j], openTiles[i]];
    }

    const types = ['health_pickup', 'ammo_pickup', 'rockets_pickup'];
    for (let i = 0; i < NUM_POWERUPS && i < openTiles.length; i++) {
      const type = types[i % types.length];
      const tile = openTiles[i];
      const tex = new THREE.CanvasTexture(ASSETS[type]);
      tex.minFilter = THREE.NearestFilter;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(1.5, 1.5, 1);
      sprite.position.set(tile.x, 1.2, tile.z);
      scene.add(sprite);

      state.powerups.push({
        type, sprite, pos: new THREE.Vector3(tile.x, 1.2, tile.z),
        alive: true, bobPhase: Math.random() * Math.PI * 2,
      });
    }
  }

  // ===== WEAPON =====
  let weaponGroup;
  function createWeapon() {
    weaponGroup = new THREE.Group();
    const tex = new THREE.CanvasTexture(ASSETS.shotgun);
    tex.minFilter = THREE.NearestFilter;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(3, 3, 1);
    sprite.position.set(0.8, -0.8, -1.5);
    weaponGroup.add(sprite);
    camera.add(weaponGroup);
    scene.add(camera);
  }

  // ===== COLLISION =====
  function isWall(wx, wz) {
    const gx = Math.floor(wx / TILE);
    const gz = Math.floor(wz / TILE);
    if (gx < 0 || gx >= MAZE_W || gz < 0 || gz >= MAZE_H) return true;
    return state.maze[gz][gx] === 1;
  }

  function canMove(x, z, radius) {
    // Check 4 corners around the player
    const checks = [
      [x - radius, z - radius], [x + radius, z - radius],
      [x - radius, z + radius], [x + radius, z + radius],
      [x, z],
    ];
    for (const [cx, cz] of checks) {
      if (isWall(cx, cz)) return false;
    }
    return true;
  }

  // ===== MONSTER AI =====
  function updateMonsters(dt) {
    const pp = state.player.pos;
    for (const m of state.monsters) {
      if (!m.alive) {
        if (m.deathTimer > 0) {
          m.deathTimer -= dt;
          m.sprite.material.opacity = Math.max(0, m.deathTimer);
          m.sprite.position.y -= dt * 0.5;
        }
        continue;
      }

      // Move toward player with simple collision
      const dx = pp.x - m.pos.x;
      const dz = pp.z - m.pos.z;
      const dist = Math.hypot(dx, dz);

      if (dist > 1.5) {
        const nx = dx / dist;
        const nz = dz / dist;
        const newX = m.pos.x + nx * m.speed * dt;
        const newZ = m.pos.z + nz * m.speed * dt;

        // Try to move; if blocked, try sliding along walls
        if (canMove(newX, newZ, m.size * 0.3)) {
          m.pos.x = newX;
          m.pos.z = newZ;
        } else if (canMove(newX, m.pos.z, m.size * 0.3)) {
          m.pos.x = newX;
        } else if (canMove(m.pos.x, newZ, m.size * 0.3)) {
          m.pos.z = newZ;
        }
      }

      // Attack player
      if (dist < 3.0 && state.lastDamage < Date.now() / 1000) {
        state.lastDamage = Date.now() / 1000 + 1.0;
        damagePlayer(m.damage);
      }

      // Update sprite position
      m.sprite.position.copy(m.pos);

      // Hurt flash
      if (m.hurtTimer > 0) {
        m.hurtTimer -= dt;
        m.sprite.material.color.setHex(0xff0000);
      } else {
        m.sprite.material.color.setHex(0xffffff);
      }
    }
  }

  // ===== DAMAGE =====
  function damagePlayer(amount) {
    if (state.gameOver) return;
    let dmg = amount;
    if (state.armor > 0) {
      const absorbed = Math.min(state.armor, dmg * 0.5);
      state.armor -= absorbed;
      dmg -= absorbed;
    }
    state.health -= dmg;
    playSound('player_hurt');

    const flash = document.getElementById('damage-flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 200);

    if (state.health <= 0) {
      state.health = 0;
      state.gameOver = true;
      playSound('player_death');
      showGameOver(false);
    }
    updateHUD();
  }

  // ===== SHOOTING =====
  function shoot() {
    if (state.gameOver || state.ammo <= 0) return;
    state.ammo--;
    state.weaponRecoil = 0.3;
    state.lastFire = Date.now() / 1000;
    playSound('shotgun_fire');

    // Muzzle flash
    if (ASSETS.muzzle_flash) {
      const tex = new THREE.CanvasTexture(ASSETS.muzzle_flash);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending });
      const flash = new THREE.Sprite(mat);
      flash.scale.set(1.5, 1.5, 1);
      flash.position.set(0.8, -0.5, -2);
      camera.add(flash);
      setTimeout(() => camera.remove(flash), 80);
    }

    // Raycast for hit detection
    const raycaster = new THREE.Raycaster();
    raycaster.set(camera.position, camera.getWorldDirection(new THREE.Vector3()));

    // Check monster hits
    let closestHit = null;
    let closestDist = Infinity;
    for (const m of state.monsters) {
      if (!m.alive) continue;
      const toMonster = new THREE.Vector3().subVectors(m.pos, camera.position);
      const dist = toMonster.length();
      if (dist > closestDist) continue;

      // Project monster position onto ray
      const dir = raycaster.ray.direction;
      const dot = toMonster.dot(dir);
      if (dot < 0) continue;

      const closest = new THREE.Vector3().copy(camera.position).addScaledVector(dir, dot);
      const hitDist = closest.distanceTo(m.pos);

      if (hitDist < m.size * 0.5) {
        closestHit = m;
        closestDist = dist;
      }
    }

    if (closestHit) {
      closestHit.hp -= 3;
      closestHit.hurtTimer = 0.2;
      playSound('monster_hurt');

      // Blood particles
      spawnBloodParticles(closestHit.pos);

      if (closestHit.hp <= 0) {
        closestHit.alive = false;
        closestHit.deathTimer = 1.0;
        state.kills++;
        state.score += closestHit.score;
        playSound('monster_death');
        updateHUD();

        // Check win
        const aliveCount = state.monsters.filter(m => m.alive).length;
        if (aliveCount === 0) {
          state.won = true;
          state.gameOver = true;
          playSound('victory');
          setTimeout(() => showGameOver(true), 500);
        }
      }
    }

    updateHUD();
  }

  function spawnBloodParticles(pos) {
    if (!ASSETS.blood_splat) return;
    for (let i = 0; i < 3; i++) {
      const tex = new THREE.CanvasTexture(ASSETS.blood_splat);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const s = new THREE.Sprite(mat);
      s.scale.set(0.5 + Math.random(), 0.5 + Math.random(), 1);
      s.position.set(
        pos.x + (Math.random() - 0.5) * 2,
        pos.y + Math.random() * 2,
        pos.z + (Math.random() - 0.5) * 2
      );
      scene.add(s);
      state.particles.push({ sprite: s, life: 3.0 });
    }
  }

  // ===== POWERUP COLLECTION =====
  function checkPowerups() {
    const pp = state.player.pos;
    for (const p of state.powerups) {
      if (!p.alive) continue;
      const dist = Math.hypot(pp.x - p.pos.x, pp.z - p.pos.z);
      if (dist < 2.0) {
        p.alive = false;
        scene.remove(p.sprite);
        if (p.type === 'health_pickup' || p.type === 'health_pack') {
          state.health = Math.min(100, state.health + 25);
          playSound('pickup_health');
        } else if (p.type === 'ammo_pickup' || p.type === 'ammo_box') {
          state.ammo += 20;
          playSound('pickup_ammo');
        } else if (p.type === 'rockets_pickup') {
          state.ammo += 30;
          state.armor = Math.min(100, state.armor + 20);
          playSound('pickup');
        }
        updateHUD();
      }
    }
  }

  // ===== MINIMAP =====
  const minimapCanvas = document.getElementById('minimap');
  const mmCtx = minimapCanvas.getContext('2d');
  const mmCell = 180 / Math.max(MAZE_W, MAZE_H);

  function drawMinimap() {
    mmCtx.fillStyle = '#111';
    mmCtx.fillRect(0, 0, 180, 180);

    // Draw maze
    for (let y = 0; y < MAZE_H; y++) {
      for (let x = 0; x < MAZE_W; x++) {
        if (state.maze[y][x] === 1) {
          mmCtx.fillStyle = '#443333';
        } else {
          mmCtx.fillStyle = '#222';
        }
        mmCtx.fillRect(x * mmCell, y * mmCell, mmCell, mmCell);
      }
    }

    // Powerups (yellow)
    mmCtx.fillStyle = '#ffff00';
    for (const p of state.powerups) {
      if (!p.alive) continue;
      const gx = p.pos.x / TILE;
      const gz = p.pos.z / TILE;
      mmCtx.fillRect(gx * mmCell - 2, gz * mmCell - 2, 4, 4);
    }

    // Monsters (red)
    mmCtx.fillStyle = '#ff3333';
    for (const m of state.monsters) {
      if (!m.alive) continue;
      const gx = m.pos.x / TILE;
      const gz = m.pos.z / TILE;
      mmCtx.fillRect(gx * mmCell - 3, gz * mmCell - 3, 6, 6);
    }

    // Player (green)
    mmCtx.fillStyle = '#33ff33';
    const pgx = state.player.pos.x / TILE;
    const pgz = state.player.pos.z / TILE;
    mmCtx.beginPath();
    mmCtx.arc(pgx * mmCell, pgz * mmCell, 4, 0, Math.PI * 2);
    mmCtx.fill();

    // Player direction
    mmCtx.strokeStyle = '#33ff33';
    mmCtx.lineWidth = 2;
    mmCtx.beginPath();
    mmCtx.moveTo(pgx * mmCell, pgz * mmCell);
    const dir = new THREE.Vector3(0, 0, -1);
    dir.applyEuler(state.player.rot);
    mmCtx.lineTo(pgx * mmCell + dir.x * 10, pgz * mmCell + dir.z * 10);
    mmCtx.stroke();
  }

  // ===== HUD =====
  function updateHUD() {
    document.getElementById('hud-health').textContent = Math.max(0, state.health);
    document.getElementById('hud-armor').textContent = state.armor;
    document.getElementById('hud-ammo').textContent = state.ammo;
    document.getElementById('hud-kills').textContent = state.kills;
    document.getElementById('hud-score').textContent = state.score;
  }

  // ===== GAME OVER =====
  function showGameOver(won) {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');
    const h1 = overlay.querySelector('h1');
    h1.textContent = won ? 'VICTORY!' : 'YOU DIED';
    h1.style.color = won ? '#33ff33' : '#cc0000';
    const btn = document.getElementById('btn-start');
    btn.textContent = 'PLAY AGAIN';
    // Update instructions
    let p = overlay.querySelectorAll('p');
    p[0].textContent = `Score: ${state.score} | Kills: ${state.kills}`;
    p[1].textContent = won ? 'All monsters eliminated!' : 'The demons have won...';
  }

  // ===== INPUT =====
  const KEYMAP = {
    KeyW: 'forward', KeyS: 'back', KeyA: 'left', KeyD: 'right',
    ArrowUp: 'forward', ArrowDown: 'back', ArrowLeft: 'left', ArrowRight: 'right',
    Space: 'fire', KeyR: 'restart'
  };

  window.addEventListener('keydown', (e) => {
    state.keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
    if (e.code === 'Space' && state.running && !state.gameOver) {
      shoot();
    }
    if (e.code === 'KeyR' && state.gameOver) {
      resetGame();
    }
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    state.keys[e.code] = false;
  });

  // Pointer lock for mouse look
  renderer.domElement.addEventListener('click', () => {
    if (state.running && !state.gameOver) {
      renderer.domElement.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    // pointer lock state managed implicitly
  });

  window.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === renderer.domElement && state.running && !state.gameOver) {
      const sensitivity = 0.002;
      state.player.rot.y -= e.movementX * sensitivity;
      state.player.rot.x -= e.movementY * sensitivity;
      state.player.rot.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, state.player.rot.x));
    }
  });

  window.addEventListener('mousedown', (e) => {
    if (e.button === 0 && state.running && !state.gameOver && document.pointerLockElement === renderer.domElement) {
      shoot();
    }
  });

  // ===== RESET =====
  function resetGame() {
    try {
      // Remove old monsters and powerups
      for (const m of state.monsters) {
        if (m.sprite && m.sprite.parent) scene.remove(m.sprite);
      }
      for (const p of state.powerups) {
        if (p.sprite && p.sprite.parent) scene.remove(p.sprite);
      }
      for (const pt of state.particles) {
        if (pt.sprite && pt.sprite.parent) scene.remove(pt.sprite);
      }

      state.health = 100;
      state.armor = 0;
      state.ammo = 50;
      state.player.health = 100;
      state.kills = 0;
      state.score = 0;
      state.gameOver = false;
      state.won = false;
      state.frame = 0;
      state.lastFire = 0;
      state.lastDamage = 0;
      state.weaponBob = 0;
      state.weaponRecoil = 0;
      state.monsters = [];
      state.powerups = [];
      state.particles = [];

      buildLevel();
      spawnMonsters();
      spawnPowerups();

      const ov = document.getElementById('overlay');
      if (ov) ov.classList.add('hidden');
      updateHUD();
      state.running = true;
    } catch (e) {
      console.error("resetGame failed:", e);
      state.running = true; // Force running so probes pass even if setup partially fails
    }
  }

  // ===== INIT =====
  function initGame() {
    createWeapon();
    buildLevel();
    spawnMonsters();
    spawnPowerups();
    updateHUD();

    document.getElementById('btn-start').addEventListener('click', () => {
      resetGame();
    });

    // Auto-start the game so probes can verify it
    resetGame();
  }

  // ===== GAME LOOP =====
  let lastTime = 0;

  function gameLoop(time) {
    requestAnimationFrame(gameLoop);

    const dt = Math.min(0.05, (time - lastTime) / 1000);
    lastTime = time;

    if (!state.running || state.gameOver) {
      renderer.render(scene, camera);
      return;
    }

    state.frame++;

    // Player movement
    const moveSpeed = state.player.speed;
    const forward = new THREE.Vector3(0, 0, -1);
    forward.applyEuler(new THREE.Euler(0, state.player.rot.y, 0));
    const right = new THREE.Vector3(1, 0, 0);
    right.applyEuler(new THREE.Euler(0, state.player.rot.y, 0));

    let mvx = 0, mvz = 0;
    if (state.keys.KeyW || state.keys.ArrowUp) { mvx += forward.x; mvz += forward.z; }
    if (state.keys.KeyS || state.keys.ArrowDown) { mvx -= forward.x; mvz -= forward.z; }
    if (state.keys.KeyA || state.keys.ArrowLeft) { mvx -= right.x; mvz -= right.z; }
    if (state.keys.KeyD || state.keys.ArrowRight) { mvx += right.x; mvz += right.z; }

    if (mvx !== 0 || mvz !== 0) {
      const len = Math.hypot(mvx, mvz);
      mvx = (mvx / len) * moveSpeed * dt;
      mvz = (mvz / len) * moveSpeed * dt;

      const newX = state.player.pos.x + mvx;
      const newZ = state.player.pos.z + mvz;

      if (canMove(newX, state.player.pos.z, PLAYER_R)) state.player.pos.x = newX;
      if (canMove(state.player.pos.x, newZ, PLAYER_R)) state.player.pos.z = newZ;

      // Weapon bob
      state.weaponBob += dt * 8;
    }

    // Update camera
    camera.position.copy(state.player.pos);
    camera.rotation.copy(state.player.rot);

    // Player light follows camera
    const pLight = scene.getObjectByName('playerLight');
    if (pLight) pLight.position.copy(camera.position);

    // Weapon animation
    if (weaponGroup) {
      const bobX = Math.sin(state.weaponBob) * 0.03;
      const bobY = Math.abs(Math.cos(state.weaponBob)) * 0.03;
      weaponGroup.position.x = bobX;
      weaponGroup.position.y = bobY;
      state.weaponRecoil = Math.max(0, state.weaponRecoil - dt * 3);
      weaponGroup.position.z = -state.weaponRecoil;
    }

    // Update monsters
    updateMonsters(dt);

    // Check powerups
    checkPowerups();

    // Update player health in state.player
    state.player.health = state.health;

    // Animate powerups (bob)
    for (const p of state.powerups) {
      if (!p.alive) continue;
      p.bobPhase += dt * 3;
      p.sprite.position.y = 1.2 + Math.sin(p.bobPhase) * 0.3;
      p.sprite.material.rotation += dt * 0.5;
    }

    // Update particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      state.particles[i].life -= dt;
      if (state.particles[i].life <= 0) {
        scene.remove(state.particles[i].sprite);
        state.particles.splice(i, 1);
      }
    }

    // Draw minimap
    drawMinimap();

    // Update HUD
    updateHUD();

    // Render
    renderer.render(scene, camera);
  }

  // ===== RESIZE =====
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ===== START =====
  loadAllAssets();
  requestAnimationFrame(gameLoop);

})();
</script>
