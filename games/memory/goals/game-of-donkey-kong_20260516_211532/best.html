<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donkey Kong</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#000; color:#fff;
    font:16px/1.4 system-ui,sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#000; border-radius:8px; box-shadow:0 10px 40px #0008;
    max-width:96vw; max-height:92vh; touch-action:none; image-rendering:pixelated; }
  #hud { position:fixed; top:12px; left:12px; background:#0009; padding:8px 14px;
    border-radius:8px; pointer-events:none; font-family:monospace; font-size:14px;
    color:#ffd24a; letter-spacing:1px; }
  #help { position:fixed; bottom:12px; left:12px; opacity:.7; font-size:13px;
    font-family:monospace; color:#9cf; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(4px); }
  #modal .card { background:#1a0030; padding:24px 28px; border-radius:14px;
    text-align:center; box-shadow:0 20px 60px #000a; border:2px solid #ff5252; }
  button { background:#ff5252; color:#fff; border:0; padding:10px 18px;
    border-radius:8px; font-size:15px; cursor:pointer; font-weight:bold; }
  button:hover { filter:brightness(1.15); }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="600" height="700"></canvas></div>
<div id="hud">SCORE 0000 | LIVES ♥♥♥ | L1</div>
<div id="help">← → move · ↑ ↓ climb ladder · SPACE jump · R restart · P pause</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">GAME OVER</h2>
  <p id="endMsg">Score: <span id="endScore">0</span></p>
  <button id="restart">Play again</button>
</div></div>
<script>
(() => {
  "use strict";
  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const hudEl = document.getElementById("hud");
  const modal = document.getElementById("modal");
  const endScoreEl = document.getElementById("endScore");
  const endTitleEl = document.getElementById("endTitle");

  const W = 600, H = 700;
  function fit() {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W+"px"; cvs.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);

  // --- Assets ---
  const ASSETS = {};
  async function loadAssets() {
    const entries = [
      ['hero',       './game-of-donkey-kong_20260516_211532_assets/hero.png'],
      ['hero_walk',  './game-of-donkey-kong_20260516_211532_assets/hero_walk.png'],
      ['hero_climb', './game-of-donkey-kong_20260516_211532_assets/hero_climb.png'],
      ['hero_jump',  './game-of-donkey-kong_20260516_211532_assets/hero_jump.png'],
      ['barrel',     './game-of-donkey-kong_20260516_211532_assets/barrel.png'],
      ['barrel_side',  './game-of-donkey-kong_20260516_211532_assets/barrel_side.png'],
      ['kong',       './game-of-donkey-kong_20260516_211532_assets/kong.png'],
      ['kong_lift',  './game-of-donkey-kong_20260516_211532_assets/kong_lift.png'],
      ['kong_throw', './game-of-donkey-kong_20260516_211532_assets/kong_throw.png'],
      ['princess',   './game-of-donkey-kong_20260516_211532_assets/princess.png'],
    ];
    for (const [name, src] of entries) {
      try {
        const img = new Image();
        img.src = src;
        await img.decode();
        ASSETS[name] = img;
      } catch(e) { console.warn('asset load failed', name, e); }
    }
  }

  // --- Sounds ---
  const SOUNDS = {};
  function loadSounds() {
    const entries = [
      ['jump', './game-of-donkey-kong_20260516_211532_sounds/jump.ogg', false],
      ['hit',  './game-of-donkey-kong_20260516_211532_sounds/hit.ogg',  false],
      ['win',  './game-of-donkey-kong_20260516_211532_sounds/win.ogg',  false],
      ['roll', './game-of-donkey-kong_20260516_211532_sounds/roll.ogg', false],
    ];
    for (const [name, src, loop] of entries) {
      try { const a = new Audio(src); a.loop = loop; a.volume = 0.5; SOUNDS[name] = a; }
      catch(e) {}
    }
  }
  loadSounds();
  function play(name) {
    const base = SOUNDS[name]; if (!base) return;
    try {
      if (base.loop) { base.play().catch(()=>{}); return; }
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(()=>{});
    } catch(e) {}
  }
  let _audioStarted = false;
  function _startAudio(){ _audioStarted = true; }
  window.addEventListener('keydown', _startAudio, {once:true});
  window.addEventListener('pointerdown', _startAudio, {once:true});

  // --- Input ---
  const keys = Object.create(null), pressed = Object.create(null);
  const KEYMAP = {
    ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
    KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
    Space:"jump", KeyP:"pause", KeyR:"restart"
  };
  addEventListener("keydown", e => {
    const k = KEYMAP[e.code]; if (!k) return;
    if (!keys[k]) pressed[k] = true;
    keys[k] = true;
    if (["up","down","left","right","jump"].includes(k)) e.preventDefault();
  }, { passive:false });
  addEventListener("keyup", e => { const k = KEYMAP[e.code]; if (k) keys[k] = false; });

  // --- Level layout ---
  // Layer 0 = bottom, layer N = top. Each platform slopes DOWN toward
  // its "lowEnd" so barrels roll downhill and fall off that side onto
  // the next layer below. Alternating directions create a zig-zag path.
  // PLATFORMS[i] = {x1,y1,x2,y2, dir}  dir=+1 means low end is at x2 (right),
  //                                    dir=-1 means low end is at x1 (left).
  const PLATFORMS = [
    // bottom — flat goal floor where Mario starts
    { x1: 40,  y1: 640, x2: 560, y2: 640, dir:  1 },
    // layer 1: low end LEFT — barrels roll left and fall off left
    { x1: 40,  y1: 555, x2: 560, y2: 535, dir: -1 },
    // layer 2: low end RIGHT
    { x1: 40,  y1: 440, x2: 560, y2: 460, dir:  1 },
    // layer 3: low end LEFT
    { x1: 40,  y1: 365, x2: 560, y2: 345, dir: -1 },
    // layer 4: low end RIGHT
    { x1: 40,  y1: 250, x2: 560, y2: 270, dir:  1 },
    // top — flat — kong/princess
    { x1: 40,  y1: 170, x2: 560, y2: 170, dir:  1 },
  ];
  // Ladders: place each between two adjacent platforms; yTop/yBottom
  // are computed from the actual platform y at that x so mounting works.
  // Some ladders are positioned away from the low-end so barrels don't
  // always immediately fall off; a few sit near the path so barrels can
  // surprise-descend them.
  const LADDER_SPECS = [
    // {x, fromLayer, toLayer}  (toLayer = layer above)
    { x: 480, from: 0, to: 1 },  // near low-end (left) of layer1
    { x: 200, from: 0, to: 1 },
    { x: 120, from: 1, to: 2 },  // near low-end (left) of layer1 — surprise ladder for barrels
    { x: 460, from: 1, to: 2 },
    { x: 500, from: 2, to: 3 },  // near low-end (right) of layer2 — surprise ladder
    { x: 180, from: 2, to: 3 },
    { x: 100, from: 3, to: 4 },  // near low-end (left) of layer3 — surprise ladder
    { x: 380, from: 3, to: 4 },
    { x: 420, from: 4, to: 5 },  // near low-end (right) of layer4 — surprise ladder
    { x: 160, from: 4, to: 5 },
  ];
  const LADDERS = LADDER_SPECS.map(s => {
    const pFrom = PLATFORMS[s.from];
    const pTo   = PLATFORMS[s.to];
    return {
      x: s.x,
      yTop:    platformYAtRaw(pTo,   s.x),  // upper platform's y here
      yBottom: platformYAtRaw(pFrom, s.x),  // lower platform's y here
      fromIdx: s.from,
      toIdx:   s.to,
    };
  });
  function platformYAtRaw(p, x) {
    const t = (x - p.x1) / (p.x2 - p.x1);
    return p.y1 + (p.y2 - p.y1) * t;
  }

  function platformYAt(p, x) {
    if (x < p.x1 || x > p.x2) return null;
    const t = (x - p.x1) / (p.x2 - p.x1);
    return p.y1 + (p.y2 - p.y1) * t;
  }
  function platformAtFoot(x, y) {
    // returns platform y if (x,y) is on a platform (within tolerance)
    let best = null, bestDist = 8;
    for (const p of PLATFORMS) {
      const py = platformYAt(p, x);
      if (py == null) continue;
      const d = Math.abs(py - y);
      if (d < bestDist) { bestDist = d; best = { plat: p, y: py }; }
    }
    return best;
  }
  function platformBelow(x, y) {
    let best = null;
    for (const p of PLATFORMS) {
      const py = platformYAt(p, x);
      if (py == null) continue;
      if (py >= y - 0.5) {
        if (!best || py < best.y) best = { plat: p, y: py };
      }
    }
    return best;
  }
  function ladderAt(x, y) {
    for (const L of LADDERS) {
      if (Math.abs(x - L.x) < 16 && y >= L.yTop - 6 && y <= L.yBottom + 6) return L;
    }
    return null;
  }
  function ladderNearFoot(x, y) {
    // Wider tolerance so player can mount even if slightly off the ladder x.
    for (const L of LADDERS) {
      if (Math.abs(x - L.x) < 22 && y >= L.yTop - 8 && y <= L.yBottom + 8) return L;
    }
    return null;
  }

  // --- State ---
  const state = {
    score: 0, lives: 3, level: 1, paused: false, over: false, won: false,
    t: 0, barrelTimer: 0, barrelInterval: 2.2,
    player: null,
    barrels: [],
    kongAnim: 0,
    kongThrow: 0,    // >0 while throwing animation plays
    flash: 0,
  };
  window.state = state;

  function makePlayer() {
    const startPlat = PLATFORMS[0];
    return {
      x: 80,
      y: platformYAt(startPlat, 80),
      vx: 0, vy: 0,
      w: 24, h: 30,
      onGround: true,
      onLadder: false,
      facing: 1,
      jumping: false,
    };
  }

  function reset() {
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.paused = false;
    state.over = false;
    state.won = false;
    state.t = 0;
    state.barrelTimer = 0;
    state.barrelInterval = 2.2;
    state.barrels = [];
    state.player = makePlayer();
    state.flash = 0;
    state.kongAnim = 0;
    state.kongThrow = 0;
    modal.style.display = "none";
  }
  document.getElementById("restart").onclick = reset;

  function spawnBarrel() {
    const topIdx = PLATFORMS.length - 1;
    const top = PLATFORMS[topIdx];
    // Kong's throw animation is 0.9s; he releases the barrel at ~0.55s
    // (when state.kongThrow drops below 0.35). We pre-schedule the
    // barrel here but mark it pending so it doesn't appear until release.
    const startX = top.x1 + 70;
    state.barrels.push({
      x: startX,
      y: platformYAtRaw(top, startX) - 12,
      vx: 80,
      vy: 0,
      r: 12,
      platIdx: topIdx,
      falling: false,
      rollAngle: 0,
      scored: false,
      pending: 0.35,  // hidden/non-physical until kong releases
    });
    state.kongThrow = 0.9;
    play('roll');
  }

  function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function updatePlayer(dt) {
    const p = state.player;
    const speed = 130;
    const climbSpeed = 90;
    const gravity = 900;
    const jumpV = -340;

    // Check if currently on a ladder
    const lad = ladderAt(p.x, p.y);

    if (p.onLadder) {
      p.vy = 0;
      if (keys.up) p.vy = -climbSpeed;
      else if (keys.down) p.vy = climbSpeed;
      // Allow exit at top/bottom
      p.y += p.vy * dt;
      // re-check ladder containment
      const stillOn = ladderAt(p.x, p.y);
      if (!stillOn) {
        // snapped off — find nearest platform
        const pb = platformAtFoot(p.x, p.y) || platformBelow(p.x, p.y);
        if (pb) { p.y = pb.y; p.onLadder = false; p.onGround = true; p.vy = 0; }
        else { p.onLadder = false; }
      }
      // small horizontal nudge to leave ladder
      if (keys.left || keys.right) {
        // if a platform passes through here, allow stepping off
        const pb = platformAtFoot(p.x, p.y);
        if (pb) {
          p.onLadder = false;
          p.onGround = true;
          p.y = pb.y;
        }
      }
    } else {
      // Horizontal movement
      p.vx = 0;
      if (!p.jumping) {
        if (keys.left)  { p.vx = -speed; p.facing = -1; }
        if (keys.right) { p.vx =  speed; p.facing =  1; }
      } else {
        // air control - keep horizontal velocity from jump
      }

      // Jump
      if (pressed.jump && p.onGround && !p.jumping) {
        p.vy = jumpV;
        p.jumping = true;
        p.onGround = false;
        // preserve current horiz
        if (keys.left)  p.vx = -speed * 0.9;
        else if (keys.right) p.vx = speed * 0.9;
        play('jump');
      }

      // Ladder mount — use a wider tolerance so the player can grab a
      // ladder even when standing slightly to its side.
      const ladMount = lad || ladderNearFoot(p.x, p.y);
      if ((keys.up || keys.down) && ladMount && p.onGround) {
        // require ladder reasonably close to current y so we don't snap
        // onto a distant ladder
        if (p.y >= ladMount.yTop - 4 && p.y <= ladMount.yBottom + 4) {
          p.onLadder = true;
          p.jumping = false;
          p.x = ladMount.x;
          p.vx = 0; p.vy = 0;
        }
      }

      // Gravity
      if (!p.onGround) {
        p.vy += gravity * dt;
        if (p.vy > 500) p.vy = 500;
      }

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // Platform collision (only when falling/grounded)
      if (p.vy >= 0) {
        const pb = platformBelow(p.x, p.y - 2);
        if (pb && p.y >= pb.y - 1) {
          p.y = pb.y;
          p.vy = 0;
          if (p.jumping) {
            // landed -> score bonus if jumped over barrel
            p.jumping = false;
          }
          p.onGround = true;
        } else {
          p.onGround = false;
        }
      } else {
        p.onGround = false;
      }
    }

    // Clamp x
    p.x = Math.max(30, Math.min(W - 30, p.x));
    if (p.y > H - 20) {
      // fell off — lose life
      hitPlayer();
    }
  }

  function updateBarrels(dt) {
    const gravity = 900;
    const ROLL_SPEED = 95;     // base rolling speed
    for (const b of state.barrels) {
      if (b.pending > 0) {
        b.pending -= dt;
        continue;
      }
      if (b.descendingLadder) {
        // Slide straight down a ladder until we hit the platform below.
        b.y += 110 * dt;
        b.rollAngle += dt * 6;
        const targetY = b.descendingLadder.yBottom - b.r;
        if (b.y >= targetY) {
          b.y = targetY;
          // Now rolling on the platform that the ladder's bottom sits on.
          // That platform is PLATFORMS[descendingLadder.fromIdx].
          b.platIdx = b.descendingLadder.fromIdx;
          const p = PLATFORMS[b.platIdx];
          b.vx = p.dir * ROLL_SPEED;
          b.descendingLadder = null;
        }
        continue;
      }
      if (b.falling) {
        b.vy += gravity * dt;
        b.y += b.vy * dt;
        b.x += b.vx * dt * 0.6;  // a little horizontal drift
        b.rollAngle += dt * 4;
        // land on a platform below us
        let landed = null;
        for (let i = 0; i < PLATFORMS.length; i++) {
          if (i === b.platIdx) continue;
          const p = PLATFORMS[i];
          const py = platformYAtRaw(p, b.x);
          if (b.x < p.x1 || b.x > p.x2) continue;
          if (py < b.y) continue;            // platform is above us — skip
          if (b.y + b.r >= py - 2 && b.y + b.r <= py + 18) {
            if (!landed || py < landed.y) landed = { idx: i, plat: p, y: py };
          }
        }
        if (landed) {
          b.y = landed.y - b.r;
          b.vy = 0;
          b.falling = false;
          b.platIdx = landed.idx;
          // Roll DOWNHILL along the new platform.
          b.vx = landed.plat.dir * ROLL_SPEED;
        }
      } else {
        // rolling on current platform — roll downhill (toward dir)
        const p = PLATFORMS[b.platIdx];
        if (Math.sign(b.vx) !== p.dir) b.vx = p.dir * ROLL_SPEED;
        b.x += b.vx * dt;
        b.rollAngle += (b.vx / b.r) * dt;
        const py = platformYAtRaw(p, b.x);
        // Stay glued to platform surface
        if (b.x >= p.x1 - 2 && b.x <= p.x2 + 2) {
          b.y = py - b.r;
        }
        // Did we reach the LOW END of this platform?
        const reachedLowEnd =
          (p.dir > 0 && b.x >= p.x2 - 4) ||
          (p.dir < 0 && b.x <= p.x1 + 4);
        if (reachedLowEnd) {
          // Fall off — drop to next platform below
          b.falling = true;
          b.vy = 0;
        } else if (b.platIdx > 0) {
          // While rolling, check ladders that go DOWN from this platform
          // (i.e. ladders whose TOP is on our platform).
          // Lower probability so MOST barrels roll all the way to the
          // end of the platform and fall off; only some take the ladder.
          for (const L of LADDERS) {
            if (L.toIdx !== b.platIdx) continue;
            if (Math.abs(b.x - L.x) < 5 && !b.justUsedLadder) {
              if (Math.random() < 0.18) {
                b.descendingLadder = L;
                b.vx = 0;
                b.justUsedLadder = true;
                break;
              } else {
                // Decided NOT to take this ladder — cool it down so the
                // dice doesn't get re-rolled every frame as we cross it.
                b.justUsedLadder = true;
              }
            }
          }
          // reset ladder-cooldown once we've moved away
          if (b.justUsedLadder) {
            const stillNearAny = LADDERS.some(L =>
              L.toIdx === b.platIdx && Math.abs(b.x - L.x) < 6);
            if (!stillNearAny) b.justUsedLadder = false;
          }
        }
      }
    }
    // remove off-screen or "completed" barrels (rolled off the bottom layer)
    state.barrels = state.barrels.filter(b => {
      if (b.x < -40 || b.x > W + 40) return false;
      if (b.y > H + 40) return false;
      // If it's on the bottom (layer 0) and reached the low end, retire it
      // shortly after — let it roll fully off the edge.
      return true;
    });

    // collisions with player
    const p = state.player;
    for (const b of state.barrels) {
      if (b.pending > 0) continue;
      const dx = p.x - b.x;
      const dy = (p.y - p.h/2) - b.y;
      const dist = Math.hypot(dx, dy);
      if (dist < b.r + 12) {
        hitPlayer();
        return;
      }
      // jump-over bonus
      if (!b.scored && p.jumping && Math.abs(p.x - b.x) < 30 && p.y < b.y - 4) {
        b.scored = true;
        state.score += 100;
      }
    }
  }

  function hitPlayer() {
    if (state.over || state.won) return;
    state.lives -= 1;
    state.flash = 0.4;
    play('hit');
    if (state.lives <= 0) {
      gameOver(false);
    } else {
      // respawn
      state.player = makePlayer();
      state.barrels = [];
    }
  }

  function checkWin() {
    const p = state.player;
    // princess is at top platform near right
    const top = PLATFORMS[PLATFORMS.length - 1];
    const princessX = top.x2 - 60;
    const princessY = platformYAt(top, princessX);
    if (Math.abs(p.x - princessX) < 30 && Math.abs(p.y - princessY) < 20) {
      gameOver(true);
    }
  }

  function gameOver(won) {
    state.over = true;
    state.won = won;
    endTitleEl.textContent = won ? "YOU WIN!" : "GAME OVER";
    endScoreEl.textContent = state.score;
    modal.style.display = "grid";
    if (won) play('win');
  }

  function drawPlatform(p) {
    ctx.strokeStyle = "#ff5252";
    ctx.lineWidth = 8;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y1);
    ctx.lineTo(p.x2, p.y2);
    ctx.stroke();
    // rivets
    ctx.fillStyle = "#ffb84a";
    const steps = 8;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = p.x1 + (p.x2 - p.x1) * t;
      const y = p.y1 + (p.y2 - p.y1) * t;
      ctx.fillRect(x-1, y-1, 2, 2);
    }
  }

  function drawLadder(L) {
    ctx.strokeStyle = "#ffd24a";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(L.x - 8, L.yTop); ctx.lineTo(L.x - 8, L.yBottom);
    ctx.moveTo(L.x + 8, L.yTop); ctx.lineTo(L.x + 8, L.yBottom);
    ctx.stroke();
    const rungs = Math.floor((L.yBottom - L.yTop) / 12);
    for (let i = 0; i <= rungs; i++) {
      const y = L.yTop + i * 12;
      ctx.beginPath(); ctx.moveTo(L.x - 8, y); ctx.lineTo(L.x + 8, y); ctx.stroke();
    }
  }

  function drawHero() {
    const p = state.player;
    const w = 32, h = 36;
    const dx = p.x - w/2, dy = p.y - h;

    // Pick frame based on player state:
    //   climbing  -> hero_climb (no horizontal flip; back-view sprite)
    //   jumping   -> hero_jump
    //   walking   -> alternate hero_walk / hero (idle) ~6Hz for a 2-frame cycle
    //   idle      -> hero
    let frame = ASSETS.hero;
    let flipX = p.facing < 0;
    if (p.onLadder) {
      frame = ASSETS.hero_climb || ASSETS.hero;
      flipX = false;  // climbing sprite is back-view, don't mirror
    } else if (p.jumping) {
      frame = ASSETS.hero_jump || ASSETS.hero;
    } else if (Math.abs(p.vx) > 1) {
      const step = Math.floor(state.t * 8) % 2;
      frame = step === 0
        ? (ASSETS.hero_walk || ASSETS.hero)
        : (ASSETS.hero || ASSETS.hero_walk);
    }

    if (frame) {
      ctx.save();
      if (flipX) {
        ctx.translate(p.x, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(frame, -w/2, dy, w, h);
      } else {
        ctx.drawImage(frame, dx, dy, w, h);
      }
      ctx.restore();
    } else {
      ctx.fillStyle = "#ff3b3b";
      ctx.fillRect(dx, dy, w, h*0.4);
      ctx.fillStyle = "#3b62ff";
      ctx.fillRect(dx, dy + h*0.4, w, h*0.6);
    }
  }

  function drawBarrel(b) {
    if (b.pending > 0) return;   // not released yet — drawn in Kong's hands
    const s = b.r * 2 + 4;

    // Three states:
    //   1) descending ladder -> TUMBLING (side view, full rotation)
    //   2) falling           -> tumbling-ish (side view, partial rotation)
    //   3) rolling on plat   -> END-ON (round flat face out, gentle wobble)
    if (b.descendingLadder) {
      const img = ASSETS.barrel_side || ASSETS.barrel;
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rollAngle);   // full tumbling down the ladder
      if (img) ctx.drawImage(img, -s/2, -s/2, s, s);
      else {
        ctx.fillStyle = "#a05a2c";
        ctx.fillRect(-s/2, -s/2*0.7, s, s*0.7);
        ctx.fillStyle = "#5a2f12";
        ctx.fillRect(-s/2, -s/2*0.7 + s*0.2, s, 2);
        ctx.fillRect(-s/2,  s/2*0.7 - s*0.2 - 2, s, 2);
      }
      ctx.restore();
      return;
    }

    if (b.falling) {
      // Falling off the END of a ramp — user wants the END-ON view here,
      // not the side-tumble. Tumble visual is reserved for ladders only.
      const img = ASSETS.barrel;
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rollAngle * 0.4);   // subtle spin of the round face
      if (img) ctx.drawImage(img, -s/2, -s/2, s, s);
      else {
        ctx.fillStyle = "#a05a2c";
        ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#5a2f12"; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, b.r * 0.65, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, b.r * 0.35, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
      return;
    }

    // Rolling on a platform: keep flat round end facing us.
    const wobble = Math.sin(b.rollAngle * 2) * 0.6;
    if (ASSETS.barrel) {
      ctx.save();
      ctx.translate(b.x, b.y + wobble);
      // tiny rotation to suggest the round face spinning, but stays end-on
      ctx.rotate(b.rollAngle * 0.5);
      ctx.drawImage(ASSETS.barrel, -s/2, -s/2, s, s);
      ctx.restore();
    } else {
      ctx.save();
      ctx.translate(b.x, b.y + wobble);
      ctx.fillStyle = "#a05a2c";
      ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#5a2f12"; ctx.lineWidth = 1.5; ctx.stroke();
      // concentric hoop rings (end-on barrel hallmark)
      ctx.beginPath(); ctx.arc(0, 0, b.r * 0.65, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, b.r * 0.35, 0, Math.PI*2); ctx.stroke();
      const a = b.rollAngle;
      ctx.fillStyle = "#d68a3c";
      ctx.beginPath();
      ctx.arc(Math.cos(a) * b.r * 0.5, Math.sin(a) * b.r * 0.5, b.r * 0.18, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawKong() {
    const top = PLATFORMS[PLATFORMS.length - 1];
    const x = top.x1 + 40;
    const y = platformYAtRaw(top, x);
    const w = 72, h = 72;
    const throwT = state.kongThrow;       // counts down from 0.9
    const throwing = throwT > 0;
    // phase 0..1 across the 0.9s throw animation
    const phase = throwing ? (1 - throwT / 0.9) : 0;

    // Pick the correct frame sprite:
    //   phase < 0.55  -> kong_lift   (barrel raised overhead)
    //   phase >= 0.55 -> kong_throw  (leaning forward, barrel released)
    //   not throwing  -> kong        (idle)
    let frame = ASSETS.kong;
    if (throwing) {
      if (phase < 0.55) frame = ASSETS.kong_lift || ASSETS.kong;
      else              frame = ASSETS.kong_throw || ASSETS.kong;
    }

    const wobble = throwing ? 0 : Math.sin(state.kongAnim * 4) * 2;
    // tiny anticipatory crouch right before lift, and recoil after throw
    let yOff = 0;
    if (throwing) {
      if (phase < 0.15)      yOff =  3 * (phase / 0.15);          // crouch
      else if (phase < 0.55) yOff =  3 - 6 * ((phase - 0.15)/0.4); // rise up lifting
      else                   yOff = -3 + 6 * ((phase - 0.55)/0.45); // settle back
    }

    ctx.save();
    ctx.translate(x, y - h/2 + wobble + yOff);
    if (frame) {
      ctx.drawImage(frame, -w/2, -h/2, w, h);
    } else {
      ctx.fillStyle = "#6b3a1a";
      ctx.fillRect(-w/2, -h/2, w, h);
    }
    ctx.restore();

    // If we don't have the lift sprite, draw a barrel above Kong's hands
    // during the lift phase so the animation still reads.
    if (throwing && phase < 0.55 && !ASSETS.kong_lift) {
      const bs = 24;
      const bx = x;
      const by = y - h + 4 + (1 - phase / 0.55) * 6;
      if (ASSETS.barrel) ctx.drawImage(ASSETS.barrel, bx - bs/2, by - bs/2, bs, bs);
      else { ctx.fillStyle = "#a05a2c"; ctx.beginPath(); ctx.arc(bx, by, bs/2, 0, Math.PI*2); ctx.fill(); }
    }

    // "DK!" yell flash at the start of the throw
    if (throwing && phase < 0.25) {
      ctx.fillStyle = "#ffd24a";
      ctx.font = "bold 14px monospace";
      ctx.textAlign = "left";
      ctx.fillText("DK!", x + 30, y - h + 4);
    }
  }

  function drawPrincess() {
    const top = PLATFORMS[PLATFORMS.length - 1];
    const x = top.x2 - 60;
    const y = platformYAtRaw(top, x);
    const w = 28, h = 36;
    if (ASSETS.princess) {
      ctx.drawImage(ASSETS.princess, x - w/2, y - h, w, h);
    } else {
      ctx.fillStyle = "#ff8ad8";
      ctx.fillRect(x - w/2, y - h, w, h);
    }
    // HELP! text
    ctx.fillStyle = "#fff";
    ctx.font = "bold 10px monospace";
    ctx.textAlign = "center";
    if ((state.t * 2) % 2 < 1) ctx.fillText("HELP!", x, y - h - 4);
  }

  function update(dt) {
    if (pressed.restart) { reset(); return; }
    if (pressed.pause) state.paused = !state.paused;
    if (state.over || state.paused) return;

    state.t += dt;
    state.kongAnim += dt;
    if (state.flash > 0) state.flash -= dt;
    if (state.kongThrow > 0) state.kongThrow -= dt;

    updatePlayer(dt);
    updateBarrels(dt);
    checkWin();

    // Spawn barrels
    state.barrelTimer += dt;
    if (state.barrelTimer >= state.barrelInterval) {
      state.barrelTimer = 0;
      state.barrelInterval = 1.6 + Math.random() * 1.4;
      if (state.barrels.length < 12) spawnBarrel();
    }

    // small score over time
    state.score += Math.floor(dt * 5);
  }

  function draw() {
    // bg
    ctx.fillStyle = "#000018";
    ctx.fillRect(0, 0, W, H);

    // stars
    ctx.fillStyle = "#222244";
    for (let i = 0; i < 30; i++) {
      const x = (i * 73) % W;
      const y = (i * 37) % H;
      ctx.fillRect(x, y, 1, 1);
    }

    // platforms
    for (const p of PLATFORMS) drawPlatform(p);
    // ladders
    for (const L of LADDERS) drawLadder(L);

    drawKong();
    drawPrincess();

    // barrels
    for (const b of state.barrels) drawBarrel(b);

    drawHero();

    if (state.flash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${state.flash})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (state.paused && !state.over) {
      ctx.fillStyle = "#0008";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 32px monospace";
      ctx.textAlign = "center";
      ctx.fillText("PAUSED", W/2, H/2);
    }
  }

  function updateHud() {
    const hearts = "♥".repeat(Math.max(0, state.lives));
    const scoreStr = String(state.score).padStart(4, "0");
    hudEl.textContent = `SCORE ${scoreStr} | LIVES ${hearts || '-'} | L${state.level}`;
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
      updateHud();
    } catch (err) {
      console.error("game crashed:", err);
    }
    for (const k in pressed) pressed[k] = false;
    requestAnimationFrame(frame);
  }

  reset();
  loadAssets().then(() => {
    last = performance.now();
    requestAnimationFrame(frame);
  });
})();
</script>
</body></html>
