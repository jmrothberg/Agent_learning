<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Invaders</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#05060f; color:#e7ecff;
    font:16px/1.4 ui-monospace,Menlo,Consolas,monospace; overflow:hidden;
    user-select:none; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#05060f; border-radius:12px;
    box-shadow:0 0 40px #0ff4, 0 0 80px #f0f3, inset 0 0 0 2px #1a2350;
    image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:96vw; max-height:94vh; touch-action:none; }
  #hud { position:fixed; top:12px; left:12px; background:#000a;
    padding:10px 14px; border-radius:8px; pointer-events:none;
    border:1px solid #0ff5; box-shadow:0 0 12px #0ff3;
    letter-spacing:1px; font-size:14px; }
  #hud .lbl { color:#7fd9ff; }
  #hud .val { color:#fff; text-shadow:0 0 6px #0ff; }
  #help { position:fixed; bottom:12px; left:12px; opacity:.6; font-size:12px;
    letter-spacing:1px; }
  #modal { position:fixed; inset:0; display:none; place-items:center;
    background:#000c; backdrop-filter:blur(6px); z-index:10; }
  #modal .card { background:linear-gradient(160deg,#10133a,#1a0b30);
    padding:30px 40px; border-radius:14px; text-align:center;
    box-shadow:0 20px 60px #000a, 0 0 40px #f0f5;
    border:1px solid #f0f7; min-width:280px; }
  #modal h2 { margin:0 0 8px; color:#ff6cf3; text-shadow:0 0 10px #f0f;
    letter-spacing:2px; }
  #modal p { margin:8px 0 18px; color:#cfd; }
  button { background:linear-gradient(180deg,#3b62ff,#5c2af0); color:#fff;
    border:0; padding:12px 22px; border-radius:8px; font-size:14px;
    cursor:pointer; letter-spacing:1px; font-family:inherit;
    box-shadow:0 4px 16px #5c2af066; }
  button:hover { filter:brightness(1.15); }
  #loading { position:fixed; inset:0; display:grid; place-items:center;
    background:#05060f; z-index:20; color:#7fd9ff; letter-spacing:2px; }
  #loading .bar { width:240px; height:6px; background:#0ff2; margin-top:14px;
    border-radius:3px; overflow:hidden; }
  #loading .bar > div { width:0; height:100%;
    background:linear-gradient(90deg,#0ff,#f0f); transition:width .2s; }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="800" height="600"></canvas></div>
<div id="hud">
  <div><span class="lbl">SCORE </span><span class="val" id="score">0</span></div>
  <div><span class="lbl">LIVES </span><span class="val" id="lives">3</span></div>
  <div><span class="lbl">WAVE&nbsp; </span><span class="val" id="waveN">1</span></div>
</div>
<div id="help">← → move • SPACE fire • ENTER restart • P pause</div>
<div id="modal"><div class="card">
  <h2 id="endTitle">GAME OVER</h2>
  <p>Final score: <span id="endScore">0</span> &nbsp; Wave: <span id="endWave">1</span></p>
  <button id="restartBtn">PLAY AGAIN</button>
</div></div>
<div id="loading">LOADING ASSETS…<div class="bar"><div id="lbar"></div></div></div>
<script>
(() => {
  "use strict";

  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d", { willReadFrequently: true });
  const W = 800, H = 600;
  function fit() {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W+"px"; cvs.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  fit(); addEventListener("resize", fit);

  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const waveEl  = document.getElementById("waveN");
  const modal   = document.getElementById("modal");
  const endScoreEl = document.getElementById("endScore");
  const endWaveEl  = document.getElementById("endWave");
  const endTitle   = document.getElementById("endTitle");
  const lbar = document.getElementById("lbar");

  const ASSET_DIR = "./game-of-space-invaders_20260519_125234_assets/";
  const SOUND_DIR = "./game-of-space-invaders_20260519_125234_sounds/";
  const ASSETS = {};
  const SOUNDS = {};

  async function loadAssets() {
    const list = [
      ["player_ship", ASSET_DIR + "player_ship.png"],
      ["explosion",   ASSET_DIR + "explosion.png"],
      ["shield",      ASSET_DIR + "shield.png"],
    ];
    for (let i = 0; i < list.length; i++) {
      try {
        const img = new Image();
        img.src = list[i][1];
        await img.decode();
        ASSETS[list[i][0]] = img;
      } catch(e) { console.warn("asset failed", list[i][0], e); }
      lbar.style.width = ((i+1)/list.length*100)+"%";
    }
  }

  function loadSounds() {
    const list = [
      ["player_shot",  "player_shot.ogg",  false],
      ["alien_shot",   "alien_shot.ogg",   false],
      ["explosion",    "explosion.ogg",    false],
      ["alien_death",  "alien_death.ogg",  false],
      ["player_death", "player_death.ogg", false],
      ["wave_start",   "wave_start.ogg",   false],
    ];
    for (const [name, file, loop] of list) {
      try {
        const a = new Audio(SOUND_DIR + file);
        a.loop = loop;
        a.preload = "auto";
        a.volume = 0.55;
        SOUNDS[name] = a;
      } catch(e) {}
    }
  }

  function play(name) {
    const base = SOUNDS[name];
    if (!base) return;
    try {
      if (base.loop) { base.play().catch(()=>{}); return; }
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(()=>{});
    } catch(e) {}
  }

  let audioStarted = false;
  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
  }
  addEventListener("keydown", startAudio, { once:true });
  addEventListener("pointerdown", startAudio, { once:true });

  // ---------- Input ----------
  const keys = Object.create(null);
  const KEYMAP = {
    ArrowLeft:"left", ArrowRight:"right",
    KeyA:"left", KeyD:"right",
    Space:"fire", KeyP:"pause", Enter:"restart", KeyR:"restart"
  };
  addEventListener("keydown", e => {
    const k = KEYMAP[e.code]; if (!k) return;
    if (["ArrowLeft","ArrowRight","Space","Enter"].includes(e.code)) e.preventDefault();
    keys[k] = true;
  }, { passive:false });
  addEventListener("keyup", e => {
    const k = KEYMAP[e.code]; if (k) keys[k] = false;
  });

  cvs.addEventListener("pointerdown", e => {
    startAudio();
    const r = cvs.getBoundingClientRect();
    const rx = (e.clientX - r.left) / r.width;
    if (rx < 0.5) keys.left = true;
    else keys.right = true;
    keys.fire = true;
  });
  cvs.addEventListener("pointerup", () => {
    keys.left = false; keys.right = false; keys.fire = false;
  });

  // ---------- Stars ----------
  const stars = [];
  for (let i=0; i<120; i++) {
    stars.push({ x:Math.random()*W, y:Math.random()*H, z:0.3+Math.random()*1.7 });
  }

  // ---------- Alien pixel art (3 types × 2 frames) ----------
  // Each pattern is an array of strings, 1 = pixel, 0 = empty
  const ALIEN_PATTERNS = {
    // Type 1: Squid (top rows, 30pts) - 8x8
    type1: [
      // Frame A
      [
        "00011000",
        "00111100",
        "01111110",
        "11011011",
        "11111111",
        "00100010",
        "01010101",
        "10100101",
      ],
      // Frame B
      [
        "00011000",
        "00111100",
        "01111110",
        "11011011",
        "11111111",
        "00100010",
        "01010101",
        "01000010",
      ]
    ],
    // Type 2: Crab (middle rows, 20pts) - 12x8
    type2: [
      // Frame A
      [
        "000011000000",
        "000111100000",
        "001111110000",
        "011011011000",
        "111111111100",
        "101111111010",
        "101000001010",
        "000100010000",
      ],
      // Frame B
      [
        "000011000000",
        "000111100000",
        "001111110000",
        "011011011000",
        "111111111100",
        "101111111010",
        "010000000010",
        "100000000001",
      ]
    ],
    // Type 3: Octopus (bottom rows, 10pts) - 12x8
    type3: [
      // Frame A
      [
        "000001100000",
        "000011110000",
        "000111111000",
        "001101101100",
        "011111111110",
        "110111111011",
        "100011110001",
        "000100001000",
      ],
      // Frame B
      [
        "000001100000",
        "000011110000",
        "000111111000",
        "001101101100",
        "011111111110",
        "110111111011",
        "100011110001",
        "001000000100",
      ]
    ]
  };

  // Pre-render alien frames to offscreen canvases
  const ALIEN_SPRITES = {};
  const ALIEN_SCALE = 3;
  function renderAlienSprites() {
    for (const [type, frames] of Object.entries(ALIEN_PATTERNS)) {
      ALIEN_SPRITES[type] = [];
      for (let f = 0; f < frames.length; f++) {
        const pattern = frames[f];
        const rows = pattern.length;
        const cols = pattern[0].length;
        const c = document.createElement("canvas");
        c.width = cols * ALIEN_SCALE;
        c.height = rows * ALIEN_SCALE;
        const cx = c.getContext("2d");
        cx.imageSmoothingEnabled = false;
        for (let r = 0; r < rows; r++) {
          for (let col = 0; col < cols; col++) {
            if (pattern[r][col] === "1") {
              cx.fillStyle = "#4f4";
              cx.fillRect(col * ALIEN_SCALE, r * ALIEN_SCALE, ALIEN_SCALE, ALIEN_SCALE);
            }
          }
        }
        ALIEN_SPRITES[type].push(c);
      }
    }
  }
  renderAlienSprites();

  // ---------- State ----------
  const state = {
    W, H,
    score: 0, lives: 3, wave: 1,
    paused: false, over: false, t: 0,
    player: { x: W/2, y: H - 50, w: 48, h: 48, cool: 0, invuln: 0 },
    aliens: [],
    alienRows: 5,
    alienCols: 11,
    alienDir: 1,
    alienStepTimer: 0,
    alienStepInterval: 0.25,
    alienDropAmount: 20,
    alienAnimFrame: 0,
    playerBullets: [],
    alienBullets: [],
    shields: [],
    explosions: [],
    particles: [],
    waveTransition: false,
    waveTransitionTimer: 0,
    lastAlienFire: 0,
    alienFireInterval: 1.5,
  };
  window.state = state;
  window.playSound = play;
  window.alienDirHistory = [];
  window.playthroughCount = 0;

  function buildAliens() {
    state.aliens = [];
    const cols = state.alienCols;
    const rows = state.alienRows;
    const spacingX = 58;
    const spacingY = 48;
    const startX = (W - cols * spacingX) / 2 + spacingX/2;
    const startY = 80;
    const typeMap = [
      { type: "type1", score: 30 },
      { type: "type1", score: 30 },
      { type: "type2", score: 20 },
      { type: "type2", score: 20 },
      { type: "type3", score: 10 },
    ];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const info = typeMap[r] || typeMap[4];
        state.aliens.push({
          x: startX + c * spacingX,
          y: startY + r * spacingY,
          w: 32, h: 32,
          score: info.score,
          asset: info.type,
          row: r,
          col: c,
          alive: true,
        });
      }
    }
  }

  function buildShields() {
    state.shields = [];
    const shieldCount = 4;
    const shieldW = 56, shieldH = 48;
    const spacing = W / (shieldCount + 1);
    for (let i = 0; i < shieldCount; i++) {
      const cx = spacing * (i + 1);
      const cy = H - 140;
      const cols = 7, rows = 5;
      const bw = shieldW / cols, bh = shieldH / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (r >= 3 && c >= 2 && c <= 4) continue;
          state.shields.push({
            x: cx - shieldW/2 + c * bw,
            y: cy - shieldH/2 + r * bh,
            w: bw, h: bh,
            alive: true,
          });
        }
      }
    }
  }

  function reset() {
    window.playthroughCount++;
    state.score = 0; state.lives = 3; state.wave = 1;
    state.paused = false; state.over = false; state.t = 0;
    state.player.x = W/2; state.player.y = H - 50;
    state.player.cool = 0; state.player.invuln = 1.5;
    state.playerBullets.length = 0;
    state.alienBullets.length = 0;
    state.explosions.length = 0;
    state.particles.length = 0;
    state.alienDir = 1;
    state.alienStepTimer = 0;
    state.alienStepInterval = 0.25;
    state.alienFireInterval = 1.5;
    state.lastAlienFire = 0;
    state.alienAnimFrame = 0;
    state.waveTransition = false;
    state.waveTransitionTimer = 0;
    buildAliens();
    buildShields();
    modal.style.display = "none";
    play("wave_start");
  }

  document.getElementById("restartBtn").onclick = () => { reset(); };
  addEventListener("keydown", e => {
    if ((e.code === "Enter" || e.code === "KeyR") && state.over) {
      reset();
    }
  });

  function addParticles(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = speed * (0.5 + Math.random());
      state.particles.push({
        x, y,
        vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        life: 0.3 + Math.random()*0.4, age: 0,
        color: color, size: 1.5 + Math.random()*2.5,
      });
    }
  }

  function addExplosion(x, y, big) {
    state.explosions.push({ x, y, t: 0, dur: big ? 0.5 : 0.35, scale: big ? 1.4 : 1.0 });
    addParticles(x, y, big ? 18 : 8, big ? "#ff5e3a" : "#ffb347", big ? 150 : 80);
  }

  function hitPlayer() {
    state.lives--;
    state.player.invuln = 2.0;
    addExplosion(state.player.x, state.player.y, true);
    play("player_death");
    if (state.lives <= 0) {
      state.over = true;
      endTitle.textContent = "GAME OVER";
      endScoreEl.textContent = state.score;
      endWaveEl.textContent = state.wave;
      modal.style.display = "grid";
    }
  }

  function startNewWave() {
    state.wave++;
    state.alienStepInterval = Math.max(0.08, 1.0 - state.wave * 0.1);
    state.alienFireInterval = Math.max(0.4, 1.5 - state.wave * 0.1);
    state.alienDir = 1;
    state.alienStepTimer = 0;
    state.lastAlienFire = 0;
    state.alienAnimFrame = 0;
    state.playerBullets.length = 0;
    state.alienBullets.length = 0;
    buildAliens();
    play("wave_start");
  }

  // ---------- Update ----------
  function update(dt) {
    if (keys.pause) { state.paused = !state.paused; keys.pause = false; }
    if (state.paused || state.over) return;
    state.t += dt;

    for (const s of stars) {
      s.y += (30 + s.z * 50) * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    }

    const p = state.player;
    const pSpeed = 280;
    if (keys.left)  p.x -= pSpeed * dt;
    if (keys.right) p.x += pSpeed * dt;
    p.x = Math.max(p.w/2, Math.min(W - p.w/2, p.x));
    if (p.invuln > 0) p.invuln -= dt;

    p.cool -= dt;
    if (keys.fire && p.cool <= 0) {
      state.playerBullets.push({
        x: p.x, y: p.y - p.h/2,
        vx: 0, vy: -550,
        w: 4, h: 14, life: 1.5,
      });
      p.cool = 0.25;
      play("player_shot");
    }

    for (const b of state.playerBullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    }
    state.playerBullets = state.playerBullets.filter(b =>
      b.life > 0 && b.y > -20 && b.x > -20 && b.x < W+20);

    const aliveAliens = state.aliens.filter(a => a.alive);
    if (aliveAliens.length > 0) {
      state.alienStepTimer += dt;
      const countFactor = Math.max(0.15, aliveAliens.length / (state.alienRows * state.alienCols));
      const interval = state.alienStepInterval * countFactor;

      if (state.alienStepTimer >= interval) {
        state.alienStepTimer = 0;
        let needDirChange = false;
        const margin = 30;
        for (const a of aliveAliens) {
          if ((state.alienDir > 0 && a.x > W - margin) ||
              (state.alienDir < 0 && a.x < margin)) {
            needDirChange = true;
            break;
          }
        }
        if (needDirChange) {
          state.alienDir *= -1;
          for (const a of aliveAliens) {
            a.y += state.alienDropAmount;
          }
        } else {
          const stepSize = 12;
          for (const a of aliveAliens) {
            a.x += stepSize * state.alienDir;
          }
        }
        // Toggle animation frame on each step (faster toggle for more animated look)
        state.alienAnimFrame = 1 - state.alienAnimFrame;
        // Also toggle extra for faster leg animation
        if (Math.random() < 0.5) state.alienAnimFrame = 1 - state.alienAnimFrame;
        // Track direction changes for probe
        window.alienDirHistory.push({ dir: state.alienDir, t: state.t });
        if (window.alienDirHistory.length > 500) window.alienDirHistory.splice(0, 100);

        for (const a of aliveAliens) {
          if (a.y > p.y - 10) {
            state.lives = 0;
            state.over = true;
            endTitle.textContent = "ALIENS INVADED!";
            endScoreEl.textContent = state.score;
            endWaveEl.textContent = state.wave;
            modal.style.display = "grid";
            play("player_death");
            break;
          }
        }
      }
    }

    state.lastAlienFire += dt;
    if (state.lastAlienFire >= state.alienFireInterval && aliveAliens.length > 0) {
      state.lastAlienFire = 0;
      const cols = {};
      for (const a of aliveAliens) {
        if (!cols[a.col] || cols[a.col].row < a.row) cols[a.col] = a;
      }
      const bottomAliens = Object.values(cols);
      if (bottomAliens.length > 0) {
        const shooter = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];
        state.alienBullets.push({
          x: shooter.x, y: shooter.y + shooter.h/2,
          vx: 0, vy: 250 + state.wave * 15,
          w: 4, h: 14, life: 3.0,
        });
        play("alien_shot");
      }
    }

    for (const b of state.alienBullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    }
    state.alienBullets = state.alienBullets.filter(b =>
      b.life > 0 && b.y < H+20 && b.x > -20 && b.x < W+20);

    for (const b of state.playerBullets) {
      for (const a of aliveAliens) {
        if (Math.abs(b.x - a.x) < a.w/2 + 2 && Math.abs(b.y - a.y) < a.h/2 + 2) {
          a.alive = false;
          b.life = 0;
          state.score += a.score;
          addExplosion(a.x, a.y, false);
          play("alien_death");
          break;
        }
      }
    }
    state.playerBullets = state.playerBullets.filter(b => b.life > 0);

    for (const b of state.playerBullets) {
      for (const s of state.shields) {
        if (!s.alive) continue;
        if (Math.abs(b.x - (s.x+s.w/2)) < s.w/2+1 && Math.abs(b.y - (s.y+s.h/2)) < s.h/2+1) {
          s.alive = false;
          b.life = 0;
          addParticles(s.x+s.w/2, s.y+s.h/2, 3, "#4f4", 40);
          break;
        }
      }
    }
    state.playerBullets = state.playerBullets.filter(b => b.life > 0);

    for (const b of state.alienBullets) {
      for (const s of state.shields) {
        if (!s.alive) continue;
        if (Math.abs(b.x - (s.x+s.w/2)) < s.w/2+1 && Math.abs(b.y - (s.y+s.h/2)) < s.h/2+1) {
          s.alive = false;
          b.life = 0;
          addParticles(s.x+s.w/2, s.y+s.h/2, 3, "#4f4", 40);
          break;
        }
      }
    }
    state.alienBullets = state.alienBullets.filter(b => b.life > 0);

    if (p.invuln <= 0) {
      for (const b of state.alienBullets) {
        if (Math.abs(b.x - p.x) < p.w/2 - 4 && Math.abs(b.y - p.y) < p.h/2 - 4) {
          b.life = 0;
          hitPlayer();
          break;
        }
      }
    }
    state.alienBullets = state.alienBullets.filter(b => b.life > 0);

    for (const a of aliveAliens) {
      for (const s of state.shields) {
        if (!s.alive) continue;
        if (Math.abs(a.x - (s.x+s.w/2)) < a.w/2+s.w/2 &&
            Math.abs(a.y - (s.y+s.h/2)) < a.h/2+s.h/2) {
          s.alive = false;
        }
      }
    }

    if (aliveAliens.length === 0 && !state.waveTransition) {
      state.waveTransition = true;
      state.waveTransitionTimer = 1.5;
    }
    if (state.waveTransition) {
      state.waveTransitionTimer -= dt;
      if (state.waveTransitionTimer <= 0) {
        startNewWave();
        state.waveTransition = false;
      }
    }

    for (const e of state.explosions) e.t += dt;
    state.explosions = state.explosions.filter(e => e.t < e.dur);

    for (const pt of state.particles) {
      pt.age += dt;
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vx *= 0.95; pt.vy *= 0.95;
    }
    state.particles = state.particles.filter(pt => pt.age < pt.life);
  }

  // ---------- Draw ----------
  function drawSprite(img, x, y, w, h) {
    if (img) {
      ctx.drawImage(img, x - w/2, y - h/2, w, h);
    }
  }

  function draw() {
    ctx.fillStyle = "#05060f";
    ctx.fillRect(0, 0, W, H);

    for (const s of stars) {
      const a = 0.25 + s.z * 0.45;
      ctx.fillStyle = `rgba(${140+s.z*50|0},${180+s.z*40|0},255,${a.toFixed(2)})`;
      ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.z < 1 ? 1 : 2, 1);
    }

    for (const s of state.shields) {
      if (!s.alive) continue;
      ctx.fillStyle = "#3d8";
      ctx.fillRect(s.x, s.y, s.w, s.h);
      ctx.fillStyle = "#5f9";
      ctx.fillRect(s.x+1, s.y+1, s.w-2, s.h-2);
    }

    // Draw aliens with bobbing walk animation
    const frame = state.alienAnimFrame;
    for (const a of state.aliens) {
      if (!a.alive) continue;
      // Bob up and down to simulate walking
      const bob = Math.sin(state.t * 5 + a.col * 0.7 + a.row * 0.4) * 3;
      const drawY = a.y + bob;
      const sprite = ALIEN_SPRITES[a.asset];
      if (sprite && sprite[frame]) {
        const sw = sprite[frame].width;
        const sh = sprite[frame].height;
        ctx.drawImage(sprite[frame], a.x - sw/2, drawY - sh/2);
      } else {
        ctx.fillStyle = "#4f4";
        ctx.fillRect(a.x - a.w/2, drawY - a.h/2, a.w, a.h);
        // Eyes
        ctx.fillStyle = "#05060f";
        ctx.fillRect(a.x - 5, drawY - 4, 3, 3);
        ctx.fillRect(a.x + 2, drawY - 4, 3, 3);
      }
    }

    for (const b of state.playerBullets) {
      // Main beam
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#0ff";
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      // Flame trail
      ctx.fillStyle = "rgba(0,255,255,0.5)";
      ctx.fillRect(b.x - 1, b.y + b.h/2, 2, 12);
      ctx.fillStyle = "rgba(0,255,255,0.25)";
      ctx.fillRect(b.x - 1, b.y + b.h/2 + 10, 2, 8);
      ctx.shadowBlur = 0;
    }

    for (const b of state.alienBullets) {
      ctx.fillStyle = "#f55";
      ctx.shadowColor = "#f55";
      ctx.shadowBlur = 6;
      ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
      ctx.shadowBlur = 0;
    }

    const p = state.player;
    const flicker = (p.invuln > 0) && (Math.floor(state.t * 15) % 2 === 0);
    if (!flicker) {
      if (ASSETS.player_ship) {
        drawSprite(ASSETS.player_ship, p.x, p.y, p.w, p.h);
      } else {
        ctx.fillStyle = "#0df";
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - p.h/2);
        ctx.lineTo(p.x - p.w/2, p.y + p.h/2);
        ctx.lineTo(p.x + p.w/2, p.y + p.h/2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.fillRect(p.x - 2, p.y - 4, 4, 8);
      }
    }

    for (const e of state.explosions) {
      const progress = e.t / e.dur;
      const radius = 15 * e.scale * (progress < 0.5 ? progress*2 : 2 - progress*2);
      const alpha = 1 - progress;
      if (ASSETS.explosion) {
        ctx.globalAlpha = alpha;
        drawSprite(ASSETS.explosion, e.x, e.y, radius*2, radius*2);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = `rgba(255,${140-progress*80|0},0,${alpha.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(e.x, e.y, radius, 0, Math.PI*2);
        ctx.fill();
      }
    }

    for (const pt of state.particles) {
      const a = Math.max(0, 1 - pt.age / pt.life);
      ctx.globalAlpha = a;
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
    }
    ctx.globalAlpha = 1;

    if (state.waveTransition) {
      ctx.fillStyle = "#0ff";
      ctx.font = "bold 32px ui-monospace,monospace";
      ctx.textAlign = "center";
      ctx.shadowColor = "#0ff";
      ctx.shadowBlur = 12;
      ctx.fillText(`WAVE ${state.wave} COMPLETE`, W/2, H/2);
      ctx.shadowBlur = 0;
    }

    if (state.paused && !state.over) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#ff6cf3";
      ctx.font = "bold 48px ui-monospace,monospace";
      ctx.textAlign = "center";
      ctx.shadowColor = "#f0f"; ctx.shadowBlur = 16;
      ctx.fillText("PAUSED", W/2, H/2);
      ctx.shadowBlur = 0;
    }
  }

  function updateHUD() {
    scoreEl.textContent = state.score;
    livesEl.textContent = state.lives;
    waveEl.textContent  = state.wave;
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
      updateHUD();
    } catch (err) {
      console.error("game crashed:", err);
    }
    requestAnimationFrame(frame);
  }

  loadSounds();
  loadAssets().then(() => {
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  }).catch(err => {
    console.error("asset load failed:", err);
    document.getElementById("loading").style.display = "none";
    reset();
    requestAnimationFrame(frame);
  });
})();
</script>
</body></html>
