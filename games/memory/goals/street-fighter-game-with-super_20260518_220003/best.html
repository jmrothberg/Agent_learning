<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Street Fighter</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a12;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,sans-serif}
  canvas{background:#000;image-rendering:pixelated;max-width:100vw;max-height:100vh}
  #hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);width:90%;max-width:800px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
  .bar-wrap{width:45%;height:28px;background:#222;border:3px solid #fff;position:relative;overflow:hidden}
  .bar{height:100%;transition:width 0.15s}
  #p1Health{background:linear-gradient(90deg,#0a0,#0f0);width:100%}
  #cpuHealth{background:linear-gradient(90deg,#f00,#a00);width:100%;margin-left:auto}
  #timer{color:#fff;font-size:28px;font-weight:bold;text-shadow:2px 2px #000;min-width:60px;text-align:center}
  #msg{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);color:#ff0;font-size:56px;font-weight:900;text-shadow:3px 3px 0 #000;pointer-events:none;display:none;z-index:20;letter-spacing:2px}
  #restart{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 28px;font-size:20px;font-weight:bold;cursor:pointer;background:#3b62ff;color:#fff;border:none;border-radius:8px;display:none;z-index:20}
  #restart:hover{background:#5a7fff}
  #help{position:fixed;bottom:10px;left:10px;color:#888;font-size:13px;pointer-events:none}
</style>
</head>
<body>
<div id="hud">
  <div class="bar-wrap"><div id="p1Health" class="bar"></div></div>
  <div id="timer">99</div>
  <div class="bar-wrap"><div id="cpuHealth" class="bar"></div></div>
</div>
<div id="msg"></div>
<button id="restart">RESTART</button>
<div id="help">← → Move | ↑ Jump | ↓ Duck | J Punch | K Kick | L Fireball | U Block</div>
<canvas id="c"></canvas>
<script>
(()=>{
"use strict";
const cvs=document.getElementById("c"),ctx=cvs.getContext("2d");
const W=1200,H=675,GY=540;
const ASSETS={},SOUNDS={};
const ASSET_NAMES=["ryu_idle","ryu_punch","ryu_kick","ryu_jump","ryu_duck","ryu_block","ryu_fireball","ryu_hit","ryu_ko","ryu_walk","ken_idle","ken_punch","ken_kick","ken_jump","ken_duck","ken_block","ken_fireball","ken_hit","ken_ko","ken_walk","fireball","stage_dojo","health_bar_full","health_bar_empty","hit_spark"];
const SOUND_NAMES=["punch","kick","fireball","fireball_hit","ko","round_start"];
const ASSET_DIR="./street-fighter-game-with-super_20260518_220003_assets/";
const SOUND_DIR="./street-fighter-game-with-super_20260518_220003_sounds/";

async function loadAssets(){
  const p=[];
  for(const n of ASSET_NAMES){const i=new Image();i.src=ASSET_DIR+n+".png";p.push(i.decode().then(()=>ASSETS[n]=i).catch(()=>ASSETS[n]=null));}
  await Promise.allSettled(p);
  for(const n of SOUND_NAMES){const a=new Audio(SOUND_DIR+n+".ogg");SOUNDS[n]=a;}
}

function playSfx(name){
  try{const s=SOUNDS[name];if(s){const c=s.cloneNode();c.volume=0.4;c.play().catch(()=>{});}}catch(e){}
}

const state={
  player:null,cpu:null,projectiles:[],hitFx:[],
  roundStartT:0,koT:0,gameOver:false,
  pWins:0,cWins:0,timer:99,frame:0,
  reset(){
    this.hitFx=[];
    this.player={x:200,y:GY,vx:0,vy:0,hp:100,maxHp:100,state:"idle",stateT:0,facing:1,grounded:true,cd:0};
    this.cpu={x:600,y:GY,vx:0,vy:0,hp:100,maxHp:100,state:"idle",stateT:0,facing:-1,grounded:true,cd:0,aiT:0};
    this.projectiles=[];this.roundStartT=2;this.koT=0;this.gameOver=false;this.timer=99;this.frame=0;
    document.getElementById("msg").style.display="none";
    document.getElementById("restart").style.display="none";
    updateBars();
  }
};
window.state=state;
window.resetGame=state.reset;
state.reset();

const keys={};
const KEYMAP={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",KeyJ:"punch",KeyK:"kick",KeyL:"fireball",KeyU:"block",Enter:"enter"};
window.addEventListener("keydown",e=>{
  const k=KEYMAP[e.code];if(k){keys[k]=true;if(["up","down","left","right","punch","kick","fireball","block"].includes(k))e.preventDefault();}
  if(e.code==="Enter"&&state.gameOver)state.reset();
},{passive:false});
window.addEventListener("keyup",e=>{const k=KEYMAP[e.code];if(k)keys[k]=false;});
document.getElementById("restart").onclick=()=>state.reset();

function updateBars(){
  document.getElementById("p1Health").style.width=Math.max(0,state.player.hp)+"%";
  document.getElementById("cpuHealth").style.width=Math.max(0,state.cpu.hp)+"%";
  document.getElementById("timer").textContent=Math.max(0,Math.floor(state.timer));
}

function fit(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cvs.width=W*dpr;cvs.height=H*dpr;
  cvs.style.width=W+"px";cvs.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
fit();window.addEventListener("resize",fit);

function getSprite(f,charName){
  return ASSETS[charName+"_"+f.state]||ASSETS[charName+"_idle"];
}

function updateFighter(f,dt,isPlayer){
  if(f.state==="ko")return;
  f.stateT+=dt;
  if(f.state==="hit"){if(f.stateT>0.45){f.state="idle";f.stateT=0;}}
  else if(f.state==="punch"){if(f.stateT>0.35){f.state="idle";f.stateT=0;}}
  else if(f.state==="kick"){if(f.stateT>0.45){f.state="idle";f.stateT=0;}}
  else if(f.state==="fireball"){if(f.stateT>0.5){f.state="idle";f.stateT=0;}}
  else if(f.state==="block"){if(!keys.block){f.state="idle";f.stateT=0;}}
  else if(f.state==="jump"){if(f.grounded){f.state="idle";f.stateT=0;}}
  else if(f.state==="duck"){if(!keys.down){f.state="idle";f.stateT=0;}}
  else if(f.state==="walk"){if(!keys.left&&!keys.right){f.state="idle";f.stateT=0;}}

  if(f.state==="idle"||f.state==="walk"){
    if(isPlayer){
      if(keys.block){f.state="block";f.stateT=0;}
      else if(keys.punch&&f.cd<=0){f.state="punch";f.stateT=0;f.cd=0.3;playSfx("punch");}
      else if(keys.kick&&f.cd<=0){f.state="kick";f.stateT=0;f.cd=0.4;playSfx("kick");}
      else if(keys.fireball&&f.cd<=0){f.state="fireball";f.stateT=0;f.cd=0.8;playSfx("fireball");state.projectiles.push({x:f.x+f.facing*40,y:f.y-260,vx:f.facing*300,dmg:12,owner:isPlayer?"player":"cpu",life:2});}
      else if(keys.up&&f.grounded){f.vy=-600;f.grounded=false;f.state="jump";f.stateT=0;}
      else if(keys.down){f.state="duck";f.stateT=0;}
      else if(keys.left||keys.right){f.state="walk";f.stateT=0;}
    }
  }
  if(f.cd>0)f.cd-=dt;
}

function updatePhysics(f,dt){
  const other=f===state.player?state.cpu:state.player;
  f.facing=other.x>f.x?1:-1;
  if(f.state==="walk"){
    const dir=f.facing;
    f.vx=dir*180;
  }else if(f.state==="jump"){
    f.vx=(other.x>f.x?1:-1)*120;
  }else{
    f.vx*=0.85;
  }
  f.vy+=1400*dt;
  f.x+=f.vx*dt;
  f.y+=f.vy*dt;
  if(f.y>=GY){f.y=GY;f.vy=0;f.grounded=true;}
  f.x=Math.max(50,Math.min(W-50,f.x));
  if(Math.abs(f.x-other.x)<50){
    const push=f.x<other.x?-1:1;
    f.x+=push*2;
  }
}

function checkHits(dt){
  const p=state.player,c=state.cpu;
  const hit=(attacker,defender,action,dmg)=>{
    if(defender.state==="ko")return;
    const dist=Math.abs(attacker.x-defender.x);
    const reach=action==="punch"?60:action==="kick"?75:0;
    const active=action==="punch"?attacker.stateT>0.1&&attacker.stateT<0.25:attacker.stateT>0.15&&attacker.stateT<0.35;
    if(attacker.state===action&&active&&dist<reach){
      if(defender.state==="block"){defender.hp-=dmg*0.2;}
      else{defender.hp-=dmg;defender.state="hit";defender.stateT=0;playSfx(action==="punch"?"punch":"kick");}
      if(defender.hp<=0){defender.hp=0;defender.state="ko";defender.stateT=0;playSfx("ko");}
    }
  };
  hit(p,c,"punch",8);hit(p,c,"kick",12);
  hit(c,p,"punch",8);hit(c,p,"kick",12);
  for(let i=state.projectiles.length-1;i>=0;i--){
    const pr=state.projectiles[i];
    pr.x+=pr.vx*dt;pr.life-=dt;
    const tgt=pr.owner==="player"?c:p;
    if(pr.life<=0||pr.x<-50||pr.x>W+50){state.projectiles.splice(i,1);continue;}
    if(Math.abs(pr.x-tgt.x)<70 && pr.y < tgt.y && pr.y > tgt.y - 490){
      if(tgt.state!=="ko"&&tgt.state!=="hit"){
        if(tgt.state==="block")tgt.hp-=pr.dmg*0.2;
        else{tgt.hp-=pr.dmg;tgt.state="hit";tgt.stateT=0;playSfx("fireball_hit");}
        if(tgt.hp<=0){tgt.hp=0;tgt.state="ko";tgt.stateT=0;playSfx("ko");}
      }
      state.hitFx.push({x:pr.x,y:pr.y,life:0.3});
      state.projectiles.splice(i,1);
    }
  }
}

function updateCPU(dt){
  const c=state.cpu,p=state.player;
  if(c.state==="ko")return;
  c.aiT-=dt;
  if(c.aiT<=0){
    c.aiT=0.3+Math.random()*0.4;
    const dist=Math.abs(c.x-p.x);
    const r=Math.random();
    if(dist>200){if(r<0.3){c.state="fireball";c.stateT=0;c.cd=0.8;playSfx("fireball");state.projectiles.push({x:c.x+c.facing*40,y:c.y-260,vx:c.facing*300,dmg:12,owner:"cpu",life:2});}else{c.state="walk";}}
    else if(dist<80){if(r<0.4){c.state="punch";c.stateT=0;c.cd=0.3;playSfx("punch");}else if(r<0.7){c.state="kick";c.stateT=0;c.cd=0.4;playSfx("kick");}else{c.state="block";c.stateT=0;}}
    else{if(r<0.2){c.state="jump";c.stateT=0;c.vy=-600;c.grounded=false;}else{c.state="walk";}}
  }
  updateFighter(c,dt,false);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const bg=ASSETS.stage_dojo;
  if(bg)ctx.drawImage(bg,0,0,W,H);
  else{ctx.fillStyle="#2a3b5c";ctx.fillRect(0,0,W,H);ctx.fillStyle="#1a2540";ctx.fillRect(0,GY,W,H-GY);}
  
  [state.player,state.cpu].forEach(f=>{
    const char=f===state.player?"ryu":"ken";
    const spr=getSprite(f,char);
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.scale(f.facing,1);
    const sw=350,sh=490;
    if(spr) ctx.drawImage(spr,-sw/2,-sh,sw,sh);
    else { ctx.fillStyle = f===state.player ? "#fff" : "#f00"; ctx.fillRect(-sw/2,-sh,sw,sh); }
    ctx.restore();
  });
  
  state.projectiles.forEach(pr=>{
    const fb=ASSETS.fireball;
    if(fb)ctx.drawImage(fb,pr.x-35,pr.y-25,70,50);
    else{ctx.fillStyle="#f80";ctx.beginPath();ctx.arc(pr.x,pr.y,12,0,Math.PI*2);ctx.fill();}
  });
  state.hitFx.forEach(h=>{
    const hs=ASSETS.hit_spark;
    if(hs)ctx.drawImage(hs,h.x-32,h.y-32,64,64);
    else{ctx.fillStyle="#ff0";ctx.beginPath();ctx.arc(h.x,h.y,20,0,Math.PI*2);ctx.fill();}
  });
  
  if(state.roundStartT>0){
    ctx.fillStyle="#fff";ctx.font="bold 48px system-ui";ctx.textAlign="center";
    ctx.fillText(state.roundStartT>1?"ROUND "+(state.pWins+state.cWins+1):"FIGHT!",W/2,H/2);
  }
  if(state.koT>0){
    ctx.fillStyle="#f00";ctx.font="bold 64px system-ui";ctx.textAlign="center";
    ctx.fillText("K.O.",W/2,H/2);
  }
  updateBars();
}

let lastT=0;
function loop(now){
  const dt=Math.min((now-lastT)/1000,0.05);lastT=now;
  state.frame++;
  try{
    if(state.roundStartT>0){state.roundStartT-=dt;if(state.roundStartT<=0)state.roundStartT=0;}
    else if(!state.gameOver){
      state.timer-=dt;
      if(state.timer<=0){state.timer=0;state.gameOver=true;}
      updateFighter(state.player,dt,true);
      updateCPU(dt);
      updatePhysics(state.player,dt);
      updatePhysics(state.cpu,dt);
      checkHits(dt);
      for(let i=state.hitFx.length-1;i>=0;i--){state.hitFx[i].life-=dt;if(state.hitFx[i].life<=0)state.hitFx.splice(i,1);}
      if(state.player.state==="ko"&&state.player.stateT>1){state.koT=2;}
      if(state.cpu.state==="ko"&&state.cpu.stateT>1){state.koT=2;}
      if(state.koT>0){state.koT-=dt;if(state.koT<=0){
        state.gameOver=true;
        const winner = state.player.state==="ko" ? "CPU WINS!" : "YOU WIN!";
        document.getElementById("msg").textContent=winner;
        document.getElementById("msg").style.display="block";
        document.getElementById("restart").style.display="block";
      }}
    }
    draw();
  }catch(err){console.error("game crashed:",err);}
  requestAnimationFrame(loop);
}

loadAssets();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
