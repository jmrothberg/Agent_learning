<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Street Brawlers</title>
<style>
  :root { color-scheme: dark; --bg:#0b1020; --fg:#e7ecff; --panel:#1a2348; --accent:#3b62ff; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:16px/1.4 system-ui,sans-serif; overflow:hidden; user-select:none; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { background:#10162e; border-radius:12px; box-shadow:0 10px 40px #0008;
    max-width:98vw; max-height:96vh; touch-action:none; image-rendering:auto; }
  #help { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
    background:#0008; padding:8px 14px; border-radius:8px; font-size:13px;
    pointer-events:none; text-align:center; }
  #help b { color:#ffd166; }
  #errOverlay { position:fixed; inset:auto 12px 12px 12px; max-height:30%;
    overflow:auto; background:#400; color:#fdd; padding:8px 12px;
    font:12px/1.3 monospace; border-radius:6px; display:none; pointer-events:none; }
</style></head>
<body>
<div id="wrap"><canvas id="c" width="1024" height="576"></canvas></div>
<div id="help">
  <b>P1</b>: A/D move · W jump · S block · F punch · G kick · <b>T</b> fireball &nbsp;|&nbsp;
  <b>P2</b>: ←/→ move · ↑ jump · ↓ block · K punch · L kick · <b>J</b> fireball &nbsp;|&nbsp;
  <b>R</b> restart &nbsp;|&nbsp; <b>M</b> toggle CPU
</div>
<button id="btnMode" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:#3b62ff;color:#fff;border:0;border-radius:8px;padding:8px 16px;
  font:bold 14px system-ui,sans-serif;cursor:pointer;z-index:10;
  box-shadow:0 4px 12px #0008;">KEN: 2-Player</button>
<div id="errOverlay"></div>
<script>
(() => {
  "use strict";

  const cvs = document.getElementById("c");
  const ctx = cvs.getContext("2d");
  const W = 1024, H = 576;
  const errBox = document.getElementById("errOverlay");

  function fit() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + "px"; cvs.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
  }
  fit();
  window.addEventListener("resize", fit);

  // ---- Assets ---------------------------------------------------------
  const ASSET_DIR = "./short-and-done-first-the-promp_20260529_150413_assets/";
  const ASSETS = {};
  const ASSET_LIST = [
    "bg",
    "ryu_idle","ryu_walk","ryu_walk2","ryu_punch","ryu_punch2","ryu_punch3",
    "ryu_kick","ryu_kick2","ryu_kick3","ryu_block","ryu_hit","ryu_jump",
    "ryu_fireball1","ryu_fireball2","ryu_hit_fire",
    "ken_idle","ken_walk","ken_walk2","ken_punch","ken_punch2","ken_punch3",
    "ken_kick","ken_kick2","ken_kick3","ken_block","ken_hit","ken_jump",
    "ken_fireball1","ken_fireball2","ken_hit_fire",
    "hit_spark","fireball"
  ];
  async function loadAssets() {
    await Promise.all(ASSET_LIST.map(async name => {
      const img = new Image();
      img.src = ASSET_DIR + name + ".png";
      try { await img.decode(); } catch(e) { /* still usable when loaded */ }
      ASSETS[name] = img;
    }));
  }

  // ---- Sounds ---------------------------------------------------------
  const SOUND_DIR = "./short-and-done-first-the-promp_20260529_150413_sounds/";
  const SOUNDS = {};
  function loadSounds() {
    const entries = [
      ["punch",    "punch.ogg",    false],
      ["kick",     "kick.ogg",     false],
      ["block",    "block.ogg",    false],
      ["ko",       "ko.ogg",       false],
      ["fireball", "fireball.ogg", false],
      ["fire_hit", "fire_hit.ogg", false],
      ["music",    "music.ogg",    true],
    ];
    for (const [name, file, loop] of entries) {
      const a = new Audio(SOUND_DIR + file);
      a.loop = loop;
      if (loop) a.volume = 0.45; else a.volume = 0.8;
      SOUNDS[name] = a;
    }
  }
  loadSounds();
  function play(name) {
    const base = SOUNDS[name]; if (!base) return;
    try {
      if (base.loop) { base.play().catch(()=>{}); return; }
      const inst = base.cloneNode();
      inst.volume = base.volume;
      inst.play().catch(()=>{});
    } catch(e) {}
  }
  let _audioStarted = false;
  function _startAudio() {
    if (_audioStarted) return; _audioStarted = true;
    if (SOUNDS.music) SOUNDS.music.play().catch(()=>{});
  }
  window.addEventListener("keydown",     _startAudio, { once:true });
  window.addEventListener("pointerdown", _startAudio, { once:true });

  // ---- Input ----------------------------------------------------------
  const keys = Object.create(null);
  const pressed = Object.create(null);
  const TRACKED = new Set([
    "KeyA","KeyD","KeyW","KeyS","KeyF","KeyG","KeyT",
    "ArrowLeft","ArrowRight","ArrowUp","ArrowDown","KeyK","KeyL","KeyJ",
    "KeyR","Space","KeyM"
  ]);
  window.addEventListener("keydown", e => {
    if (!TRACKED.has(e.code)) return;
    e.preventDefault();
    if (!keys[e.code]) pressed[e.code] = true;
    keys[e.code] = true;
  }, { passive:false });
  window.addEventListener("keyup", e => {
    if (!TRACKED.has(e.code)) return;
    e.preventDefault();
    keys[e.code] = false;
  }, { passive:false });
  window.addEventListener("blur", () => {
    for (const k in keys) keys[k] = false;
  });

  // ---- Constants ------------------------------------------------------
  const GROUND_Y = 500;
  const GRAVITY = 1800;
  const WALK_SPEED = 220;
  const JUMP_V = -780;
  const FIGHTER_W = 170;     // draw width
  const FIGHTER_H = 230;     // draw height
  const BODY_HALF_W = 38;    // collision half width
  const PUNCH_DUR = 0.36;
  const PUNCH_ACTIVE = [0.08, 0.22];
  const PUNCH_REACH = 110;
  const PUNCH_DMG = 7;
  const KICK_DUR = 0.5;
  const KICK_ACTIVE = [0.12, 0.32];
  const KICK_REACH = 140;
  const KICK_DMG = 12;
  // Fireball: thrower freezes for FB_DUR; projectile spawns at FB_RELEASE.
  const FB_DUR = 0.65;
  const FB_RELEASE = 0.30;
  const FB_SPEED = 580;
  const FB_DMG = 14;
  const FB_W = 100;
  const FB_H = 70;
  const FB_COOLDOWN = 0.7;
  const FB_ARM_HEIGHT = 140; // pixels above ground (y - this) = arm/chest height
  const HIT_DUR = 0.28;
  const FIRE_HIT_DUR = 0.38;
  const BLOCK_REDUCE = 0.25;
  const KNOCKBACK_HIT = 80;
  const KNOCKBACK_BLOCK = 30;
  const COOLDOWN_AFTER = 0.08;
  const ARENA_LEFT = 60;
  const ARENA_RIGHT = W - 60;

  // ---- State ----------------------------------------------------------
  function makeFighter(id, name, x, facing, sprites, color) {
    return {
      id, name, x, y: GROUND_Y, vx: 0, vy: 0,
      hp: 100, maxHp: 100, facing,
      state: "idle", stateTimer: 0, attackHit: false,
      cooldown: 0, fbCooldown: 0, fbSpawned: false,
      sprites, color,
      onGround: true,
      hitFlash: 0,
      walkPhase: 0,     // for leg cycle
      animT: 0,         // shared anim time accumulator
    };
  }
  const state = {
    p1: null, p2: null,
    fx: [],
    fireballs: [],     // active fireball projectiles
    over: false, winner: null,
    t: 0,
    roundTimer: 99,
    assetsReady: false,
    cpuP2: false,      // KEN AI on/off
    aiTimer: 0,
    aiAction: 0,
  };

  const RYU = {
    idle:"ryu_idle",
    walk:["ryu_walk","ryu_walk2"],
    punch:["ryu_punch","ryu_punch2","ryu_punch3"],
    kick:["ryu_kick","ryu_kick2","ryu_kick3"],
    fireball:["ryu_fireball1","ryu_fireball2"],
    block:"ryu_block", hit:"ryu_hit", hit_fire:"ryu_hit_fire", jump:"ryu_jump"
  };
  const KEN = {
    idle:"ken_idle",
    walk:["ken_walk","ken_walk2"],
    punch:["ken_punch","ken_punch2","ken_punch3"],
    kick:["ken_kick","ken_kick2","ken_kick3"],
    fireball:["ken_fireball1","ken_fireball2"],
    block:"ken_block", hit:"ken_hit", hit_fire:"ken_hit_fire", jump:"ken_jump"
  };

  function reset() {
    state.p1 = makeFighter("p1", "RYU",  300, +1, RYU, "#67a8ff");
    state.p2 = makeFighter("p2", "KEN", 724, -1, KEN, "#ff7a4d");
    state.fx.length = 0;
    state.fireballs.length = 0;
    state.over = false; state.winner = null;
    state.t = 0; state.roundTimer = 99;
    for (const k in keys) keys[k] = false;
    for (const k in pressed) pressed[k] = false;
    last = performance.now();
  }

  // ---- Input mapping per player --------------------------------------
  const P1_KEYS = { left:"KeyA", right:"KeyD", jump:"KeyW", block:"KeyS",
                    punch:"KeyF", kick:"KeyG", fireball:"KeyT" };
  const P2_KEYS = { left:"ArrowLeft", right:"ArrowRight", jump:"ArrowUp",
                    block:"ArrowDown", punch:"KeyK", kick:"KeyL", fireball:"KeyJ" };

  // ---- Game logic -----------------------------------------------------
  function startAttack(f, kind) {
    if (f.cooldown > 0) return;
    if (f.state === "punch" || f.state === "kick" || f.state === "fireball"
        || f.state === "hit" || f.state === "hit_fire"
        || f.state === "ko" || f.state === "block") return;
    if (kind === "fireball" && !f.onGround) return;
    f.state = kind;
    f.stateTimer = 0;
    f.attackHit = false;
    f.fbSpawned = false;
    f.vx = 0;
  }

  function spawnFireball(f) {
    const facing = f.facing;
    const fbX = f.x + facing * 55;
    const fbY = f.y - FB_ARM_HEIGHT;
    state.fireballs.push({
      x: fbX, y: fbY,
      vx: facing * FB_SPEED,
      facing,
      ownerId: f.id,
      life: 3.0,
      animT: 0,
    });
    play("fireball");
  }

  function attackInfo(kind) {
    if (kind === "punch") return { dur:PUNCH_DUR, active:PUNCH_ACTIVE, reach:PUNCH_REACH, dmg:PUNCH_DMG, sfx:"punch" };
    if (kind === "kick")  return { dur:KICK_DUR,  active:KICK_ACTIVE,  reach:KICK_REACH,  dmg:KICK_DMG,  sfx:"kick"  };
    return null;
  }

  function tryDamage(attacker, defender) {
    if (attacker.attackHit) return;
    const info = attackInfo(attacker.state);
    if (!info) return;
    const t = attacker.stateTimer;
    if (t < info.active[0] || t > info.active[1]) return;

    // Hitbox: a rectangle in front of attacker
    const facing = attacker.facing;
    const hbX1 = facing === 1 ? attacker.x + 10 : attacker.x - 10 - info.reach;
    const hbX2 = facing === 1 ? attacker.x + 10 + info.reach : attacker.x - 10;
    const hbY1 = attacker.y - 180;
    const hbY2 = attacker.y - 30;

    // Defender body box
    const dxMin = defender.x - BODY_HALF_W;
    const dxMax = defender.x + BODY_HALF_W;
    const dyMin = defender.y - 200;
    const dyMax = defender.y - 10;

    const overlap = hbX1 < dxMax && hbX2 > dxMin && hbY1 < dyMax && hbY2 > dyMin;
    if (!overlap) return;

    attacker.attackHit = true;
    let dmg = info.dmg;
    let blocked = false;
    // Block only valid when grounded, blocking, and facing the attacker
    if (defender.state === "block" && defender.onGround
        && defender.facing === -facing) {
      dmg = Math.round(dmg * BLOCK_REDUCE);
      blocked = true;
    }
    defender.hp = Math.max(0, defender.hp - dmg);
    defender.hitFlash = 0.18;

    // Knockback
    const kb = blocked ? KNOCKBACK_BLOCK : KNOCKBACK_HIT;
    defender.x += facing * kb * 0.35; // small instant push, more added below
    defender.vx = facing * kb * 4;
    if (!blocked) {
      defender.state = "hit";
      defender.stateTimer = 0;
    }

    // Spawn hit spark in front of defender, at impact point
    const sparkX = (hbX1 + hbX2) * 0.5;
    const sparkY = (defender.y - 110);
    state.fx.push({ kind:"spark", x:sparkX, y:sparkY, life:0.28, max:0.28 });

    // SFX
    play(blocked ? "block" : info.sfx);

    if (defender.hp <= 0 && !state.over) {
      state.over = true;
      state.winner = attacker.id === "p1" ? "Player 1 (RYU)" : "Player 2 (KEN)";
      defender.state = "ko"; defender.stateTimer = 0;
      play("ko");
    }
  }

  function handleInputFor(f, K) {
    if (state.over || f.state === "ko") return;
    const busy = (f.state === "punch" || f.state === "kick" || f.state === "fireball"
                  || f.state === "hit" || f.state === "hit_fire");

    if (!busy) {
      if (pressed[K.fireball] && f.onGround && f.fbCooldown <= 0) { startAttack(f, "fireball"); return; }
      if (pressed[K.punch]) { startAttack(f, "punch"); return; }
      if (pressed[K.kick])  { startAttack(f, "kick");  return; }
      if (pressed[K.jump] && f.onGround) {
        f.vy = JUMP_V; f.onGround = false; f.state = "jump"; f.stateTimer = 0;
      }
    }

    if (!busy) {
      const ducking = keys[K.block] && f.onGround;
      const left = keys[K.left], right = keys[K.right];
      if (ducking) {
        f.state = "duck"; f.vx = 0;
      } else {
        if (left && !right) {
          f.vx = -WALK_SPEED;
          if (f.onGround) f.state = "walk";
        } else if (right && !left) {
          f.vx = WALK_SPEED;
          if (f.onGround) f.state = "walk";
        } else {
          f.vx = 0;
          if (f.onGround && f.state !== "jump") f.state = "idle";
        }
        if (!f.onGround) f.state = "jump";
      }
    }
  }

  // ---- Simple AI for KEN ---------------------------------------------
  function runAI(self, target, dt) {
    if (state.over || self.state === "ko") return;
    state.aiTimer -= dt;
    if (state.aiTimer <= 0) {
      state.aiTimer = 0.25 + Math.random() * 0.4;
      const dist = Math.abs(target.x - self.x);
      const r = Math.random();
      if (dist > 180) {
        state.aiAction = 1; // approach
      } else if (dist > 130) {
        state.aiAction = r < 0.55 ? 1 : (r < 0.85 ? 3 : 2); // approach / kick / punch
      } else if (dist < 80) {
        state.aiAction = r < 0.5 ? 4 : (r < 0.8 ? 2 : 5); // back / punch / jump
      } else {
        state.aiAction = r < 0.35 ? 2 : (r < 0.55 ? 3 : (r < 0.7 ? 6 : (r < 0.85 ? 5 : 1)));
        // 2 punch, 3 kick, 6 duck, 5 jump, 1 approach
      }
    }

    const busy = (self.state === "punch" || self.state === "kick" || self.state === "hit");
    const dir = target.x >= self.x ? 1 : -1;

    if (!busy) {
      if (state.aiAction === 2 && self.onGround) { startAttack(self, "punch"); return; }
      if (state.aiAction === 3 && self.onGround) { startAttack(self, "kick"); return; }
      if (state.aiAction === 5 && self.onGround) {
        self.vy = JUMP_V; self.onGround = false; self.state = "jump"; self.stateTimer = 0;
      }
    }

    if (!busy) {
      if (state.aiAction === 6 && self.onGround) {
        self.state = "duck"; self.vx = 0; return;
      }
      if (state.aiAction === 1) {
        self.vx = dir * WALK_SPEED;
        if (self.onGround) self.state = "walk";
      } else if (state.aiAction === 4) {
        self.vx = -dir * WALK_SPEED * 0.7;
        if (self.onGround) self.state = "walk";
      } else {
        self.vx = 0;
        if (self.onGround && self.state !== "jump") self.state = "idle";
      }
      if (!self.onGround) self.state = "jump";
    }
  }

  function physics(f, dt) {
    // Apply velocity
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.vy += GRAVITY * dt;

    // Ground
    if (f.y >= GROUND_Y) {
      f.y = GROUND_Y;
      f.vy = 0;
      if (!f.onGround) {
        f.onGround = true;
        if (f.state === "jump") f.state = "idle";
      }
    } else {
      f.onGround = false;
    }

    // Friction during hit/ko knockback
    if (f.state === "hit" || f.state === "ko") {
      f.vx *= Math.pow(0.001, dt);
    }

    // Clamp to arena
    if (f.x < ARENA_LEFT) f.x = ARENA_LEFT;
    if (f.x > ARENA_RIGHT) f.x = ARENA_RIGHT;
  }

  function preventOverlap(a, b) {
    const minDist = BODY_HALF_W * 2 - 6;
    const dx = b.x - a.x;
    const ad = Math.abs(dx);
    if (ad < minDist) {
      const push = (minDist - ad) / 2;
      const sign = dx >= 0 ? 1 : -1;
      a.x -= sign * push;
      b.x += sign * push;
      if (a.x < ARENA_LEFT) { b.x += (ARENA_LEFT - a.x); a.x = ARENA_LEFT; }
      if (b.x > ARENA_RIGHT) { a.x -= (b.x - ARENA_RIGHT); b.x = ARENA_RIGHT; }
    }
  }

  function updateFighterTimers(f, dt) {
    f.stateTimer += dt;
    if (f.cooldown > 0) f.cooldown = Math.max(0, f.cooldown - dt);
    if (f.fbCooldown > 0) f.fbCooldown = Math.max(0, f.fbCooldown - dt);
    if (f.hitFlash > 0) f.hitFlash = Math.max(0, f.hitFlash - dt);

    if (f.state === "punch" && f.stateTimer >= PUNCH_DUR) {
      f.state = "idle"; f.cooldown = COOLDOWN_AFTER; f.attackHit = false;
    } else if (f.state === "kick" && f.stateTimer >= KICK_DUR) {
      f.state = "idle"; f.cooldown = COOLDOWN_AFTER; f.attackHit = false;
    } else if (f.state === "fireball") {
      // Spawn projectile when arm reaches extended pose
      if (!f.fbSpawned && f.stateTimer >= FB_RELEASE) {
        f.fbSpawned = true;
        spawnFireball(f);
      }
      if (f.stateTimer >= FB_DUR) {
        f.state = "idle"; f.cooldown = COOLDOWN_AFTER; f.fbCooldown = FB_COOLDOWN;
        f.attackHit = false; f.fbSpawned = false;
      }
    } else if (f.state === "hit" && f.stateTimer >= HIT_DUR) {
      f.state = "idle";
    } else if (f.state === "hit_fire" && f.stateTimer >= FIRE_HIT_DUR) {
      f.state = "idle";
    } else if (f.state === "block" || f.state === "duck") {
      // exit when key released — handled by input next frame
    }

    // Walk cycle phase
    if (f.state === "walk") f.walkPhase += dt * 10;
    else f.walkPhase *= Math.pow(0.001, dt);
    f.animT += dt;
  }

  function update(dt) {
    state.t += dt;

    if (pressed.KeyR) {
      reset();
      return;
    }

    if (!state.over) {
      state.roundTimer = Math.max(0, state.roundTimer - dt);
      if (state.roundTimer <= 0) {
        state.over = true;
        if (state.p1.hp > state.p2.hp) state.winner = "Player 1 (RYU)";
        else if (state.p2.hp > state.p1.hp) state.winner = "Player 2 (KEN)";
        else state.winner = "Draw";
        play("ko");
      }
    }

    const p1 = state.p1, p2 = state.p2;

    // Toggle CPU mode
    if (pressed.KeyM) {
      state.cpuP2 = !state.cpuP2;
      const btn = document.getElementById("btnMode");
      if (btn) btn.textContent = state.cpuP2 ? "KEN: CPU" : "KEN: 2-Player";
    }

    // Duck/block state should clear if key released
    if ((p1.state === "block" || p1.state === "duck") && !keys[P1_KEYS.block]) p1.state = "idle";
    if (!state.cpuP2 && (p2.state === "block" || p2.state === "duck") && !keys[P2_KEYS.block]) p2.state = "idle";

    handleInputFor(p1, P1_KEYS);
    if (state.cpuP2) runAI(p2, p1, dt);
    else handleInputFor(p2, P2_KEYS);

    updateFighterTimers(p1, dt);
    updateFighterTimers(p2, dt);

    physics(p1, dt);
    physics(p2, dt);
    preventOverlap(p1, p2);

    // ALWAYS face each other (unless KO'd — leave facing as-is)
    if (p1.state !== "ko") p1.facing = p2.x >= p1.x ? +1 : -1;
    if (p2.state !== "ko") p2.facing = p1.x >= p2.x ? +1 : -1;

    // Damage checks during active windows
    if (p1.state === "punch" || p1.state === "kick") tryDamage(p1, p2);
    if (p2.state === "punch" || p2.state === "kick") tryDamage(p2, p1);

    // FX
    for (let i = state.fx.length - 1; i >= 0; i--) {
      state.fx[i].life -= dt;
      if (state.fx[i].life <= 0) state.fx.splice(i, 1);
    }

    // Fireballs: move, age, collide with non-owner
    for (let i = state.fireballs.length - 1; i >= 0; i--) {
      const fb = state.fireballs[i];
      fb.x += fb.vx * dt;
      fb.life -= dt;
      fb.animT += dt;
      // Off-screen or expired
      if (fb.life <= 0 || fb.x < -120 || fb.x > W + 120) {
        state.fireballs.splice(i, 1);
        continue;
      }
      const target = (fb.ownerId === "p1") ? p2 : p1;
      if (target.state === "ko") continue;
      const dxMin = target.x - BODY_HALF_W - 10;
      const dxMax = target.x + BODY_HALF_W + 10;
      const dyMin = target.y - 200;
      const dyMax = target.y - 10;
      if (fb.x > dxMin && fb.x < dxMax && fb.y > dyMin && fb.y < dyMax) {
        // Hit!
        const facing = fb.vx >= 0 ? 1 : -1;
        let dmg = FB_DMG;
        let blocked = false;
        if (target.state === "block" && target.onGround && target.facing === -facing) {
          dmg = Math.round(dmg * BLOCK_REDUCE);
          blocked = true;
        }
        target.hp = Math.max(0, target.hp - dmg);
        target.hitFlash = 0.28;
        const kb = blocked ? KNOCKBACK_BLOCK * 1.5 : KNOCKBACK_HIT * 1.5;
        target.x += facing * kb * 0.4;
        target.vx = facing * kb * 5;
        if (!blocked) {
          target.state = "hit_fire";
          target.stateTimer = 0;
        }
        // Big fire spark fx
        state.fx.push({ kind:"spark", x:fb.x, y:fb.y, life:0.4, max:0.4 });
        play(blocked ? "block" : "fire_hit");
        if (target.hp <= 0 && !state.over) {
          state.over = true;
          state.winner = fb.ownerId === "p1" ? "Player 1 (RYU)" : "Player 2 (KEN)";
          target.state = "ko"; target.stateTimer = 0;
          play("ko");
        }
        state.fireballs.splice(i, 1);
      }
    }

    // Fireball-vs-fireball cancel
    for (let i = state.fireballs.length - 1; i >= 0; i--) {
      for (let j = i - 1; j >= 0; j--) {
        const a = state.fireballs[i], b = state.fireballs[j];
        if (!a || !b) continue;
        if (a.ownerId === b.ownerId) continue;
        if (Math.abs(a.x - b.x) < 50 && Math.abs(a.y - b.y) < 40) {
          state.fx.push({ kind:"spark", x:(a.x+b.x)/2, y:(a.y+b.y)/2, life:0.35, max:0.35 });
          state.fireballs.splice(i, 1);
          state.fireballs.splice(j, 1);
          play("fire_hit");
          break;
        }
      }
    }
  }

  // ---- Drawing --------------------------------------------------------
  function drawBackground() {
    const img = ASSETS.bg;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, 0, 0, W, H);
    } else {
      // Fallback gradient sky + floor
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#1c1a3a");
      g.addColorStop(0.6, "#3a2a55");
      g.addColorStop(1, "#7a3a44");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#231a1a";
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    }
    // Slight floor shading line
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, GROUND_Y - 2, W, 4);
  }

  function drawShadow(f) {
    const groundDist = Math.max(0, GROUND_Y - f.y);
    const scale = Math.max(0.4, 1 - groundDist / 400);
    ctx.save();
    ctx.globalAlpha = 0.4 * scale;
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(f.x, GROUND_Y + 6, 60 * scale, 12 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Pick the right animation frame for the fighter's current state.
  // Multi-frame attack sequences: wind-up -> extended -> recovery.
  function pickFrame(frames, progress) {
    // progress in [0,1] across the action; clamp and bucket evenly.
    const p = Math.max(0, Math.min(0.9999, progress));
    return frames[Math.floor(p * frames.length)] || frames[0];
  }
  // Per-sprite native-facing overrides. Many of the AI-generated frames
  // were rendered facing the opposite direction the prompt asked for.
  // +1 = sprite natively faces right; -1 = sprite natively faces left.
  // Sprites NOT listed here fall back to the fighter's default native facing
  // (RYU=+1 right, KEN=-1 left).
  const SPRITE_NATIVE_FACING = {
    // RYU punch / kick frames came out facing LEFT — override.
    "ryu_punch":  -1, "ryu_punch2": -1, "ryu_punch3": -1,
    "ryu_kick":   -1, "ryu_kick2":  -1, "ryu_kick3":  -1,
    // KEN walk frames came out facing RIGHT — override.
    "ken_walk":   +1, "ken_walk2":  +1,
  };

  function spriteForFighter(f) {
    let key;
    switch (f.state) {
      case "walk": {
        const frames = f.sprites.walk;
        if (Array.isArray(frames)) {
          key = frames[(Math.floor(f.walkPhase / 1.6) % frames.length + frames.length) % frames.length];
        } else key = frames;
        break;
      }
      case "jump":  key = f.sprites.jump;  break;
      case "punch": {
        const frames = f.sprites.punch;
        if (Array.isArray(frames)) key = pickFrame(frames, f.stateTimer / PUNCH_DUR);
        else key = frames;
        break;
      }
      case "kick": {
        const frames = f.sprites.kick;
        if (Array.isArray(frames)) key = pickFrame(frames, f.stateTimer / KICK_DUR);
        else key = frames;
        break;
      }
      case "fireball": {
        const frames = f.sprites.fireball;
        if (Array.isArray(frames)) {
          // Wind-up frame for first half, extended-arm frame for second half
          key = f.stateTimer < FB_RELEASE ? frames[0] : frames[1];
        } else key = frames || f.sprites.idle;
        break;
      }
      case "block": key = f.sprites.block; break;
      case "duck":  key = f.sprites.block; break;
      case "hit":   key = f.sprites.hit;   break;
      case "hit_fire": key = f.sprites.hit_fire || f.sprites.hit; break;
      case "ko":    key = f.sprites.hit;   break;
      default:      key = f.sprites.idle;
    }
    const img = ASSETS[key] || ASSETS[f.sprites.idle];
    const defaultNative = (f.id === "p1") ? +1 : -1;
    const native = (key in SPRITE_NATIVE_FACING) ? SPRITE_NATIVE_FACING[key] : defaultNative;
    return { img, native };
  }

  function drawFighter(f) {
    const picked = spriteForFighter(f);
    const img = picked.img;
    const drawW = FIGHTER_W;
    let drawH = FIGHTER_H;
    const x = f.x;
    const y = f.y;

    // Each sprite carries its own native-facing direction (see SPRITE_NATIVE_FACING).
    const nativeFacing = picked.native;
    const flip = (f.facing !== nativeFacing) ? -1 : +1;

    // Duck visual squash
    let squashY = 1, squashX = 1;
    if (f.state === "duck") { squashY = 0.62; squashX = 1.12; }
    if (f.state === "punch") {
      // tiny forward lunge stretch
      squashX = 1.05;
    }
    if (f.state === "kick") {
      squashY = 0.97; squashX = 1.04;
    }

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(flip * squashX, squashY);

    if (f.state === "ko") {
      ctx.rotate((f.facing === 1 ? -0.9 : 0.9) * flip * -1 * 0.6);
    }

    // Slight bob on idle
    let bob = 0;
    if (f.state === "idle") bob = Math.sin(f.animT * 4) * 2;

    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -drawW / 2, -drawH + bob, drawW, drawH);
      if (f.hitFlash > 0) {
        ctx.globalCompositeOperation = "source-atop";
        ctx.fillStyle = `rgba(255,80,80,${f.hitFlash * 1.6})`;
        ctx.fillRect(-drawW / 2, -drawH, drawW, drawH);
        ctx.globalCompositeOperation = "source-over";
      }
    } else {
      ctx.fillStyle = f.color;
      ctx.fillRect(-30, -drawH, 60, drawH);
      ctx.fillStyle = "#fff";
      ctx.fillRect(-20, -drawH + 10, 40, 30);
    }

    ctx.restore();
  }

  function drawFireballs() {
    const img = ASSETS.fireball;
    for (const fb of state.fireballs) {
      ctx.save();
      ctx.translate(fb.x, fb.y);
      // Sprite natively faces right; flip if traveling left
      const flip = fb.vx < 0 ? -1 : 1;
      ctx.scale(flip, 1);
      // Subtle pulse
      const pulse = 1 + Math.sin(fb.animT * 30) * 0.08;
      const w = FB_W * pulse, h = FB_H * pulse;
      if (img && img.complete && img.naturalWidth > 0) {
        // Glow halo
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.filter = "blur(6px)";
        ctx.drawImage(img, -w * 0.6, -h * 0.6, w * 1.2, h * 1.2);
        ctx.restore();
        ctx.drawImage(img, -w / 2, -h / 2, w, h);
      } else {
        // Procedural fallback
        const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, w / 2);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(0.4, "#ffd24a");
        grad.addColorStop(1, "rgba(255,80,0,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Trail
        ctx.fillStyle = "rgba(255,140,40,0.6)";
        ctx.beginPath();
        ctx.ellipse(-w * 0.4, 0, w * 0.5, h * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawFX() {
    const spark = ASSETS.hit_spark;
    for (const fx of state.fx) {
      if (fx.kind !== "spark") continue;
      const t = 1 - fx.life / fx.max;
      const size = 90 + t * 80;
      ctx.save();
      ctx.globalAlpha = Math.max(0, fx.life / fx.max);
      ctx.translate(fx.x, fx.y);
      ctx.rotate(t * 1.2);
      if (spark && spark.complete && spark.naturalWidth > 0) {
        ctx.drawImage(spark, -size/2, -size/2, size, size);
      } else {
        ctx.fillStyle = "#fff36b";
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          const r = (i % 2 === 0) ? size/2 : size/4;
          const px = Math.cos(a) * r, py = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawHealthBar(x, y, w, h, hp, maxHp, name, mirrored) {
    // outer
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
    ctx.fillStyle = "#222";
    ctx.fillRect(x, y, w, h);
    const frac = Math.max(0, Math.min(1, hp / maxHp));
    // gradient fill from green->yellow->red
    const g = ctx.createLinearGradient(x, y, x + w, y);
    g.addColorStop(0, "#ff3838");
    g.addColorStop(0.5, "#ffd23f");
    g.addColorStop(1, "#46e36a");
    ctx.fillStyle = g;
    if (mirrored) {
      ctx.fillRect(x + w - w * frac, y, w * frac, h);
    } else {
      ctx.fillRect(x, y, w * frac, h);
    }
    // border highlight
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    // name
    ctx.font = "bold 18px system-ui, sans-serif";
    ctx.fillStyle = "#fff";
    ctx.textBaseline = "bottom";
    ctx.textAlign = mirrored ? "right" : "left";
    ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
    ctx.fillText(name, mirrored ? x + w : x, y - 6);
    ctx.shadowBlur = 0;
  }

  function drawHUD() {
    const barW = 380, barH = 22;
    drawHealthBar(30, 30, barW, barH, state.p1.hp, state.p1.maxHp, "RYU (P1)", false);
    drawHealthBar(W - 30 - barW, 30, barW, barH, state.p2.hp, state.p2.maxHp, "KEN (P2)", true);

    // Timer
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(W/2 - 50, 18, 100, 50);
    ctx.font = "bold 38px system-ui, sans-serif";
    ctx.fillStyle = "#ffd166";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
    ctx.fillText(String(Math.ceil(state.roundTimer)).padStart(2,"0"), W/2, 44);
    ctx.shadowBlur = 0;

    if (state.over) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.font = "bold 88px system-ui, sans-serif";
      ctx.fillStyle = "#ff5252";
      ctx.shadowColor = "#000"; ctx.shadowBlur = 12;
      ctx.fillText("K.O.!", W/2, H/2 - 40);
      ctx.font = "bold 36px system-ui, sans-serif";
      ctx.fillStyle = "#fff";
      ctx.fillText((state.winner || "Draw") + " WINS", W/2, H/2 + 30);
      ctx.font = "20px system-ui, sans-serif";
      ctx.fillStyle = "#ffd166";
      ctx.fillText("Press R to restart", W/2, H/2 + 75);
      ctx.shadowBlur = 0;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawShadow(state.p1);
    drawShadow(state.p2);

    // Draw the back-most fighter first so the front one overlaps cleanly.
    const order = state.p1.x <= state.p2.x ? [state.p1, state.p2] : [state.p2, state.p1];
    drawFighter(order[0]);
    drawFighter(order[1]);

    drawFireballs();
    drawFX();
    drawHUD();

    if (!state.assetsReady) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(0, H - 40, W, 40);
      ctx.fillStyle = "#fff";
      ctx.font = "16px system-ui, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("Loading fighters…", W/2, H - 20);
    }
  }

  // ---- Frame loop -----------------------------------------------------
  let last = performance.now();
  let rafHandle = 0;
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    try {
      update(dt);
      draw();
    } catch (err) {
      console.error("game crashed:", err);
      errBox.textContent = "crash: " + (err && err.message || err);
      errBox.style.display = "block";
    } finally {
      for (const k in pressed) pressed[k] = false;
    }
    rafHandle = requestAnimationFrame(frame);
  }

  // ---- Boot -----------------------------------------------------------
  reset();
  rafHandle = requestAnimationFrame(frame);
  loadAssets().then(() => { state.assetsReady = true; });

  // CPU toggle button
  const btn = document.getElementById("btnMode");
  if (btn) btn.addEventListener("click", () => {
    state.cpuP2 = !state.cpuP2;
    btn.textContent = state.cpuP2 ? "KEN: CPU" : "KEN: 2-Player";
    btn.blur();
  });

  // expose for probes
  window.gameState = state;
  window.game = { reset, ASSETS, SOUNDS, keys, fireballs: state.fireballs,
                  toggleCPU: () => { state.cpuP2 = !state.cpuP2; } };
})();
</script>
</body></html>
